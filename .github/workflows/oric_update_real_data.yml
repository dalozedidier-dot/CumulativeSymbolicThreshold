name: ORI-C - Update Real Data (T1-T8)

on:
  workflow_dispatch:
    inputs:
      data_file:
        description: "Chemin du CSV réel dans le repo"
        required: true
        default: "data/real/ORIC_real_data.csv"
      prereg_file:
        description: "Chemin du PREREG_TEMPLATE.md (verrou ex ante)"
        required: true
        default: "PREREG_TEMPLATE.md"
      out_root:
        description: "Dossier racine des sorties"
        required: true
        default: "_ci_out/oric_real_data"
      python_version:
        description: "Version Python"
        required: true
        default: "3.12"

permissions:
  contents: read

concurrency:
  group: oric-update-real-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -V
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            python -m pip install -r requirements.txt
          elif [ -f "pyproject.toml" ]; then
            python -m pip install -e ".[dev]" || python -m pip install -e .
          else
            echo "No requirements.txt or pyproject.toml found. Please add one of them."
            exit 1
          fi
          python -m pip install pytest || true

      - name: Validate inputs exist
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.data_file }}" ]; then
            echo "Missing data_file: ${{ inputs.data_file }}"
            exit 1
          fi
          if [ ! -f "${{ inputs.prereg_file }}" ]; then
            echo "Missing prereg_file: ${{ inputs.prereg_file }}"
            exit 1
          fi

      - name: Prepare run directory
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +%Y%m%d_%H%M%S)"
          RUN_DIR="${{ inputs.out_root }}/${TS}"
          mkdir -p "${RUN_DIR}/inputs" "${RUN_DIR}/logs" "${RUN_DIR}/tables" "${RUN_DIR}/figures"
          echo "${RUN_DIR}" > .oric_run_dir
          cp "${{ inputs.data_file }}" "${RUN_DIR}/inputs/real_data.csv"
          cp "${{ inputs.prereg_file }}" "${RUN_DIR}/inputs/PREREG_TEMPLATE.md"

      - name: Run canonical pipeline (T1-T8)
        shell: bash
        run: |
          set -euo pipefail
          RUN_DIR="$(cat .oric_run_dir)"

          if [ -f "04_Code/pipeline/run_all_tests.py" ]; then
            python 04_Code/pipeline/run_all_tests.py \
              --input-csv "${RUN_DIR}/inputs/real_data.csv" \
              --prereg "${RUN_DIR}/inputs/PREREG_TEMPLATE.md" \
              --out-dir "${RUN_DIR}" \
              2>&1 | tee "${RUN_DIR}/logs/run_all_tests.log"
          elif [ -f "run_all_tests.py" ]; then
            python run_all_tests.py \
              --input-csv "${RUN_DIR}/inputs/real_data.csv" \
              --prereg "${RUN_DIR}/inputs/PREREG_TEMPLATE.md" \
              --out-dir "${RUN_DIR}" \
              2>&1 | tee "${RUN_DIR}/logs/run_all_tests.log"
          else
            echo "Canonical runner not found. Expected 04_Code/pipeline/run_all_tests.py or run_all_tests.py"
            exit 1
          fi

      - name: Compute sha256 manifest (inputs + outputs)
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          run_dir = Path(open('.oric_run_dir').read().strip())
          items = []

          def sha256_file(p: Path) -> str:
            h = hashlib.sha256()
            with p.open('rb') as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b''):
                h.update(chunk)
            return h.hexdigest()

          for p in sorted(run_dir.rglob('*')):
            if p.is_file():
              rel = str(p.relative_to(run_dir))
              items.append({'path': rel, 'sha256': sha256_file(p), 'bytes': p.stat().st_size})

          manifest = {
            'schema': 'oric_manifest_v1',
            'run_dir': str(run_dir),
            'files': items,
          }
          (run_dir / 'manifest.json').write_text(json.dumps(manifest, indent=2, ensure_ascii=False))
          print(f"Wrote manifest.json with {len(items)} files")
          PY

      - name: Write params snapshot
        shell: bash
        run: |
          set -euo pipefail
          RUN_DIR="$(cat .oric_run_dir)"
          {
            echo "git_sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "python=$(python -V 2>&1)"
            echo "data_file=${{ inputs.data_file }}"
            echo "prereg_file=${{ inputs.prereg_file }}"
          } > "${RUN_DIR}/params.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oric_real_data_run
          path: ${{ inputs.out_root }}
          if-no-files-found: error
