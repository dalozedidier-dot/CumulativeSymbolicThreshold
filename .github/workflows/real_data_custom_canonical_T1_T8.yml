name: Real Data Custom - Canonical T1–T8 (ORI-C)

# Runs the full T1–T8 canonical suite on every file in 03_Data/real/_custom/.
# Triggered manually or on push/change to the _custom/ folder.
# Each dataset is a matrix entry with its own column mapping and statistical
# parameters adapted to the actual series length and coverage.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "03_Data/real/_custom/**"
      - "04_Code/pipeline/run_real_data_canonical_suite.py"
      - "04_Code/pipeline/run_real_data_demo.py"
      - "04_Code/pipeline/tests_causaux.py"

permissions:
  contents: read

jobs:
  custom_canonical:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── custom.csv (100 rows, fully pre-normalised t/O/R/I/demand/S) ──
          - label: custom_generic
            input: 03_Data/real/_custom/custom.csv
            col_time: t
            col_O: O
            col_R: R
            col_I: I
            normalize: none
            baseline_n: 20
            pre_horizon: 30
            post_horizon: 30
            lags: 1-5

          # ── custom_BE.csv (62 rows, pre-normalised O/R/I/S with gaps) ──
          # Note: I column has only ~10/62 non-null → effective n reduced after
          # NaN-drop; results may be INDETERMINATE due to small effective sample.
          - label: custom_BE
            input: 03_Data/real/_custom/custom_BE.csv
            col_time: year
            col_O: O
            col_R: R
            col_I: I
            normalize: robust
            baseline_n: 15
            pre_horizon: 15
            post_horizon: 15
            lags: 1-3

          # ── economie_FR.csv (62 rows, raw Eurostat, best-coverage columns) ──
          # Coverage: O=51/62, R=47/62, I=35/62 (solar_collector)
          - label: custom_economie_FR
            input: 03_Data/real/_custom/economie_FR.csv
            col_time: year
            col_O: industrial_production_i15
            col_R: berd_pc_gdp
            col_I: solar_collector_ths_m2
            normalize: robust
            baseline_n: 15
            pre_horizon: 15
            post_horizon: 15
            lags: 1-3

          # ── energie_EU27.csv (57 rows, raw Eurostat, best-coverage columns) ──
          # Coverage: O=54/57, R=35/57 (solar), I=35/57 (heat_pump)
          - label: custom_energie_EU27
            input: 03_Data/real/_custom/energie_EU27.csv
            col_time: year
            col_O: industrial_production_i15
            col_R: solar_collector_ths_m2
            col_I: heat_pump_cap_ath_mw
            normalize: robust
            baseline_n: 15
            pre_horizon: 15
            post_horizon: 15
            lags: 1-3

          # ── meteo_EE.csv (53 rows, raw Eurostat, best-coverage columns) ──
          # Coverage: O=41/53, R=30/53 (berd), I=35/53 (heat_pump); solar=all-zeros for EE
          - label: custom_meteo_EE
            input: 03_Data/real/_custom/meteo_EE.csv
            col_time: year
            col_O: industrial_production_i15
            col_R: berd_pc_gdp
            col_I: heat_pump_cap_ath_mw
            normalize: robust
            baseline_n: 15
            pre_horizon: 15
            post_horizon: 15
            lags: 1-3

          # ── trafic_DE.csv (48 rows, raw Eurostat, best-coverage columns) ──
          # Coverage: O=45/48, R=32/48 (berd), I=35/48 (solar)
          - label: custom_trafic_DE
            input: 03_Data/real/_custom/trafic_DE.csv
            col_time: year
            col_O: industrial_production_i15
            col_R: berd_pc_gdp
            col_I: solar_collector_ths_m2
            normalize: robust
            baseline_n: 15
            pre_horizon: 15
            post_horizon: 15
            lags: 1-3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify dataset (${{ matrix.label }})
        shell: bash
        run: |
          set -euo pipefail
          CSV="${{ matrix.input }}"
          if [ ! -f "${CSV}" ]; then
            echo "ERREUR: dataset introuvable: ${CSV}" >&2
            exit 1
          fi
          N=$(python -c "import pandas as pd; df=pd.read_csv('${CSV}'); print(len(df))")
          echo "Dataset: ${CSV} — ${N} lignes brutes"

      - name: Run canonical T1–T8 (${{ matrix.label }})
        shell: bash
        run: |
          set -uo pipefail

          LABEL="${{ matrix.label }}"
          RUN_ID="${GITHUB_RUN_ID}"
          ROOT="_ci_out/real_data_custom_canonical/${LABEL}/run_${RUN_ID}"
          mkdir -p "${ROOT}"

          python 04_Code/pipeline/run_real_data_canonical_suite.py \
            --input "${{ matrix.input }}" \
            --outdir "${ROOT}" \
            --col-time "${{ matrix.col_time }}" \
            --time-mode index \
            --col-O "${{ matrix.col_O }}" \
            --col-R "${{ matrix.col_R }}" \
            --col-I "${{ matrix.col_I }}" \
            --normalize "${{ matrix.normalize }}" \
            --alpha 0.01 \
            --lags "${{ matrix.lags }}" \
            --pre-horizon "${{ matrix.pre_horizon }}" \
            --post-horizon "${{ matrix.post_horizon }}" \
            --c-mean-post-min 0.1 \
            --k 2.5 \
            --m 3 \
            --baseline-n "${{ matrix.baseline_n }}" \
            2>&1 | tee "${ROOT}/suite.log"

          # PIPESTATUS[0] = exit code du process python (pas de tee)
          echo ${PIPESTATUS[0]} > "${ROOT}/rc.txt"

          VERDICT=$(cat "${ROOT}/verdict.txt" 2>/dev/null || echo "UNKNOWN")
          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          echo "=== VERDICT ${LABEL}: ${VERDICT} ==="

      - name: Upload artifact (${{ matrix.label }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom_canonical_${{ matrix.label }}_${{ github.run_id }}
          path: _ci_out/real_data_custom_canonical/${{ matrix.label }}
          if-no-files-found: warn
