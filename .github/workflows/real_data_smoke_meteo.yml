name: Real Data Smoke (ORI-C) - Meteo

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Path to real CSV (repo-relative)"
        required: true
        default: "03_Data/real/meteo/pilot_meteo/real.csv"
      alpha:
        description: "Alpha for causal tests"
        required: false
        default: "0.01"

  push:
    branches: ["main"]
    paths:
      - "04_Code/pipeline/run_real_data_demo.py"
      - "04_Code/pipeline/tests_causaux.py"
      - "03_Data/real/meteo/pilot_meteo/**"
      - ".github/workflows/real_data_smoke_meteo.yml"

  pull_request:
    paths:
      - "04_Code/pipeline/run_real_data_demo.py"
      - "04_Code/pipeline/tests_causaux.py"
      - "03_Data/real/meteo/pilot_meteo/**"
      - ".github/workflows/real_data_smoke_meteo.yml"

jobs:
  real_data_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SECTOR: "meteo"
      DATASET: ${{ github.event.inputs.dataset || '03_Data/real/meteo/pilot_meteo/real.csv' }}
      ALPHA: ${{ github.event.inputs.alpha || '0.01' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy>=1.26" "pandas>=2.0" "matplotlib>=3.8" "scipy>=1.11" "pytest>=8.0" "statsmodels>=0.14"

      - name: Run pipeline
        run: |
          set -e
          OUTDIR="_ci_out/real_data_smoke/meteo/run_${{ github.run_id }}"
          mkdir -p "$OUTDIR"
          echo "sector=meteo" > "$OUTDIR/sector.txt"
          echo "dataset=$DATASET" > "$OUTDIR/dataset.txt"

          python 04_Code/pipeline/run_real_data_demo.py                 --input "$DATASET"                 --outdir "$OUTDIR"                 --control-mode no_symbolic 2>&1 | tee "$OUTDIR/run_real_data_demo.log"

          python 04_Code/pipeline/tests_causaux.py                 --run-dir "$OUTDIR"                 --alpha "$ALPHA" 2>&1 | tee "$OUTDIR/tests_causaux.log"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_${{ github.run_id }}_meteo
          path: _ci_out/real_data_smoke/meteo
          if-no-files-found: warn
