    name: Real Data Smoke (ORI-C) - Meteo

    on:
      workflow_dispatch:
        inputs:
          dataset:
            description: "Optional explicit CSV path (repo-relative)"
            required: false
            default: ""
          include_bundles:
            description: "Also run bundle processed CSVs (many files)"
            required: false
            default: "false"

      push:
        branches: ["main"]
        paths:
          - "04_Code/pipeline/run_real_data_demo.py"
          - "04_Code/pipeline/tests_causaux.py"
          - "03_Data/real/meteo/**"
          - ".github/workflows/real_data_smoke_meteo.yml"
          - "scripts/resolve_real_datasets.py"

      pull_request:
        paths:
          - "04_Code/pipeline/run_real_data_demo.py"
          - "04_Code/pipeline/tests_causaux.py"
          - "03_Data/real/meteo/**"
          - ".github/workflows/real_data_smoke_meteo.yml"
          - "scripts/resolve_real_datasets.py"

    jobs:
      resolve_matrix:
        runs-on: ubuntu-latest
        outputs:
          matrix: ${{ steps.mk.outputs.matrix }}
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-python@v5
            with:
              python-version: "3.12"
          - id: mk
            run: |
              set -euo pipefail
python scripts/resolve_real_datasets.py --sector "meteo" ${{ github.event.inputs.dataset && format('--dataset 0', github.event.inputs.dataset) || '' }} ${{ github.event.inputs.include_bundles == 'true' && '--include-bundles' || '' }} > _datasets.json
              python - << 'PY'
              import json
              from pathlib import Path
              p = Path("_datasets.json")
              data = json.loads(p.read_text(encoding="utf-8"))
              if not data:
                  raise SystemExit("No datasets found. Add 03_Data/real/meteo/pilot_*/real.csv or pass dataset input.")
              # build matrix objects with stable id
              m = {"include":[{"dataset": d, "id": f"ds{i:02d}"} for i, d in enumerate(data)]}
              print("matrix=" + json.dumps(m))
              PY >> "$GITHUB_OUTPUT"

      run_real_data:
        needs: resolve_matrix
        runs-on: ubuntu-latest
        timeout-minutes: 40
        strategy:
          fail-fast: false
          matrix: ${{ fromJSON(needs.resolve_matrix.outputs.matrix) }}

        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.12"
              cache: "pip"

          - name: Install dependencies
            run: |
              set -euo pipefail
python -m pip install --upgrade pip setuptools wheel
              python -m pip install "numpy>=1.26" "pandas>=2.0" "matplotlib>=3.8" "scipy>=1.11" "pytest>=8.0" "statsmodels>=0.14"

          - name: Run pipeline
            run: |
              set -euo pipefail
DATASET="${{ matrix.dataset }}"
              if [ ! -f "$DATASET" ]; then
                echo "Dataset not found: $DATASET" 1>&2
                echo "Repo tree under 03_Data/real/meteo:" 1>&2
                ls -la "03_Data/real/meteo" || true
                exit 1
              fi

              OUTDIR="_ci_out/real_data_smoke/meteo/run_${{ github.run_id }}_${{ matrix.id }}"
              mkdir -p "$OUTDIR"
              echo "sector=meteo" > "$OUTDIR/sector.txt"
              echo "dataset=$DATASET" > "$OUTDIR/dataset.txt"

              python 04_Code/pipeline/run_real_data_demo.py                 --input "$DATASET"                 --outdir "$OUTDIR"                 --col-time date                 --time-mode index                 --normalize robust                 --control-mode no_symbolic                 --k 2.5                 --m 3                 --baseline-n 50 2>&1 | tee "$OUTDIR/run_real_data_demo.log"

              python 04_Code/pipeline/tests_causaux.py                 --run-dir "$OUTDIR"                 --alpha 0.01                 --lags 1-10                 --pre-horizon 200                 --post-horizon 200                 --k 2.5                 --m 3                 --baseline-n 50                 --block 25                 --n-boot 200                 --seed 123                 --n-steps-min 200                 --pdf 2>&1 | tee "$OUTDIR/tests_causaux.log"

          - name: Upload artifacts
            uses: actions/upload-artifact@v4
            with:
              name: real_data_smoke_${{ github.run_id }}_meteo_${{ matrix.id }}
              path: _ci_out/real_data_smoke/meteo
              if-no-files-found: warn
