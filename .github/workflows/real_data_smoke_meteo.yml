name: Real Data Smoke (ORI-C) - Meteo

on:
  workflow_dispatch:
    inputs:
      control_mode:
        description: "same or no_symbolic"
        required: false
        default: "no_symbolic"
      alpha:
        description: "Alpha for tests_causaux"
        required: false
        default: "0.01"
      pre_horizon:
        description: "Pre horizon (steps)"
        required: false
        default: "500"
      post_horizon:
        description: "Post horizon (steps)"
        required: false
        default: "500"
  push:
    paths:
      - "04_Code/pipeline/run_real_data_demo.py"
      - "04_Code/pipeline/tests_causaux.py"
      - ".github/workflows/real_data_smoke_meteo.yml"

permissions:
  contents: read

jobs:
  real_data_smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r 04_Code/requirements.txt
          if [ -f 04_Code/requirements-dev.txt ]; then
            pip install -r 04_Code/requirements-dev.txt
          fi

      - name: Run pipeline
        run: |
          set -e
          OUTDIR="_ci_out/real_data_smoke/meteo/run_${{ github.run_id }}"
          mkdir -p "$OUTDIR"
          python 04_Code/pipeline/run_real_data_demo.py \
            --input "03_Data/real/meteo/pilot_meteo/real.csv" \
            --outdir "$OUTDIR" \
            --col-time "year" \
            --time-mode "index" \
            --col-O "industrial_production_i15" \
            --col-R "berd_pc_gdp" \
            --col-I "ict_spec_pc_ent_ge10" \
            --normalize "robust" \
            --auto-scale \
            --control-mode "${{ inputs.control_mode }}"
          python 04_Code/pipeline/tests_causaux.py \
            --run-dir "$OUTDIR" \
            --alpha "${{ inputs.alpha }}" \
            --pre-horizon "${{ inputs.pre_horizon }}" \
            --post-horizon "${{ inputs.post_horizon }}" \
            --pdf

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_meteo_${{ github.run_id }}
          path: |
            _ci_out/real_data_smoke/meteo/run_${{ github.run_id }}/tables/**
            _ci_out/real_data_smoke/meteo/run_${{ github.run_id }}/figures/**
            _ci_out/real_data_smoke/meteo/run_${{ github.run_id }}/*.log
            _ci_out/real_data_smoke/meteo/run_${{ github.run_id }}/run_meta.txt
          if-no-files-found: warn
