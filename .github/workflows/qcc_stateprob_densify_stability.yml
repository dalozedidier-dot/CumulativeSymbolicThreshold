name: QCC StateProb Densify + Stability

# ─────────────────────────────────────────────────────────────────────────────
# VARIANT: delegates to the canonical workflow with skip_generate=true
# and a pre-existing dataset path. Preserved for backward compatibility.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      metric:
        description: "Metric (entropy | impurity | one_minus_max)"
        required: false
        default: "entropy"
      threshold:
        description: "CCL threshold"
        required: false
        default: "0.70"
      pooling:
        description: "Pooling mode (by-instance | pooled-by-depth | multi-device)"
        required: false
        default: "pooled-by-depth"
      bootstrap_samples:
        description: "Bootstrap samples"
        required: false
        default: "500"
      resamples:
        description: "Resampling iterations for stability battery"
        required: false
        default: "50"
      subsample_frac:
        description: "Subsample fraction for resampling"
        required: false
        default: "0.7"
      window_sizes:
        description: "Comma-separated depth-point window sizes"
        required: false
        default: "3,5,7"

jobs:
  canonical:
    name: "Densify → Canonical Full Pipeline"
    uses: ./.github/workflows/qcc_canonical_full.yml
    with:
      metric: ${{ inputs.metric }}
      threshold: ${{ inputs.threshold }}
      pooling: ${{ inputs.pooling }}
      bootstrap_samples: ${{ inputs.bootstrap_samples }}
      resamples: ${{ inputs.resamples }}
      subsample_frac: ${{ inputs.subsample_frac }}
      window_sizes: ${{ inputs.window_sizes }}
      mode: "full"
      out_label: "qcc_stateprob_cross"
      skip_generate: true
      dataset_path: "data/qcc/stateprob/04-09-2020.zip"
