name: Real data smoke - economie

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real_data_smoke_economie:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -u
          python -V
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run real data suite (economie)
        shell: bash
        run: |
          set -u -o pipefail

          SECTOR="economie"
          RUN_ID="$GITHUB_RUN_ID"
          ROOT="_ci_out/real_data_smoke/economie/run_${RUN_ID}"
          mkdir -p "$ROOT"
          echo "$SECTOR" > "$ROOT/sector.txt"
          echo "run_id=$RUN_ID" > "$ROOT/run_meta.txt"
          echo "sha=$GITHUB_SHA" >> "$ROOT/run_meta.txt"

          # Fixed, explicit parameters (protocol consistency)
          ALPHA="0.01"
          PRE_H="250"
          POST_H="250"
          LAGS="1-10"
          C_MEAN_POST_MIN="0.1"

          CAP_SCALE="1000.0"
          DEMAND_TO_CAP_RATIO="0.90"
          SIGMA_STAR="0.0"
          TAU="500.0"
          SIGMA_TO_S_ALPHA="0.0008"
          S0="0.20"
          C_BETA="0.40"
          C_GAMMA="0.12"
          K="2.5"
          M="3"
          BASELINE_N="50"
          NORMALIZE="robust"
          TIME_MODE="index"
          CONTROL_MODE="no_symbolic"

          # params trace (always present in artefact)
          : > "$ROOT/params.txt"
          echo "alpha=$ALPHA" >> "$ROOT/params.txt"
          echo "pre_horizon=$PRE_H" >> "$ROOT/params.txt"
          echo "post_horizon=$POST_H" >> "$ROOT/params.txt"
          echo "lags=$LAGS" >> "$ROOT/params.txt"
          echo "c_mean_post_min=$C_MEAN_POST_MIN" >> "$ROOT/params.txt"
          echo "" >> "$ROOT/params.txt"
          echo "cap_scale=$CAP_SCALE" >> "$ROOT/params.txt"
          echo "demand_to_cap_ratio=$DEMAND_TO_CAP_RATIO" >> "$ROOT/params.txt"
          echo "sigma_star=$SIGMA_STAR" >> "$ROOT/params.txt"
          echo "tau=$TAU" >> "$ROOT/params.txt"
          echo "sigma_to_S_alpha=$SIGMA_TO_S_ALPHA" >> "$ROOT/params.txt"
          echo "S0=$S0" >> "$ROOT/params.txt"
          echo "C_beta=$C_BETA" >> "$ROOT/params.txt"
          echo "C_gamma=$C_GAMMA" >> "$ROOT/params.txt"
          echo "k=$K" >> "$ROOT/params.txt"
          echo "m=$M" >> "$ROOT/params.txt"
          echo "baseline_n=$BASELINE_N" >> "$ROOT/params.txt"
          echo "normalize=$NORMALIZE" >> "$ROOT/params.txt"
          echo "time_mode=$TIME_MODE" >> "$ROOT/params.txt"
          echo "control_mode=$CONTROL_MODE" >> "$ROOT/params.txt"

          RC_GLOBAL=0

          run_one() {
            local DS_NAME="$1"
            local INPUT_CSV="$2"
            local COL_TIME="$3"
            local COL_O="$4"
            local COL_R="$5"
            local COL_I="$6"

            local OUTDIR="$ROOT/$DS_NAME"
            mkdir -p "$OUTDIR/logs"
            echo "$INPUT_CSV" > "$OUTDIR/dataset.txt"
            echo "$COL_TIME" > "$OUTDIR/col_time.txt"
            echo "$TIME_MODE" > "$OUTDIR/time_mode.txt"

            # ORI-C run
            python 04_Code/pipeline/run_real_data_demo.py               --input "$INPUT_CSV"               --outdir "$OUTDIR"               --col-time "$COL_TIME"               --time-mode "$TIME_MODE"               --col-O "$COL_O"               --col-R "$COL_R"               --col-I "$COL_I"               --col-demand "demand"               --col-S "S"               --normalize "$NORMALIZE"               --cap-scale "$CAP_SCALE"               --demand-to-cap-ratio "$DEMAND_TO_CAP_RATIO"               --sigma-star "$SIGMA_STAR"               --tau "$TAU"               --sigma-to-S-alpha "$SIGMA_TO_S_ALPHA"               --S0 "$S0"               --C-beta "$C_BETA"               --C-gamma "$C_GAMMA"               --k "$K"               --m "$M"               --baseline-n "$BASELINE_N"               --control-mode "$CONTROL_MODE"               2>&1 | tee "$OUTDIR/logs/run_real_data_demo.log"
            local RC_DEMO="${PIPESTATUS[0]}"
            echo "$RC_DEMO" > "$OUTDIR/rc_demo.txt"
            if [ "$RC_DEMO" -ne 0 ]; then
              RC_GLOBAL=1
            fi

            # Causal tests
            python 04_Code/pipeline/tests_causaux.py               --run-dir "$OUTDIR"               --alpha "$ALPHA"               --pre-horizon "$PRE_H"               --post-horizon "$POST_H"               --lags "$LAGS"               --c-mean-post-min "$C_MEAN_POST_MIN"               --pdf               2>&1 | tee "$OUTDIR/logs/tests_causaux.log"
            local RC_CAUSAL="${PIPESTATUS[0]}"
            echo "$RC_CAUSAL" > "$OUTDIR/rc_causal.txt"
            if [ "$RC_CAUSAL" -ne 0 ]; then
              RC_GLOBAL=1
            fi

            echo "done" > "$OUTDIR/logs/_done.txt"
          }

          run_one "01_pilot" "03_Data/real/economie/pilot_cpi/real.csv" "year" "industrial_production_i15" "berd_pc_gdp" "ict_spec_pc_ent_ge10"
          run_one "02_bundle_v1_FR" "03_Data/real/_bundles/data_real_v1/oric_inputs/oric_inputs_FR.csv" "year" "O" "R" "I"
          run_one "03_bundle_v2_FR" "03_Data/real/_bundles/data_real_v2/oric_inputs/oric_inputs_FR.csv" "year" "O" "R" "I"

          exit "$RC_GLOBAL"

      - name: Upload artefacts (_ci_out)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_economie_${{ github.run_id }}
          path: _ci_out/real_data_smoke/economie/run_${{ github.run_id }}
          if-no-files-found: warn
