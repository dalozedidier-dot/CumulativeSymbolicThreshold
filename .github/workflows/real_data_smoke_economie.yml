name: Real data smoke (economie)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -V
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run datasets
        shell: bash
        run: |
          set +e
          mkdir -p _ci_out/real_data_smoke
          echo "sector=economie" > _ci_out/real_data_smoke/sector.txt

          run_one () {
            local label="$1"
            local csv="$2"
            shift 2
            local extra_args="$@"

            mkdir -p "_ci_out/real_data_smoke/$label"
            echo "CSV=$csv" > "_ci_out/real_data_smoke/$label/dataset.txt"

            python 04_Code/pipeline/run_real_data_demo.py               --input "$csv"               --outdir "_ci_out/real_data_smoke/$label"               --time-mode index               --normalize robust               $extra_args               > "_ci_out/real_data_smoke/$label/run_real_data_demo.log" 2>&1
            echo "rc_demo=$?" > "_ci_out/real_data_smoke/$label/rc_demo.txt"

            if [ -f "_ci_out/real_data_smoke/$label/tables/summary.json" ]; then
              N_STEPS="$(python -c "import json; print(int(json.load(open('_ci_out/real_data_smoke/$label/tables/summary.json'))['n_steps']))" 2>/dev/null)"
              if [ -z "$N_STEPS" ]; then N_STEPS=0; fi

              BASELINE_N="$(python -c "import math; n=int('$N_STEPS'); print(max(10, min(50, int(math.floor(0.05*n)))))")"
              HORIZON="$(python -c "import math; n=int('$N_STEPS'); print(max(10, min(250, int(math.floor(n/2)))))")"
              MAXLAG="$(python -c "import math; n=int('$N_STEPS'); print(max(3, min(10, int(max(3, math.floor(n/10))))))")"
              BLOCK="$(python -c "import math; n=int('$N_STEPS'); print(max(5, min(25, int(max(5, math.floor(n/5))))))")"

              printf "n_steps=%s
baseline_n=%s
horizon=%s
maxlag=%s
block=%s
"                 "$N_STEPS" "$BASELINE_N" "$HORIZON" "$MAXLAG" "$BLOCK"                 > "_ci_out/real_data_smoke/$label/params_dynamic.txt"

              python 04_Code/pipeline/tests_causaux.py                 --run-dir "_ci_out/real_data_smoke/$label"                 --alpha 0.01                 --c-mean-post-min 0.1                 --lags "1-$MAXLAG"                 --maxlag "$MAXLAG"                 --pre-horizon "$HORIZON"                 --post-horizon "$HORIZON"                 --k 2.5                 --m 3                 --baseline-n "$BASELINE_N"                 --block "$BLOCK"                 --n-boot 800                 --seed 123                 --n-steps-min 20                 --pdf                 > "_ci_out/real_data_smoke/$label/tests_causaux.log" 2>&1
              echo "rc_causal=$?" > "_ci_out/real_data_smoke/$label/rc_causal.txt"
            else
              echo "rc_causal=99" > "_ci_out/real_data_smoke/$label/rc_causal.txt"
            fi
          }

          # Pilot (raw proxies)
          run_one "01_pilot" "03_Data/real/economie/pilot_cpi/real.csv"             --col-time year             --col-O industrial_production_i15             --col-R berd_pc_gdp             --col-I ict_spec_pc_ent_ge10             --control-mode no_symbolic

          # Bundles v1/v2 (already ORI-C canonical)
          run_one "02_bundle_v1_FR" "03_Data/real/_bundles/data_real_v1/oric_inputs/oric_inputs_FR.csv"             --col-time t --col-O O --col-R R --col-I I --col-S S --control-mode no_symbolic

          run_one "03_bundle_v2_FR" "03_Data/real/_bundles/data_real_v2/oric_inputs/oric_inputs_FR.csv"             --col-time t --col-O O --col-R R --col-I I --col-S S --control-mode no_symbolic

          python - <<'PY'
          import json
          import pathlib

          base = pathlib.Path("_ci_out/real_data_smoke")
          sector = base.joinpath("sector.txt").read_text(encoding="utf-8").strip().split("=", 1)[-1] if base.joinpath("sector.txt").exists() else "unknown"

          out = {"sector": sector, "datasets": []}
          for d in sorted([p for p in base.iterdir() if p.is_dir() and p.name[:2].isdigit()]):
              v = d / "tables" / "verdict.json"
              if v.exists():
                  j = json.load(open(v, "r", encoding="utf-8"))
                  out["datasets"].append(
                      {
                          "dataset": d.name,
                          "verdict": j.get("verdict"),
                          "binary_detected": j.get("binary_detected"),
                          "threshold_hit_t": j.get("threshold_hit_t"),
                          "reverse_warning": j.get("reverse_warning"),
                          "ok_p_source": (j.get("criteria", {}) or {}).get("ok_p_source"),
                      }
                  )
              else:
                  out["datasets"].append({"dataset": d.name, "verdict": "missing"})
          json.dump(out, open(base / "summary.json", "w", encoding="utf-8"), indent=2)
          PY

          find _ci_out/real_data_smoke -maxdepth 3 -type f -print > _ci_out/real_data_smoke/ps.txt || true
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_economie_${{ github.run_id }}
          path: _ci_out/real_data_smoke
