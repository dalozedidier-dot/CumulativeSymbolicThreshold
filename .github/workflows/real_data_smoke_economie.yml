name: Real Data Smoke (ORI-C) - Economie

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: Optional explicit CSV path (repo-relative). Leave empty to auto-pick pilots.
        required: false
        default: ""
      include_bundles:
        description: Include bundle processed CSVs under 03_Data/real/_bundles
        required: false
        default: "false"
      col_time:
        description: Name of the time column in the CSV (default t)
        required: false
        default: "t"
      time_mode:
        description: index=use 0..n-1 steps, value=use numeric/datetime values
        required: false
        default: "index"
      pre_horizon:
        description: Pre horizon length (steps)
        required: false
        default: "200"
      post_horizon:
        description: Post horizon length (steps)
        required: false
        default: "200"
      n_boot:
        description: Bootstrap replicates
        required: false
        default: "200"
      alpha:
        description: Alpha for causal tests
        required: false
        default: "0.01"

jobs:
  run_real_data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy>=1.26" "pandas>=2.0" "matplotlib>=3.8" "scipy>=1.11" "statsmodels>=0.14"

      - name: Prepare outdir
        run: |
          set -euo pipefail
          mkdir -p "_ci_out/real_data_smoke/economie"
          echo "git_sha=${{ github.sha }}" > "_ci_out/real_data_smoke/economie/run_meta.txt"
          python -V >> "_ci_out/real_data_smoke/economie/run_meta.txt"
          pip -V >> "_ci_out/real_data_smoke/economie/run_meta.txt"
          echo "workspace=$(pwd)" >> "_ci_out/real_data_smoke/economie/run_meta.txt"
          echo "tree 03_Data/real/economie:" >> "_ci_out/real_data_smoke/economie/run_meta.txt"
          ls -la "03_Data/real/economie" >> "_ci_out/real_data_smoke/economie/run_meta.txt" 2>&1 || true

      - name: Resolve datasets
        run: |
          set -euo pipefail
          DATASET_INPUT="${{ github.event.inputs.dataset }}"
          INCLUDE_BUNDLES="${{ github.event.inputs.include_bundles }}"
          EXTRA=""
          if [ "$INCLUDE_BUNDLES" = "true" ]; then
            EXTRA="--include-bundles"
          fi

          if [ -n "$DATASET_INPUT" ]; then
            python scripts/resolve_real_datasets.py --sector "economie" --dataset "$DATASET_INPUT" $EXTRA > _datasets.json
          else
            python scripts/resolve_real_datasets.py --sector "economie" $EXTRA > _datasets.json
          fi

          cat _datasets.json
          python -c "import json; d=json.load(open('_datasets.json')); assert d, 'No datasets found for sector economie'"

          # write one path per line (robust to spaces)
          python -c "import json; [print(x) for x in json.load(open('_datasets.json'))]" > _datasets.txt
          echo "datasets_count=$(wc -l < _datasets.txt)" >> "_ci_out/real_data_smoke/economie/run_meta.txt"

      - name: Run pipeline for each dataset
        run: |
          set -euo pipefail
          PRE="${{ github.event.inputs.pre_horizon }}"
          POST="${{ github.event.inputs.post_horizon }}"
          NBOOT="${{ github.event.inputs.n_boot }}"
          ALPHA="${{ github.event.inputs.alpha }}"
          COL_TIME="${{ github.event.inputs.col_time }}"
          TIME_MODE="${{ github.event.inputs.time_mode }}"

          i=0
          while IFS= read -r ds; do
            [ -z "$ds" ] && continue
            if [ ! -f "$ds" ]; then
              echo "Dataset not found: $ds" 1>&2
              exit 1
            fi

            OUTDIR="_ci_out/real_data_smoke/economie/run_${{ github.run_id }}_ds$(printf "%02d" "$i")"
            mkdir -p "$OUTDIR"
            echo "sector=economie" > "$OUTDIR/sector.txt"
            echo "dataset=$ds" > "$OUTDIR/dataset.txt"
            echo "col_time=$COL_TIME" > "$OUTDIR/col_time.txt"
            echo "time_mode=$TIME_MODE" > "$OUTDIR/time_mode.txt"

            # Run demo (capture exit code explicitly, but keep logs)
            set +e
            python 04_Code/pipeline/run_real_data_demo.py               --input "$ds"               --outdir "$OUTDIR"               --col-time "$COL_TIME"               --time-mode "$TIME_MODE"               --normalize robust               --control-mode no_symbolic               --k 2.5               --m 3               --baseline-n 50 > "$OUTDIR/run_real_data_demo.log" 2>&1
            rc_demo=$?
            set -e
            echo "rc_demo=$rc_demo" > "$OUTDIR/rc_demo.txt"
            if [ $rc_demo -ne 0 ]; then
              echo "run_real_data_demo failed for $ds (rc=$rc_demo)" 1>&2
              tail -n 120 "$OUTDIR/run_real_data_demo.log" 1>&2 || true
              exit $rc_demo
            fi

            set +e
            python 04_Code/pipeline/tests_causaux.py               --run-dir "$OUTDIR"               --alpha "$ALPHA"               --lags 1-10               --pre-horizon "$PRE"               --post-horizon "$POST"               --k 2.5               --m 3               --baseline-n 50               --block 25               --n-boot "$NBOOT"               --seed 123               --n-steps-min 200               --pdf > "$OUTDIR/tests_causaux.log" 2>&1
            rc_causal=$?
            set -e
            echo "rc_causal=$rc_causal" > "$OUTDIR/rc_causal.txt"
            if [ $rc_causal -ne 0 ]; then
              echo "tests_causaux failed for $ds (rc=$rc_causal)" 1>&2
              tail -n 120 "$OUTDIR/tests_causaux.log" 1>&2 || true
              exit $rc_causal
            fi

            i=$((i+1))
          done < _datasets.txt

      - name: Upload artifacts (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_economie_${{ github.run_id }}
          path: _ci_out/real_data_smoke/economie
          if-no-files-found: warn
