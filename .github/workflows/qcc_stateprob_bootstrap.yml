name: QCC StateProb Bootstrap (Ccl)

on:
  workflow_dispatch:
    inputs:
      dataset_zip:
        description: Path to the 04-09-2020.zip dataset inside the repo (or just the filename). If missing, the job will search the repo.
        required: false
        default: data/qcc/stateprob/04-09-2020.zip
      algo:
        description: Algorithm folder (e.g. BV, DJ, QAOA)
        required: false
        default: BV
      device:
        description: Optional device filter (empty = all devices)
        required: false
        default: ""
      shots:
        description: Shots filter (e.g. 8192). Empty = any.
        required: false
        default: "8192"
      t_axis:
        description: Axis for t (Depth or Runtime)
        required: false
        default: Depth
      ccl_metric:
        description: Ccl metric (entropy, one_minus_maxprob, one_minus_purity)
        required: false
        default: entropy
      ccl_threshold:
        description: Threshold for t* detection (0-1)
        required: false
        default: "0.70"
      bootstrap_samples:
        description: Bootstrap samples
        required: false
        default: "500"

jobs:
  stateprob-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show dataset hints
        shell: bash
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Input dataset_zip: ${{ inputs.dataset_zip }}"
          echo "Listing data/qcc/stateprob (if exists)"
          ls -la data/qcc/stateprob || true
          echo "Searching for 04-09-2020.zip (max 20 results)"
          find . -maxdepth 5 -type f -name "04-09-2020.zip" | head -n 20 || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-qcc-stateprob.txt

      - name: Run pipeline
        shell: bash
        run: |
          python tools/qcc_stateprob_bootstrap.py             --dataset-zip "${{ inputs.dataset_zip }}"             --algo "${{ inputs.algo }}"             --device "${{ inputs.device }}"             --shots "${{ inputs.shots }}"             --t-axis "${{ inputs.t_axis }}"             --ccl-metric "${{ inputs.ccl_metric }}"             --ccl-threshold "${{ inputs.ccl_threshold }}"             --bootstrap-samples "${{ inputs.bootstrap_samples }}"             --out-root "05_Results/qcc_stateprob_bootstrap"

      - name: Checks (non interpretatif)
        shell: bash
        run: |
          python tools/qcc_stateprob_checks.py --out-root "05_Results/qcc_stateprob_bootstrap"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_bootstrap_artifact
          path: 05_Results/qcc_stateprob_bootstrap
