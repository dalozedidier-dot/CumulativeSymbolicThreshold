name: QCC StateProb Bootstrap (Ccl)

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset .zip OR extracted directory inside repo"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
      algo:
        description: "Algorithm folder (BV, QAOA, ...)"
        required: true
        default: "BV"
      device:
        description: "Device filter (empty = all)"
        required: false
        default: ""
      shots:
        description: "Shots filter (empty = all)"
        required: false
        default: "8192"
      t_axis:
        description: "t axis (Depth)"
        required: true
        default: "Depth"
      ccl_metric:
        description: "Ccl metric (entropy, impurity, 1-max)"
        required: true
        default: "entropy"
      threshold:
        description: "Threshold for t* detection"
        required: true
        default: "0.70"
      bootstrap:
        description: "Bootstrap samples"
        required: true
        default: "500"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-qcc-stateprob.txt

      - name: Run bootstrap
        run: |
          mkdir -p _ci_out/stateprob
          python tools/qcc_stateprob_bootstrap.py             --dataset "${{ inputs.dataset_path }}"             --algo "${{ inputs.algo }}"             --device "${{ inputs.device }}"             --shots "${{ inputs.shots }}"             --t-axis "${{ inputs.t_axis }}"             --ccl-metric "${{ inputs.ccl_metric }}"             --threshold "${{ inputs.threshold }}"             --bootstrap "${{ inputs.bootstrap }}"             --out-dir "_ci_out/stateprob"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_bootstrap_artifact
          path: _ci_out/stateprob
