name: QCC StateProb Bootstrap (Ccl)

on:
  workflow_dispatch:
    inputs:
      dataset_zip:
        description: Path to dataset zip inside repo
        required: false
        default: data/qcc/stateprob/04-09-2020.zip
      algo:
        description: Algorithm folder (BV, QAOA, ...)
        required: false
        default: BV
      device:
        description: Device filter (empty = all)
        required: false
        default: ""
      shots:
        description: Shots filter (empty = all)
        required: false
        default: "8192"
      t_axis:
        description: t axis (Depth)
        required: false
        default: Depth
      ccl_metric:
        description: Ccl metric (entropy, impurity, 1-max)
        required: false
        default: entropy
      ccl_threshold:
        description: Threshold for t* detection
        required: false
        default: "0.70"
      bootstrap_samples:
        description: Bootstrap resamples
        required: false
        default: "500"

jobs:
  stateprob-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-qcc-stateprob.txt

      - name: Run pipeline
        run: |
          mkdir -p 05_Results/qcc_stateprob_bootstrap
          python tools/qcc_stateprob_bootstrap.py             --dataset-zip "${{ inputs.dataset_zip }}"             --algo "${{ inputs.algo }}"             --device "${{ inputs.device }}"             --shots "${{ inputs.shots }}"             --t-axis "${{ inputs.t_axis }}"             --metric "${{ inputs.ccl_metric }}"             --ccl-threshold "${{ inputs.ccl_threshold }}"             --bootstrap-samples "${{ inputs.bootstrap_samples }}"             --out-dir "05_Results/qcc_stateprob_bootstrap"

      - name: Checks
        run: |
          python tools/qcc_stateprob_checks.py --out-dir "05_Results/qcc_stateprob_bootstrap"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_bootstrap_artifact
          path: 05_Results/qcc_stateprob_bootstrap
