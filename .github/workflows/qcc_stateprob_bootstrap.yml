name: QCC StateProb Bootstrap (Ccl)

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset zip or extracted folder inside repo"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
      algo:
        description: "Algorithm folder (empty = all)"
        required: false
        default: ""
      device_filter:
        description: "Device filter (empty = all)"
        required: false
        default: ""
      shots_filter:
        description: "Shots filter (empty = all)"
        required: false
        default: ""
      t_axis:
        description: "t axis (Depth or Runtime)"
        required: true
        default: "Depth"
      ccl_metric:
        description: "Ccl metric (entropy, impurity, 1-max)"
        required: true
        default: "entropy"
      ccl_threshold:
        description: "Threshold for t* detection"
        required: true
        default: "0.70"
      bootstrap_samples:
        description: "Bootstrap samples"
        required: true
        default: "500"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-qcc-stateprob.txt

      - name: Run StateProb pipeline
        run: |
          python tools/qcc_stateprob_bootstrap.py             --dataset "${{ inputs.dataset_path }}"             --algo "${{ inputs.algo }}"             --device-filter "${{ inputs.device_filter }}"             --shots-filter "${{ inputs.shots_filter }}"             --t-axis "${{ inputs.t_axis }}"             --ccl-metric "${{ inputs.ccl_metric }}"             --ccl-threshold "${{ inputs.ccl_threshold }}"             --bootstrap-samples "${{ inputs.bootstrap_samples }}"             --out-dir "05_Results/qcc_stateprob_bootstrap"

      - name: Checks (non interpretatif)
        run: |
          python tools/qcc_stateprob_checks.py --out-dir "05_Results/qcc_stateprob_bootstrap"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_bootstrap_artifact
          path: 05_Results/qcc_stateprob_bootstrap
