name: Sector Suite — Infrastructure (grid, traffic, finance)

# Smoke CI on push/PR; full_statistical available via workflow_dispatch.
# Each pilot runs independently. Global verdict is printed to the step summary.

on:
  push:
    branches: ["main"]
    paths:
      - "04_Code/sector/infra/**"
      - "04_Code/sector/shared/**"
      - "04_Code/pipeline/**"
      - "src/**"
  pull_request:
    paths:
      - "04_Code/sector/infra/**"
      - "04_Code/sector/shared/**"
      - "04_Code/pipeline/**"
      - "src/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: smoke_ci (fast) or full_statistical (thorough)"
        required: false
        default: "smoke_ci"
        type: choice
        options:
          - smoke_ci
          - full_statistical
      seed:
        description: "Random seed"
        required: false
        default: "1234"

concurrency:
  group: sector-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Syntax gate ─────────────────────────────────────────────────────────────
  compileall:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax (compileall)
        run: python -m compileall 04_Code -q

  # ── Infra sector pilots ──────────────────────────────────────────────────────
  infra_pilot:
    needs: compileall
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        pilot_id: [grid, traffic, finance]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install \
            "numpy>=1.26" "pandas>=2.0" "scipy>=1.11" \
            "statsmodels>=0.14" "matplotlib>=3.8" "pytest>=8.0"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f 04_Code/requirements.txt ]; then pip install -r 04_Code/requirements.txt; fi

      - name: Run infra/${{ matrix.pilot_id }} (${{ github.event.inputs.mode || 'smoke_ci' }})
        id: run_pilot
        run: |
          set -eo pipefail
          MODE="${{ github.event.inputs.mode || 'smoke_ci' }}"
          SEED="${{ github.event.inputs.seed || '1234' }}"
          OUTDIR="_sector_infra_out/${{ matrix.pilot_id }}"
          mkdir -p "$OUTDIR"

          PYTHONPATH=src python 04_Code/sector/infra/run_sector_suite.py \
            --pilot-id "${{ matrix.pilot_id }}" \
            --outdir "$OUTDIR" \
            --seed "$SEED" \
            --mode "$MODE" \
            2>&1 | tee "$OUTDIR/run.log"

          VERDICT=$(cat "$OUTDIR/verdict.txt" 2>/dev/null || echo "UNKNOWN")
          echo "global_verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          echo "infra/${{ matrix.pilot_id }} → ${VERDICT}"

      - name: Write step summary
        if: always()
        env:
          PILOT: ${{ matrix.pilot_id }}
          VERDICT: ${{ steps.run_pilot.outputs.global_verdict }}
          MODE: ${{ github.event.inputs.mode || 'smoke_ci' }}
        run: |
          python - <<'PYEOF'
          import json, glob, os

          pilot   = os.environ["PILOT"]
          verdict = os.environ.get("VERDICT", "UNKNOWN")
          mode    = os.environ.get("MODE", "smoke_ci")
          outdir  = f"_sector_infra_out/{pilot}"

          icon = {"ACCEPT": "✅", "REJECT": "❌", "INDETERMINATE": "⚠️"}.get(verdict, "❓")

          detail = {}
          for f in glob.glob(f"{outdir}/**/sector_global_verdict.json", recursive=True):
              try:
                  detail = json.loads(open(f).read())
              except Exception:
                  pass
              break

          md = f"## Infra Sector: {pilot} — {icon} {verdict} (`{mode}`)\n\n"
          if detail:
              md += "| key | value |\n|-----|-------|\n"
              for k, v in detail.items():
                  md += f"| `{k}` | `{v}` |\n"

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if step_summary:
              with open(step_summary, "a") as fh:
                  fh.write(md)
          print(md)
          PYEOF

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sector_infra_${{ matrix.pilot_id }}_${{ github.run_id }}
          path: _sector_infra_out/${{ matrix.pilot_id }}
          if-no-files-found: warn
