name: Repair CI metrics (one-shot, safe)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Repair (write repaired copies)
        run: |
          set -euo pipefail
          python -m tools.repair_ci_metrics --ci-metrics-dir ci_metrics

      - name: Commit repaired copies
        run: |
          set -euo pipefail
          git config user.name "ori-c-bot"
          git config user.email "actions@users.noreply.github.com"
          git add ci_metrics/runs_index_repaired.csv ci_metrics/history_repaired.csv ci_metrics/repair_report.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "ci_metrics: add repaired copies + repair report"
          git push
