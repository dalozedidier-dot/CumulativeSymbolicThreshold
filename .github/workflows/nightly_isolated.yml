name: Nightly Proof — Isolated T1..T8

# Runs each test in its own job (matrix). Each job produces:
#   verdict.txt  manifest.json  seed_table.csv
#   tables/verdict.json  tables/summary.json (statistical tests)
#
# Output structure (combined artifact):
#   05_Results/isolated_tests/<RUN_ID>/
#     T1_noyau_demand_shock/  ...  T8_reinjection_recovery_on_C/
#     global_summary.json
#
# Seeds: seed(Tn) = base_seed + fixed_offset  (distinct per-test, ex ante)
# Volume: n_runs=60 for statistical tests (>= N_min=50) → full_statistical
#         n_runs=1  for fixed_data tests (T2/T3, deterministic) → full_statistical
#
# CI jobs fail if:
#   - any required file is missing for a test
#   - seeds are not all distinct across tests
#   - run_mode is incoherent (smoke_ci detected where full expected)

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      base_seed:
        description: "Base seed for all tests (default: 1234)"
        default: "1234"

concurrency:
  group: nightly-isolated
  cancel-in-progress: false

env:
  BASE_SEED: ${{ inputs.base_seed || '1234' }}
  N_SYMBOLIC: "60"   # n_runs for statistical tests (>= N_min=50 → full_statistical)
  N_SWEEP: "50"      # n for T7 sweep + bootstrap (exempt from N_min by construction)
  T_STEPS: "260"     # simulation length

jobs:
  # ── Matrix: one job per test ──────────────────────────────────────────────
  isolated_test:
    name: "${{ matrix.short_id }} — ${{ matrix.test_id }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - short_id: T1
            test_id: T1_noyau_demand_shock
            script: run_ori_c_demo.py
            test_type: statistical
            seed_offset: 0

          - short_id: T2
            test_id: T2_threshold_demo_on_dataset
            script: run_synthetic_demo.py
            test_type: fixed_data
            seed_offset: 1

          - short_id: T3
            test_id: T3_robustness_on_dataset
            script: run_robustness.py
            test_type: fixed_data
            seed_offset: 2

          - short_id: T4
            test_id: T4_symbolic_S_rich_vs_poor_on_C
            script: run_symbolic_T4_s_rich_poor.py
            test_type: statistical
            seed_offset: 3

          - short_id: T5
            test_id: T5_symbolic_injection_effect_on_C
            script: run_symbolic_T5_injection.py
            test_type: statistical
            seed_offset: 4

          - short_id: T6
            test_id: T6_symbolic_cut_on_C
            script: run_ori_c_demo.py
            test_type: statistical
            seed_offset: 5

          - short_id: T7
            test_id: T7_progressive_S_to_C_threshold
            script: run_symbolic_T7_progressive_sweep.py
            test_type: statistical
            seed_offset: 6

          - short_id: T8
            test_id: T8_reinjection_recovery_on_C
            script: run_reinjection_demo.py
            test_type: statistical
            seed_offset: 7

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f 04_Code/requirements.txt ]; then
            python -m pip install -r 04_Code/requirements.txt
          fi

      - name: Run ${{ matrix.test_id }} in isolation
        run: |
          set -eo pipefail
          BASE_SEED=${{ env.BASE_SEED }}
          SEED=$((BASE_SEED + ${{ matrix.seed_offset }}))
          T_STEPS=${{ env.T_STEPS }}
          T0=$((T_STEPS * 35 / 100))
          OUTDIR=05_Results/isolated_tests/${{ github.run_id }}/${{ matrix.test_id }}
          mkdir -p "$OUTDIR"

          case "${{ matrix.test_id }}" in

            T1_noyau_demand_shock)
              PYTHONPATH=src python 04_Code/pipeline/run_ori_c_demo.py \
                --outdir "$OUTDIR" \
                --seed-base $SEED \
                --n-runs ${{ env.N_SYMBOLIC }} \
                --n-steps $T_STEPS \
                --t0 $T0 \
                --intervention demand_shock \
                --intervention-duration $((T_STEPS * 40 / 100)) \
                --sigma-star 0 \
                --tau 0 \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

            T2_threshold_demo_on_dataset)
              PYTHONPATH=src python 04_Code/pipeline/run_synthetic_demo.py \
                --outdir "$OUTDIR" \
                --input 03_Data/synthetic/synthetic_with_transition.csv \
                --seed $SEED \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

            T3_robustness_on_dataset)
              PYTHONPATH=src python 04_Code/pipeline/run_robustness.py \
                --outdir "$OUTDIR" \
                --input 03_Data/synthetic/synthetic_with_transition.csv \
                --seed $SEED \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

            T4_symbolic_S_rich_vs_poor_on_C)
              PYTHONPATH=src python 04_Code/pipeline/run_symbolic_T4_s_rich_poor.py \
                --outdir "$OUTDIR" \
                --n ${{ env.N_SYMBOLIC }} \
                --seed $SEED \
                --t-steps $T_STEPS \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

            T5_symbolic_injection_effect_on_C)
              PYTHONPATH=src python 04_Code/pipeline/run_symbolic_T5_injection.py \
                --outdir "$OUTDIR" \
                --n ${{ env.N_SYMBOLIC }} \
                --seed $SEED \
                --t-steps $T_STEPS \
                --t0 $((T_STEPS * 45 / 100)) \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

            T6_symbolic_cut_on_C)
              PYTHONPATH=src python 04_Code/pipeline/run_ori_c_demo.py \
                --outdir "$OUTDIR" \
                --seed-base $SEED \
                --n-runs ${{ env.N_SYMBOLIC }} \
                --n-steps $T_STEPS \
                --t0 $((T_STEPS * 45 / 100)) \
                --intervention symbolic_cut \
                --intervention-duration $((T_STEPS * 25 / 100)) \
                --sigma-star 0 \
                --tau 0 \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

            T7_progressive_S_to_C_threshold)
              PYTHONPATH=src python 04_Code/pipeline/run_symbolic_T7_progressive_sweep.py \
                --outdir "$OUTDIR" \
                --n ${{ env.N_SWEEP }} \
                --seed $SEED \
                --t-steps $T_STEPS \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

            T8_reinjection_recovery_on_C)
              PYTHONPATH=src python 04_Code/pipeline/run_reinjection_demo.py \
                --outdir "$OUTDIR" \
                --seed $SEED \
                --n-runs ${{ env.N_SYMBOLIC }} \
                --n-steps $T_STEPS \
                --intervention-point $((T_STEPS * 35 / 100)) \
                --reinjection-point $((T_STEPS * 65 / 100)) \
                2>&1 | tee "$OUTDIR/run.log"
              ;;

          esac

      - name: Write manifest.json and seed_table.csv
        env:
          SEED_OFFSET: ${{ matrix.seed_offset }}
          TEST_ID: ${{ matrix.test_id }}
          SHORT_ID: ${{ matrix.short_id }}
          SCRIPT: ${{ matrix.script }}
          TEST_TYPE: ${{ matrix.test_type }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BASE_SEED=${{ env.BASE_SEED }}
          SEED=$((BASE_SEED + ${{ matrix.seed_offset }}))
          N_RUNS=${{ matrix.test_type == 'fixed_data' && '1' || env.N_SYMBOLIC }}
          OUTDIR=05_Results/isolated_tests/${{ github.run_id }}/${{ matrix.test_id }}

          SEED=$SEED N_RUNS=$N_RUNS OUTDIR=$OUTDIR BASE_SEED=$BASE_SEED \
          python - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone

          seed      = int(os.environ["SEED"])
          n_runs    = int(os.environ["N_RUNS"])
          outdir    = os.environ["OUTDIR"]
          base_seed = int(os.environ["BASE_SEED"])
          test_type = os.environ["TEST_TYPE"]
          offset    = int(os.environ["SEED_OFFSET"])

          # Read verdict produced by the script
          verdict = "UNKNOWN"
          vt = os.path.join(outdir, "verdict.txt")
          if os.path.exists(vt):
              verdict = open(vt).read().strip()
          else:
              vj = os.path.join(outdir, "tables", "verdict.json")
              if os.path.exists(vj):
                  verdict = json.loads(open(vj).read()).get("verdict", "UNKNOWN")

          # Determine run_mode
          N_MIN = 50
          if test_type == "fixed_data":
              run_mode = "full_statistical"  # fixed_data: deterministic, always valid
          elif n_runs >= N_MIN:
              run_mode = "full_statistical"
          else:
              run_mode = "smoke_ci"

          manifest = {
              "test_id":      os.environ["TEST_ID"],
              "short_id":     os.environ["SHORT_ID"],
              "script":       os.environ["SCRIPT"],
              "test_type":    test_type,
              "run_mode":     run_mode,
              "seed":         seed,
              "seed_formula": f"base_seed + {offset}",
              "base_seed":    base_seed,
              "seed_offset":  offset,
              "n_runs":       n_runs,
              "N_min":        N_MIN,
              "n_runs_ok":    test_type == "fixed_data" or n_runs >= N_MIN,
              "verdict":      verdict,
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "commit_sha":   os.environ["COMMIT_SHA"],
              "run_id":       os.environ["RUN_ID"],
              "dataset_id":   (
                  "synthetic_with_transition"
                  if test_type == "fixed_data"
                  else "simulation"
              ),
              "forbidden_report_labels": ["full support", "full empirical support"],
          }

          with open(os.path.join(outdir, "manifest.json"), "w") as f:
              json.dump(manifest, f, indent=2)

          # seed_table.csv — one row per test (ex-ante format)
          with open(os.path.join(outdir, "seed_table.csv"), "w") as f:
              f.write("test_id,seed,seed_formula,n_runs,test_type,run_mode\n")
              f.write(f"{os.environ['TEST_ID']},{seed},base+{offset},{n_runs},{test_type},{run_mode}\n")

          print(f"manifest.json  → {outdir}/manifest.json")
          print(f"seed_table.csv → {outdir}/seed_table.csv")
          print(f"verdict={verdict}  run_mode={run_mode}  seed={seed}")
          PYEOF

      - name: Validate required fields (hard gate)
        run: |
          OUTDIR=05_Results/isolated_tests/${{ github.run_id }}/${{ matrix.test_id }}
          FAIL=0

          # Required for ALL tests
          for f in verdict.txt manifest.json seed_table.csv tables/verdict.json; do
            if [ ! -f "$OUTDIR/$f" ]; then
              echo "MISSING: $f"
              FAIL=1
            fi
          done

          # summary.json required for statistical tests only
          if [ "${{ matrix.test_type }}" = "statistical" ]; then
            if [ ! -f "$OUTDIR/tables/summary.json" ]; then
              echo "MISSING (statistical): tables/summary.json"
              FAIL=1
            fi
          fi

          # run_mode must not be smoke_ci (n=60 >= N_min=50 for statistical)
          if [ -f "$OUTDIR/manifest.json" ]; then
            RUN_MODE=$(python -c "import json; print(json.load(open('$OUTDIR/manifest.json')).get('run_mode',''))")
            if [ "$RUN_MODE" = "smoke_ci" ]; then
              echo "FAIL: run_mode=smoke_ci — n_runs too low for full_statistical"
              FAIL=1
            fi
          fi

          if [ $FAIL -eq 0 ]; then
            VERDICT=$(cat "$OUTDIR/verdict.txt")
            echo "OK — ${{ matrix.test_id }}: verdict=$VERDICT  run_mode=$RUN_MODE"
          fi
          exit $FAIL

      - name: Upload isolated test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: isolated_${{ matrix.short_id }}_${{ github.run_id }}
          path: 05_Results/isolated_tests/${{ github.run_id }}/${{ matrix.test_id }}
          retention-days: 30
          if-no-files-found: warn

  # ── Aggregation: global_summary.json + seed distinctness gate ────────────
  aggregate:
    name: "Aggregate — global_summary.json + validation"
    needs: [isolated_test]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all isolated test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: isolated_*_${{ github.run_id }}
          path: _isolated
          merge-multiple: false

      - name: Create global_summary.json and validate
        env:
          BASE_SEED: ${{ env.BASE_SEED }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python - <<'PYEOF'
          import json, os, glob, sys
          from datetime import datetime, timezone

          base_dir  = "_isolated"
          base_seed = int(os.environ.get("BASE_SEED", "1234"))
          run_id    = os.environ.get("RUN_ID", "")
          commit_sha = os.environ.get("COMMIT_SHA", "")

          ORDERED = [
              ("T1", "T1_noyau_demand_shock"),
              ("T2", "T2_threshold_demo_on_dataset"),
              ("T3", "T3_robustness_on_dataset"),
              ("T4", "T4_symbolic_S_rich_vs_poor_on_C"),
              ("T5", "T5_symbolic_injection_effect_on_C"),
              ("T6", "T6_symbolic_cut_on_C"),
              ("T7", "T7_progressive_S_to_C_threshold"),
              ("T8", "T8_reinjection_recovery_on_C"),
          ]

          tests_out   = {}
          seeds_seen  = {}           # seed → short_id
          seeds_ok    = True
          fields_ok   = True
          n_accept = n_reject = n_indet = n_missing = 0

          REQUIRED_ALL  = ["verdict.txt", "manifest.json", "seed_table.csv", "tables/verdict.json"]
          REQUIRED_STAT = ["tables/summary.json"]

          for short, tid in ORDERED:
              # Artifact dir name: isolated_T1_<run_id>
              art_pattern = os.path.join(base_dir, f"isolated_{short}_{run_id}")
              art_dir = art_pattern if os.path.isdir(art_pattern) else None
              # fallback: glob (run_id may differ in format)
              if art_dir is None:
                  hits = glob.glob(os.path.join(base_dir, f"isolated_{short}_*"))
                  art_dir = hits[0] if hits else None

              if art_dir is None:
                  tests_out[short] = {"status": "MISSING_ARTIFACT", "verdict": "MISSING"}
                  n_missing += 1
                  fields_ok = False
                  print(f"MISSING artifact for {short}")
                  continue

              manifest_path = os.path.join(art_dir, "manifest.json")
              if not os.path.exists(manifest_path):
                  tests_out[short] = {"status": "MISSING_MANIFEST", "verdict": "MISSING"}
                  n_missing += 1
                  fields_ok = False
                  print(f"MISSING manifest for {short}")
                  continue

              m = json.loads(open(manifest_path).read())
              seed    = m.get("seed")
              verdict = m.get("verdict", "UNKNOWN")
              ttype   = m.get("test_type", "")
              mode    = m.get("run_mode", "")

              # Seed uniqueness check
              if seed in seeds_seen:
                  seeds_ok = False
                  print(f"SEED COLLISION: {short} and {seeds_seen[seed]} both use seed={seed}")
              else:
                  seeds_seen[seed] = short

              # Required files
              required = list(REQUIRED_ALL)
              if ttype == "statistical":
                  required += REQUIRED_STAT
              missing_files = [f for f in required if not os.path.exists(os.path.join(art_dir, f))]
              if missing_files:
                  fields_ok = False
                  print(f"{short}: MISSING files: {missing_files}")

              # run_mode conformance
              mode_ok = mode != "smoke_ci"
              if not mode_ok:
                  fields_ok = False
                  print(f"{short}: run_mode=smoke_ci — incoherent for proof run")

              tests_out[short] = {
                  "test_id":       tid,
                  "test_type":     ttype,
                  "seed":          seed,
                  "seed_formula":  m.get("seed_formula"),
                  "n_runs":        m.get("n_runs"),
                  "run_mode":      mode,
                  "run_mode_ok":   mode_ok,
                  "verdict":       verdict,
                  "missing_files": missing_files,
                  "fields_complete": len(missing_files) == 0,
              }

              if   verdict == "ACCEPT":        n_accept += 1
              elif verdict == "REJECT":        n_reject += 1
              elif verdict == "INDETERMINATE": n_indet  += 1
              else:                            n_missing += 1

          global_summary = {
              "run_id":          run_id,
              "commit_sha":      commit_sha,
              "timestamp_utc":   datetime.now(timezone.utc).isoformat(),
              "base_seed":       base_seed,
              "seed_strategy":   "distinct per-test seeds (base+offset)",
              "run_mode":        "full_statistical",
              "N_min":           50,
              "n_accept":        n_accept,
              "n_reject":        n_reject,
              "n_indeterminate": n_indet,
              "n_missing":       n_missing,
              "all_8_accept":    n_accept == 8,
              "seeds_distinct":  seeds_ok,
              "all_fields_present": fields_ok,
              "tests":           tests_out,
              "forbidden_report_labels": ["full support", "full empirical support"],
              "forbidden_note": (
                  "Use only the machine-computed support_level tokens. "
                  "'full support' and 'full empirical support' are editorial "
                  "claims not produced by this pipeline."
              ),
          }

          os.makedirs("_isolated", exist_ok=True)
          out = "_isolated/global_summary.json"
          with open(out, "w") as f:
              json.dump(global_summary, f, indent=2)
          print(json.dumps(global_summary, indent=2))

          # Hard gates
          fail = False
          if not seeds_ok:
              print("\nFAIL: seeds are NOT all distinct across tests")
              fail = True
          if not fields_ok:
              print("\nFAIL: required fields missing or run_mode incoherent")
              fail = True
          if n_missing > 0:
              print(f"\nFAIL: {n_missing} test(s) missing or failed to produce verdict")
              fail = True
          if fail:
              sys.exit(1)
          print(f"\nOK: {n_accept}/8 ACCEPT  |  seeds distinct  |  all fields present")
          PYEOF

      - name: Write GitHub step summary
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os

          f = "_isolated/global_summary.json"
          if not os.path.exists(f):
              print("global_summary.json not found — cannot write summary")
              raise SystemExit(0)

          d     = json.loads(open(f).read())
          tests = d.get("tests", {})

          rows = ""
          for short in ["T1", "T2", "T3", "T4", "T5", "T6", "T7", "T8"]:
              t = tests.get(short, {})
              verdict  = t.get("verdict", "MISSING")
              icon     = "✅" if verdict == "ACCEPT" else ("⚠️" if verdict == "INDETERMINATE" else "❌")
              seed     = t.get("seed", "?")
              sf       = t.get("seed_formula", "?")
              n_runs   = t.get("n_runs", "?")
              ttype    = t.get("test_type", "?")
              mode     = t.get("run_mode", "?")
              rows += f"| `{short}` | `{seed}` ({sf}) | {n_runs} | {ttype} | `{mode}` | `{verdict}` | {icon} |\n"

          seeds_icon  = "OK" if d.get("seeds_distinct")    else "FAIL"
          fields_icon = "OK" if d.get("all_fields_present") else "FAIL"
          n_ok        = d.get("n_accept", 0)
          all_ok      = "8/8 ACCEPT" if d.get("all_8_accept") else f"{n_ok}/8 ACCEPT"

          lines = [
              "## ORI-C Nightly — Isolated T1..T8",
              "",
              f"Result: {all_ok} | Seeds distinct: {seeds_icon} | All fields present: {fields_icon}",
              "",
              "| Test | Seed (formula) | n_runs | type | run_mode | verdict | status |",
              "|------|----------------|--------|------|----------|---------|--------|",
          ]
          lines += rows.strip().splitlines()
          lines += [
              "",
              f"**base_seed:** `{d.get('base_seed')}` — seed(Tn) = base_seed + fixed_offset (distinct per-test, ex ante)",
              f"**run_mode:** `{d.get('run_mode')}` — n_runs >= N_min={d.get('N_min')} for all statistical tests",
              "",
              "### Labels FORBIDDEN in any report derived from any run",
              "- `full support`",
              "- `full empirical support`",
              "",
              "Use only machine-computed `support_level` tokens from `manifest.json`.",
          ]
          md = "\n".join(lines)

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if step_summary:
              with open(step_summary, "a") as fh:
                  fh.write(md)
          print(md)
          PYEOF

      - name: Upload combined artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly_isolated_${{ github.run_id }}
          path: _isolated
          retention-days: 30
          if-no-files-found: warn
