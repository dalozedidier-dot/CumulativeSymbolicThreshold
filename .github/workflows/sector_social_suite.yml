name: Sector Social Suite

on:
  push:
    paths:
      - '04_Code/sector/social/**'
      - '04_Code/sector/shared/**'
      - '03_Data/sector_social/**'
      - '.github/workflows/sector_social_suite.yml'
  pull_request:
    paths:
      - '04_Code/sector/social/**'
      - '04_Code/sector/shared/**'
  schedule:
    - cron: '0 6 * * 3'   # weekly Wednesday 06:00 UTC
  workflow_dispatch:
    inputs:
      pilot_id:
        description: 'Pilot to run (twitter_amzn | twitter_fb | all)'
        required: false
        default: 'all'
      mode:
        description: 'Run mode (smoke_ci | full_statistical)'
        required: false
        default: 'smoke_ci'

jobs:
  social-sector:
    name: Social sector · ${{ matrix.pilot }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pilot: [twitter_amzn, twitter_fb]

    steps:
      - uses: actions/checkout@v4
      - name: Ensure _ci_out exists
        run: mkdir -p _ci_out

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r 04_Code/requirements-dev.txt

      - name: Run social sector suite · ${{ matrix.pilot }}
        env:
          PYTHONPATH: 04_Code
        run: |
          python 04_Code/sector/social/run_sector_suite.py \
            --pilot-id ${{ matrix.pilot }} \
            --outdir   _sector_social_out/${{ matrix.pilot }} \
            --seed     1234 \
            --mode     ${{ github.event.inputs.mode || 'smoke_ci' }}

      - name: Upload artifacts · ${{ matrix.pilot }}
        uses: actions/upload-artifact@v7
        with:
          name: sector_social_${{ matrix.pilot }}_${{ github.run_id }}
          path: |
            _sector_social_out/${{ matrix.pilot }}/
          if-no-files-found: error
