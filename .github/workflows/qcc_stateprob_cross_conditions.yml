name: QCC StateProb Cross-Conditions

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset (.zip or extracted dir) inside repo"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
      auto_plan:
        description: "Auto select best (algo, device) then compare shots"
        required: true
        default: "true"
      algo:
        description: "Algo filter (optional if auto_plan=true)"
        required: false
        default: ""
      device_filter:
        description: "Device filter (optional)"
        required: false
        default: ""
      shots_filter:
        description: "Shots filter (optional)"
        required: false
        default: ""
      metric:
        description: "Ccl metric"
        required: true
        default: "entropy"
      threshold:
        description: "Ccl threshold for t*"
        required: true
        default: "0.70"
      bootstrap_samples:
        description: "Bootstrap samples"
        required: true
        default: "500"

jobs:
  cross:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-qcc-stateprob.txt ]; then
            pip install -r requirements-qcc-stateprob.txt
          else
            pip install numpy pandas matplotlib
          fi

      - name: Run cross-conditions
        env:
          DATASET_PATH: ${{ inputs.dataset_path }}
          AUTO_PLAN: ${{ inputs.auto_plan }}
          ALGO: ${{ inputs.algo }}
          DEVICE_FILTER: ${{ inputs.device_filter }}
          SHOTS_FILTER: ${{ inputs.shots_filter }}
          METRIC: ${{ inputs.metric }}
          THRESHOLD: ${{ inputs.threshold }}
          BOOTSTRAP_SAMPLES: ${{ inputs.bootstrap_samples }}
        run: |
          set -euo pipefail
          OUT="_ci_out/qcc_stateprob_cross"
          mkdir -p "$OUT"

          ARGS=(--dataset "$DATASET_PATH" --out-root "$OUT" --metric "$METRIC" --threshold "$THRESHOLD" --bootstrap-samples "$BOOTSTRAP_SAMPLES")

          # auto-plan flag handling
          if [ "${AUTO_PLAN,,}" = "true" ]; then
            ARGS+=(--auto-plan)
          else
            ARGS+=(--no-auto-plan)
          fi

          # optional filters (only add if non-empty)
          if [ -n "$ALGO" ]; then
            ARGS+=(--algo "$ALGO")
          fi
          if [ -n "$DEVICE_FILTER" ]; then
            ARGS+=(--device "$DEVICE_FILTER")
          fi
          if [ -n "$SHOTS_FILTER" ]; then
            ARGS+=(--shots "$SHOTS_FILTER")
          fi

          python -m tools.qcc_stateprob_cross_conditions "${ARGS[@]}"

      - name: Checks
        run: |
          python -m tools.qcc_stateprob_cross_checks --out-root "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
