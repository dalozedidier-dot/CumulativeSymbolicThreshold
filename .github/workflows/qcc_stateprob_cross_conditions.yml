name: QCC StateProb Cross-Conditions

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset (.zip or extracted dir) in repo"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
      auto_plan:
        description: "Auto-select best (algo,device) and compare all shots"
        required: true
        default: "true"
      algo:
        description: "Algorithm filter (empty = all; ignored if auto_plan=true)"
        required: false
        default: ""
      device_filter:
        description: "Device filter (empty = all; ignored if auto_plan=true)"
        required: false
        default: ""
      shots_filter:
        description: "Shots filter (empty = all; ignored if auto_plan=true)"
        required: false
        default: ""
      metric:
        description: "Ccl metric: entropy | one_minus_max | impurity"
        required: true
        default: "entropy"
      threshold:
        description: "Ccl threshold for t* detection"
        required: true
        default: "0.70"
      bootstrap_samples:
        description: "Bootstrap resamples"
        required: true
        default: "500"

jobs:
  cross:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -V
          python -m pip install --upgrade pip
          if [ -f requirements-qcc-stateprob.txt ]; then
            python -m pip install -r requirements-qcc-stateprob.txt
          elif [ -f requirements-qcc-stateprob-cross.txt ]; then
            python -m pip install -r requirements-qcc-stateprob-cross.txt
          else
            python -m pip install numpy pandas matplotlib
          fi

      - name: Run cross-conditions
        env:
          DATASET_PATH: ${{ inputs.dataset_path }}
          AUTO_PLAN: ${{ inputs.auto_plan }}
          ALGO: ${{ inputs.algo }}
          DEVICE_FILTER: ${{ inputs.device_filter }}
          SHOTS_FILTER: ${{ inputs.shots_filter }}
          METRIC: ${{ inputs.metric }}
          THRESHOLD: ${{ inputs.threshold }}
          BOOTSTRAP_SAMPLES: ${{ inputs.bootstrap_samples }}
        run: |
          set -euo pipefail
          mkdir -p _ci_out/qcc_stateprob_cross

          EXTRA_PLAN=""
          if [ "${AUTO_PLAN}" = "true" ]; then
            EXTRA_PLAN="--auto-plan"
          else
            EXTRA_PLAN="--no-auto-plan"
          fi

          python tools/qcc_stateprob_cross_conditions.py             --dataset "${DATASET_PATH}"             --out-root "_ci_out/qcc_stateprob_cross"             --algo "${ALGO}"             --device-filter "${DEVICE_FILTER}"             --shots-filter "${SHOTS_FILTER}"             --metric "${METRIC}"             --threshold "${THRESHOLD}"             --bootstrap-samples "${BOOTSTRAP_SAMPLES}"             ${EXTRA_PLAN}

      - name: Checks
        run: |
          set -euo pipefail
          python tools/qcc_stateprob_cross_checks.py --out-root "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
