name: QCC StateProb Cross-Conditions

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset (.zip or extracted dir) inside repo"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
      auto_plan:
        description: "Auto-pick best (algo, device) and compare all shots"
        required: true
        default: "true"
      algo:
        description: "Filter algo (e.g. SIMON). Ignored if auto_plan=true. Empty=all"
        required: false
        default: ""
      device_filter:
        description: "Filter device (e.g. ibmqx2). Ignored if auto_plan=true. Empty=all"
        required: false
        default: ""
      shots_filter:
        description: "Comma-separated shots (e.g. 1024,2048,8192). Empty=all"
        required: false
        default: ""
      metric:
        description: "Ccl metric: entropy|one_minus_max|one_minus_purity"
        required: true
        default: "entropy"
      threshold:
        description: "Ccl threshold for t*"
        required: true
        default: "0.70"
      bootstrap_samples:
        description: "Bootstrap resamples"
        required: true
        default: "500"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Run cross-conditions
        env:
          DATASET_PATH: ${{ github.event.inputs.dataset_path }}
          AUTO_PLAN: ${{ github.event.inputs.auto_plan }}
          ALGO: ${{ github.event.inputs.algo }}
          DEVICE_FILTER: ${{ github.event.inputs.device_filter }}
          SHOTS_FILTER: ${{ github.event.inputs.shots_filter }}
          METRIC: ${{ github.event.inputs.metric }}
          THRESHOLD: ${{ github.event.inputs.threshold }}
          BOOTSTRAP_SAMPLES: ${{ github.event.inputs.bootstrap_samples }}
        run: |
          mkdir -p _ci_out/qcc_stateprob_cross
          python tools/qcc_stateprob_cross_conditions.py             --dataset "$DATASET_PATH"             --auto-plan "$AUTO_PLAN"             --algo "$ALGO"             --device-filter "$DEVICE_FILTER"             --shots-filter "$SHOTS_FILTER"             --metric "$METRIC"             --threshold "$THRESHOLD"             --bootstrap-samples "$BOOTSTRAP_SAMPLES"             --out-dir "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
