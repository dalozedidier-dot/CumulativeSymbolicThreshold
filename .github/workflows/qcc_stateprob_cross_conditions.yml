name: QCC StateProb Cross-Conditions

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to StateProb dataset zip (repo path)"
        required: false
        default: "data/04-09-2020.zip"
      metric:
        description: "Metric name (passed through to tool)"
        required: false
        default: "ccl"
      threshold:
        description: "Threshold (passed through to tool)"
        required: false
        default: "0.35"
      bootstrap_samples:
        description: "Bootstrap samples"
        required: false
        default: "500"
      auto_plan:
        description: "Use autoplan"
        required: false
        default: "true"
      algo:
        description: "Optional algo filter"
        required: false
        default: ""
      device:
        description: "Optional device filter"
        required: false
        default: ""
      shots:
        description: "Optional shots filter"
        required: false
        default: ""

jobs:
  cross:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-qcc-stateprob.txt ]; then
            pip install -r requirements-qcc-stateprob.txt
          else
            pip install numpy pandas matplotlib
          fi

      - name: Run cross-conditions
        shell: bash
        env:
          DATASET_PATH: ${{ inputs.dataset_path }}
          METRIC: ${{ inputs.metric }}
          THRESHOLD: ${{ inputs.threshold }}
          BOOTSTRAP_SAMPLES: ${{ inputs.bootstrap_samples }}
          AUTO_PLAN: ${{ inputs.auto_plan }}
          ALGO: ${{ inputs.algo }}
          DEVICE: ${{ inputs.device }}
          SHOTS: ${{ inputs.shots }}
        run: |
          set -euo pipefail
          OUT="_ci_out/qcc_stateprob_cross"
          mkdir -p "$OUT"

          ARGS=(--dataset "$DATASET_PATH" --out-root "$OUT" --metric "$METRIC" --threshold "$THRESHOLD" --bootstrap-samples "$BOOTSTRAP_SAMPLES")

          # auto-plan flag handling
          if [ "${AUTO_PLAN,,}" = "true" ]; then
            ARGS+=(--auto-plan)
          else
            ARGS+=(--no-auto-plan)
          fi

          # optional filters (only add if non-empty)
          if [ -n "$ALGO" ]; then
            ARGS+=(--algo "$ALGO")
          fi
          if [ -n "$DEVICE" ]; then
            ARGS+=(--device "$DEVICE")
          fi
          if [ -n "$SHOTS" ]; then
            ARGS+=(--shots "$SHOTS")
          fi

          python -m tools.qcc_stateprob_cross_conditions "${ARGS[@]}"

      - name: Write manifest.json into latest run dir
        shell: bash
        run: |
          set -euo pipefail
          python -m tools.qcc_stateprob_write_manifest --out-root "_ci_out/qcc_stateprob_cross"

      - name: Checks
        shell: bash
        run: |
          python -m tools.qcc_stateprob_cross_checks --out-root "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
          if-no-files-found: error
