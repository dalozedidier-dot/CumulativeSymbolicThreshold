name: QCC StateProb Cross-Conditions

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset (.zip or extracted folder) inside repo"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
        type: string
      auto_plan:
        description: "Auto-select best (algo, device) then compare shots"
        required: true
        default: true
        type: boolean
      algo:
        description: "Algorithm filter (empty = all; ignored when auto_plan=true)"
        required: false
        default: ""
        type: string
      device_filter:
        description: "Device filter (empty = all; ignored when auto_plan=true)"
        required: false
        default: ""
        type: string
      shots_filter:
        description: "Shots filter (empty = all)"
        required: false
        default: ""
        type: string
      metric:
        description: "Ccl metric: entropy | impurity | one_minus_max"
        required: true
        default: "entropy"
        type: string
      threshold:
        description: "Ccl threshold for t*"
        required: true
        default: "0.70"
        type: string
      bootstrap_samples:
        description: "Bootstrap samples"
        required: true
        default: "500"
        type: string

jobs:
  cross:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          python -V
          python -m pip install --upgrade pip
          if [ -f requirements-qcc-stateprob.txt ]; then
            python -m pip install -r requirements-qcc-stateprob.txt
          elif [ -f requirements-qcc-stateprob-cross.txt ]; then
            python -m pip install -r requirements-qcc-stateprob-cross.txt
          else
            python -m pip install numpy pandas matplotlib
          fi

      - name: Run cross-conditions
        shell: bash
        env:
          DATASET_PATH: ${{ inputs.dataset_path }}
          AUTO_PLAN: ${{ inputs.auto_plan }}
          ALGO: ${{ inputs.algo }}
          DEVICE_FILTER: ${{ inputs.device_filter }}
          SHOTS_FILTER: ${{ inputs.shots_filter }}
          METRIC: ${{ inputs.metric }}
          THRESHOLD: ${{ inputs.threshold }}
          BOOTSTRAP_SAMPLES: ${{ inputs.bootstrap_samples }}
        run: |
          set -euo pipefail
          mkdir -p _ci_out/qcc_stateprob_cross

          EXTRA_PLAN=""
          if [ "${AUTO_PLAN}" = "true" ]; then
            EXTRA_PLAN="--auto-plan"
          else
            EXTRA_PLAN="--no-auto-plan"
          fi

          # IMPORTANT: run as module so "tools.*" imports work (repo root is on PYTHONPATH)
          python -m tools.qcc_stateprob_cross_conditions             --dataset "${DATASET_PATH}"             --out-root "_ci_out/qcc_stateprob_cross"             --algo "${ALGO}"             --device-filter "${DEVICE_FILTER}"             --shots-filter "${SHOTS_FILTER}"             --metric "${METRIC}"             --threshold "${THRESHOLD}"             --bootstrap-samples "${BOOTSTRAP_SAMPLES}"             ${EXTRA_PLAN}

      - name: Checks
        shell: bash
        run: |
          set -euo pipefail
          python -m tools.qcc_stateprob_cross_checks --out-root "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
          if-no-files-found: error
