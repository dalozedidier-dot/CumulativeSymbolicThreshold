name: QCC StateProb Cross-Conditions (Ccl vs Depth by shots)

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset (.zip or extracted dir) inside repo"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
      algo:
        description: "Algorithm folder (BV, QAOA, ...). Empty = all"
        required: false
        default: "SIMON"
      device_filter:
        description: "Device filter (empty = all)"
        required: false
        default: "ibmqx2"
      shots_filter:
        description: "Shots filter (empty = all)"
        required: false
        default: ""
      t_axis:
        description: "t axis (Depth or Runtime)"
        required: true
        default: "Depth"
      ccl_metric:
        description: "Ccl metric (entropy, impurity, 1-max)"
        required: true
        default: "entropy"
      ccl_threshold:
        description: "Threshold for t* detection"
        required: true
        default: "0.70"
      bootstrap_samples:
        description: "Bootstrap resamples"
        required: true
        default: "500"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-qcc-stateprob.txt

      - name: Run cross-conditions
        run: |
          mkdir -p _ci_out/qcc_stateprob_cross
          python tools/qcc_stateprob_cross_conditions.py             --dataset "${{ inputs.dataset_path }}"             --algo "${{ inputs.algo }}"             --device "${{ inputs.device_filter }}"             --shots "${{ inputs.shots_filter }}"             --t-axis "${{ inputs.t_axis }}"             --metric "${{ inputs.ccl_metric }}"             --threshold "${{ inputs.ccl_threshold }}"             --bootstrap "${{ inputs.bootstrap_samples }}"             --out-dir "_ci_out/qcc_stateprob_cross"

      - name: Checks
        run: |
          python tools/qcc_stateprob_cross_checks.py --out-root "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
