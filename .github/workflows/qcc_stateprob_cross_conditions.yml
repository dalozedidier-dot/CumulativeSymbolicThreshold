name: QCC StateProb Cross-Conditions

on:
  workflow_dispatch:
    inputs:
      metric:
        description: "Metric selector (use 'ccl' for ORI-C/QCC naming)"
        required: false
        default: "ccl"
      threshold:
        description: "Threshold (c-min)"
        required: false
        default: "0.35"
      bootstrap_samples:
        description: "Bootstrap samples"
        required: false
        default: "500"
      auto_plan:
        description: "Auto-plan selection"
        required: false
        default: "true"
      algo:
        description: "Optional filter: algo"
        required: false
        default: ""
      device:
        description: "Optional filter: device"
        required: false
        default: ""
      shots:
        description: "Optional filter: shots"
        required: false
        default: ""

jobs:
  cross:
    runs-on: ubuntu-latest
    env:
      DATASET_PATH: data/qcc/stateprob/04-09-2020.zip
      METRIC: ${{ inputs.metric }}
      THRESHOLD: ${{ inputs.threshold }}
      BOOTSTRAP_SAMPLES: ${{ inputs.bootstrap_samples }}
      AUTO_PLAN: ${{ inputs.auto_plan }}
      ALGO: ${{ inputs.algo }}
      DEVICE: ${{ inputs.device }}
      SHOTS: ${{ inputs.shots }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run cross-conditions
        run: |
          set -euo pipefail
          OUT="_ci_out/qcc_stateprob_cross"
          mkdir -p "$OUT"

          ARGS=(--dataset "$DATASET_PATH" --out-root "$OUT" --metric "$METRIC" --threshold "$THRESHOLD" --bootstrap-samples "$BOOTSTRAP_SAMPLES")

          # auto-plan flag handling
          if [ "${AUTO_PLAN,,}" = "true" ]; then
            ARGS+=(--auto-plan)
          else
            ARGS+=(--no-auto-plan)
          fi

          # optional filters (only add if non-empty)
          if [ -n "$ALGO" ]; then
            ARGS+=(--algo "$ALGO")
          fi
          if [ -n "$DEVICE" ]; then
            ARGS+=(--device "$DEVICE")
          fi
          if [ -n "$SHOTS" ]; then
            ARGS+=(--shots "$SHOTS")
          fi

          # Use compat wrapper so --metric ccl is accepted
          python -m tools.qcc_stateprob_cross_conditions_compat "${ARGS[@]}"

      - name: Write manifest.json into latest run dir
        run: |
          set -euo pipefail
          python -m tools.qcc_stateprob_write_manifest --out-root "_ci_out/qcc_stateprob_cross"

      - name: Checks
        run: |
          set -euo pipefail
          python -m tools.qcc_stateprob_cross_checks --out-root "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
