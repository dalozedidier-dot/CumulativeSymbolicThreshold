name: QCC StateProb Cross-Conditions

on:
  workflow_dispatch:
    inputs:
      dataset_path:
        description: "Path to dataset (.zip or directory)"
        required: true
        default: "data/qcc/stateprob/04-09-2020.zip"
      auto_plan:
        description: "Auto select best (algo, device) then compare all shots"
        required: true
        default: "true"
      algo:
        description: "Optional algo filter (empty=all; ignored if auto_plan=true)"
        required: false
        default: ""
      device_filter:
        description: "Optional device filter (empty=all; ignored if auto_plan=true)"
        required: false
        default: ""
      shots_filter:
        description: "Optional shots filter (empty=all; ignored if auto_plan=true)"
        required: false
        default: ""
      metric:
        description: "Ccl metric: entropy | one_minus_max | impurity"
        required: true
        default: "entropy"
      threshold:
        description: "Ccl threshold for t*"
        required: true
        default: "0.70"
      bootstrap_samples:
        description: "Bootstrap samples"
        required: true
        default: "500"

jobs:
  cross:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-qcc-stateprob.txt ]; then
            pip install -r requirements-qcc-stateprob.txt
          elif [ -f requirements-qcc-stateprob-cross.txt ]; then
            pip install -r requirements-qcc-stateprob-cross.txt
          else
            pip install numpy pandas matplotlib
          fi

      - name: Run cross-conditions
        env:
          DATASET_PATH: ${{ inputs.dataset_path }}
          AUTO_PLAN: ${{ inputs.auto_plan }}
          ALGO: ${{ inputs.algo }}
          DEVICE_FILTER: ${{ inputs.device_filter }}
          SHOTS_FILTER: ${{ inputs.shots_filter }}
          METRIC: ${{ inputs.metric }}
          THRESHOLD: ${{ inputs.threshold }}
          BOOTSTRAP_SAMPLES: ${{ inputs.bootstrap_samples }}
        run: |
          mkdir -p _ci_out/qcc_stateprob_cross
          python tools/qcc_stateprob_cross_conditions.py             --dataset "$DATASET_PATH"             --auto-plan "$AUTO_PLAN"             --algo "$ALGO"             --device-filter "$DEVICE_FILTER"             --shots-filter "$SHOTS_FILTER"             --metric "$METRIC"             --threshold "$THRESHOLD"             --bootstrap-samples "$BOOTSTRAP_SAMPLES"             --out-dir "_ci_out/qcc_stateprob_cross"

      - name: Checks
        run: |
          python tools/qcc_stateprob_cross_checks.py --out-root "_ci_out/qcc_stateprob_cross"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcc_stateprob_cross_artifact
          path: _ci_out/qcc_stateprob_cross
