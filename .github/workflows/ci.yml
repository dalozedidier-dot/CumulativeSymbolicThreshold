name: CI - Canonical Synthetic Suite

# Triggered on pushes to main, pull requests, and manual runs.
# Uses --fast mode (smoke_ci: n=20 per statistical test) to stay within the CI budget.
# For full_statistical validation (n=60), see nightly.yml.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  # Syntax gate: catch Python errors before running anything else.
  compileall:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax (compileall)
        run: python -m compileall 04_Code -q

  # Unit / e2e tests.
  unit_tests:
    needs: compileall
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install \
            "numpy>=1.26" \
            "pandas>=2.0" \
            "scipy>=1.11" \
            "statsmodels>=0.14" \
            "matplotlib>=3.8" \
            "pytest>=8.0"

          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi
      - name: Run pytest
        run: pytest -q 04_Code/tests 2>&1

  canonical_suite:
    needs: unit_tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean CI output directory
        run: |
          rm -rf _ci_out
          mkdir -p _ci_out

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            "numpy>=1.26" \
            "pandas>=2.0" \
            "matplotlib>=3.8" \
            "scipy>=1.11" \
            "statsmodels>=0.14" \
            "pytest>=8.0"

          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; \
          elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi

          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Log environment
        run: |
          python -V | tee _ci_out/python_version.txt
          pip list | tee _ci_out/pip_list.txt

      - name: Run canonical suite (smoke_ci - fast mode)
        run: |
          set -eo pipefail
          # --fast -> smoke_ci: n=20 per statistical test (< N_min=50).
          # This validates pipeline execution and report integrity, not full statistical support.
          PYTHONPATH=src python 04_Code/pipeline/run_all_tests.py \
            --outdir _ci_out/canonical_tests \
            --fast \
            2>&1 | tee _ci_out/run_all_tests.log

          if [ -d 05_Results ]; then cp -R 05_Results _ci_out/05_Results; fi

      - name: Build registered report assets (figures + tables)
        run: |
          set -e
          RUN_DIR=$(ls -1d _ci_out/canonical_tests/* 2>/dev/null | sort | tail -n 1)
          if [ -z "$RUN_DIR" ]; then
            echo "ERROR: no run directory found under _ci_out/canonical_tests"
            exit 1
          fi
          echo "Using RUN_DIR=$RUN_DIR"
          python 04_Code/reporting/build_registered_report_assets.py --run-dir "$RUN_DIR"

          mkdir -p _ci_out/06_Manuscript
          if [ -d 06_Manuscript ]; then cp -R 06_Manuscript _ci_out/06_Manuscript; fi

      - name: Assert support level (hard gate)
        # Reads support_level from global_verdict.json and writes it to the step summary.
        # Hard rule: smoke_ci must not claim full_statistical_support.
        run: |
          python - <<'PYEOF'
          import glob
          import json
          import os
          import sys

          candidates = glob.glob("_ci_out/canonical_tests/**/global_verdict.json", recursive=True)
          if not candidates:
              candidates = glob.glob("_ci_out/**/global_verdict.json", recursive=True)

          if not candidates:
              print("WARNING: global_verdict.json not found - cannot assert support level")
              sys.exit(0)

          verdict_file = max(candidates, key=lambda p: os.path.getmtime(p))
          d = json.loads(open(verdict_file, encoding="utf-8").read())

          run_mode = d.get("run_mode", "UNKNOWN")
          support_level = d.get("support_level", "UNKNOWN")
          global_v = d.get("global", "UNKNOWN")
          forbidden = d.get("forbidden_report_labels", [])

          if run_mode == "smoke_ci" and support_level in ("full_statistical_support", "full_statistical_accept"):
              print(f"ERROR: support_level='{support_level}' is impossible for run_mode='{run_mode}'")
              sys.exit(1)
          if run_mode == "full_statistical" and str(support_level).startswith("smoke_ci"):
              print(f"ERROR: support_level='{support_level}' is impossible for run_mode='{run_mode}'")
              sys.exit(1)

          summary = f"""## ORI-C CI Run - Support Level Assertion

          | Field | Value |
          |-------|-------|
          | verdict_file | `{verdict_file}` |
          | run_mode | `{run_mode}` |
          | global verdict | `{global_v}` |
          | support_level | `{support_level}` |

          ### Labels forbidden in any report derived from this run
          {chr(10).join(f"- `{lbl}`" for lbl in forbidden)}

          For full statistical validation, use the nightly workflow (`nightly.yml`).
          """

          summary = "\n".join(line.lstrip() for line in summary.splitlines())

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write(summary)

          print(summary)
          PYEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci_canonical_${{ github.run_id }}
          path: _ci_out
          if-no-files-found: warn
