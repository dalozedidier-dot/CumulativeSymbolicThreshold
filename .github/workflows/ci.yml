name: CI - Canonical Synthetic Suite

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  compileall:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax (compileall)
        run: python -m compileall 04_Code -q

  unit_tests:
    needs: compileall
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install             "numpy>=1.26"             "pandas>=2.0"             "scipy>=1.11"             "statsmodels>=0.14"             "matplotlib>=3.8"             "pytest>=8.0"             "pytest-cov>=4.1"

          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi
      - name: Run pytest with coverage
        run: pytest -q --cov=src/oric --cov-report=xml --cov-report=term-missing src/oric/tests 04_Code/tests 2>&1
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          fail_ci_if_error: false
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: warn

  canonical_suite:
    needs: unit_tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clean CI output directory
        run: |
          rm -rf _ci_out
          mkdir -p _ci_out

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install             "numpy>=1.26"             "pandas>=2.0"             "matplotlib>=3.8"             "scipy>=1.11"             "statsmodels>=0.14"             "pytest>=8.0"

          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt;           elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi

          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Log environment
        run: |
          python -V | tee _ci_out/python_version.txt
          pip list | tee _ci_out/pip_list.txt

      - name: Run canonical suite (smoke_ci - fast mode)
        run: |
          set -eo pipefail
          PYTHONPATH=src python 04_Code/pipeline/run_all_tests.py             --outdir _ci_out/canonical_tests             --fast             2>&1 | tee _ci_out/run_all_tests.log

          if [ -d 05_Results ]; then cp -R 05_Results _ci_out/05_Results; fi

      - name: Build registered report assets (figures + tables)
        run: |
          set -e
          RUN_DIR=$(ls -1d _ci_out/canonical_tests/* 2>/dev/null | sort | tail -n 1)
          if [ -z "$RUN_DIR" ]; then
            echo "ERROR: no run directory found under _ci_out/canonical_tests"
            exit 1
          fi
          echo "Using RUN_DIR=$RUN_DIR"
          python 04_Code/reporting/build_registered_report_assets.py --run-dir "$RUN_DIR"

          mkdir -p _ci_out/06_Manuscript
          if [ -d 06_Manuscript ]; then cp -R 06_Manuscript _ci_out/06_Manuscript; fi

      - name: Assert smoke CI contract (hard gate)
        run: |
          python - <<'PYEOF'
          import glob
          import json
          import os
          import sys

          candidates = glob.glob("_ci_out/canonical_tests/**/global_verdict.json", recursive=True)
          if not candidates:
              candidates = glob.glob("_ci_out/**/global_verdict.json", recursive=True)

          if not candidates:
              print("ERROR: global_verdict.json not found")
              sys.exit(1)

          verdict_file = max(candidates, key=os.path.getmtime)
          d = json.loads(open(verdict_file, encoding="utf-8").read())

          run_mode = d.get("run_mode", "UNKNOWN")
          support_level = d.get("support_level", "UNKNOWN")

          if run_mode == "smoke_ci" and support_level == "full_statistical_support":
              print(f"ERROR: smoke_ci cannot claim full_statistical_support. verdict_file={verdict_file}")
              sys.exit(1)

          ok = (run_mode == "smoke_ci" and support_level in ("smoke_ci_accept","rejected","inconclusive")) or (run_mode != "smoke_ci")
          if not ok:
              print(f"ERROR: invalid support_level={support_level} for run_mode={run_mode}. verdict_file={verdict_file}")
              sys.exit(1)

          print(f"OK contract: run_mode={run_mode} support_level={support_level} verdict_file={verdict_file}")
          PYEOF

      - name: Build CI summary (json + md + Actions summary)
        run: |
          set -e
          python 04_Code/reporting/build_ci_summary.py --ci-out _ci_out --canonical-root _ci_out/canonical_tests

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ci_canonical_${{ github.run_id }}
          path: _ci_out
          if-no-files-found: warn
