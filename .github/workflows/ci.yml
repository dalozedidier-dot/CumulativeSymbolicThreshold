name: CI — Canonical Synthetic Suite

# Triggered on every push to main and on all PRs.
# Uses --fast mode (smoke_ci: n=20 per statistical test) to stay within the 30-min CI budget.
# For full_statistical validation (n=60), see nightly.yml.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  # ── Syntax gate: catch Python errors before running anything else ──────────
  compileall:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax (compileall)
        run: python -m compileall 04_Code -q

  # ── Unit / e2e tests ───────────────────────────────────────────────────────
  unit_tests:
    needs: compileall
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=1.26" "pandas>=2.0" "scipy>=1.11" \
            "statsmodels>=0.14" "matplotlib>=3.8" "pytest>=8.0"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run pytest
        run: pytest -q 04_Code/tests 2>&1

  canonical_suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            "numpy>=1.26" \
            "pandas>=2.0" \
            "matplotlib>=3.8" \
            "scipy>=1.11" \
            "statsmodels>=0.14" \
            "pytest>=8.0"
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; \
          elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Log environment
        run: |
          mkdir -p _ci_out
          python -V | tee _ci_out/python_version.txt
          pip list | tee _ci_out/pip_list.txt

      - name: Run canonical suite (smoke_ci — fast mode)
        run: |
          set -eo pipefail
          # --fast → smoke_ci: n=20 per statistical test (< N_min=50).
          # run_mode will be "smoke_ci" — pipeline execution check only.
          # This does NOT claim "full statistical support" (see nightly.yml for that).
          PYTHONPATH=src python 04_Code/pipeline/run_all_tests.py \
            --outdir _ci_out/canonical_tests \
            --fast \
            2>&1 | tee _ci_out/run_all_tests.log

          if [ -d 05_Results ]; then cp -R 05_Results _ci_out/05_Results; fi

      - name: Assert support level (hard gate)
        # Reads the machine-computed support_level from global_verdict.json.
        # Writes it to $GITHUB_STEP_SUMMARY so it is visible in the Actions UI.
        # HARD RULE: if support_level contains "full_statistical" the step fails —
        #   smoke_ci CANNOT produce full_statistical_support by construction.
        run: |
          python - <<'PYEOF'
          import json, glob, sys, os

          verdict_file = None
          for f in glob.glob("_ci_out/**/global_verdict.json", recursive=True):
              verdict_file = f
              break

          if verdict_file is None:
              print("WARNING: global_verdict.json not found — cannot assert support level")
              sys.exit(0)

          d = json.loads(open(verdict_file).read())
          run_mode      = d.get("run_mode", "UNKNOWN")
          support_level = d.get("support_level", "UNKNOWN")
          global_v      = d.get("global", "UNKNOWN")
          forbidden     = d.get("forbidden_report_labels", [])

          # HARD GATE: smoke_ci must NEVER produce full_statistical_support
          if "full_statistical" in support_level:
              print(f"ERROR: support_level='{support_level}' is impossible for run_mode='{run_mode}'")
              sys.exit(1)

          summary = f"""## ORI-C CI Run — Support Level Assertion

          | Field | Value |
          |-------|-------|
          | run_mode | `{run_mode}` |
          | global verdict | `{global_v}` |
          | support_level | `{support_level}` |

          ### Meaning of `{support_level}`
          This is a **smoke CI check** (`--fast`, n=20 < N_min=50).
          It verifies the pipeline executes correctly — it does **NOT** satisfy
          the DECISION_RULES v1/v2 triplet requirement (p + CI 99% + SESOI + power gate).

          ### Labels FORBIDDEN in any report derived from this run
          {chr(10).join(f"- `{lbl}`" for lbl in forbidden)}

          For full statistical validation, see the **nightly workflow** (`nightly.yml`),
          which runs with n=60 and enforces the complete triplet gate.
          """
          summary = "\n".join(line.lstrip() for line in summary.splitlines())

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if step_summary:
              with open(step_summary, "a") as fh:
                  fh.write(summary)
          print(summary)
          PYEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci_canonical_${{ github.run_id }}
          path: _ci_out
          if-no-files-found: warn
