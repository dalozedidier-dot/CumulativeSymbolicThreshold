name: CI — Canonical Synthetic Suite

# Triggered on every push to main and on all PRs.
# Uses --fast mode (smoke_ci: n=20 per statistical test) to stay within the 30-min CI budget.
# For full_statistical validation (n=60), see nightly.yml.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  canonical_suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            "numpy>=1.26" \
            "pandas>=2.0" \
            "matplotlib>=3.8" \
            "scipy>=1.11" \
            "statsmodels>=0.14" \
            "pytest>=8.0"
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; \
          elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Log environment
        run: |
          mkdir -p _ci_out
          python -V | tee _ci_out/python_version.txt
          pip list | tee _ci_out/pip_list.txt

      - name: Run canonical suite (smoke_ci — fast mode)
        run: |
          set -eo pipefail
          # --fast → smoke_ci: n=20 per statistical test (< N_min=50).
          # run_mode will be "smoke_ci" — pipeline execution check only.
          # This does NOT claim "full statistical support" (see nightly.yml for that).
          PYTHONPATH=src python 04_Code/pipeline/run_all_tests.py \
            --outdir _ci_out/canonical_tests \
            --fast \
            2>&1 | tee _ci_out/run_all_tests.log

          if [ -d 05_Results ]; then cp -R 05_Results _ci_out/05_Results; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci_canonical_${{ github.run_id }}
          path: _ci_out
          if-no-files-found: warn
