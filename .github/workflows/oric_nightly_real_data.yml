name: ORI-C - Nightly Real Data (T1-T8)

on:
  schedule:
    - cron: "13 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oric-nightly-real-data
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATA_FILE: "data/real/ORIC_real_data.csv"
      PREREG_FILE: "PREREG_TEMPLATE.md"
      OUT_ROOT: "_ci_out/oric_real_data_nightly"
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            python -m pip install -r requirements.txt
          elif [ -f "pyproject.toml" ]; then
            python -m pip install -e ".[dev]" || python -m pip install -e .
          else
            echo "No requirements.txt or pyproject.toml found."
            exit 1
          fi
          python -m pip install pytest || true

      - name: Validate inputs exist
        shell: bash
        run: |
          set -euo pipefail
          test -f "${DATA_FILE}"
          test -f "${PREREG_FILE}"

      - name: Prepare run directory
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +%Y%m%d_%H%M%S)"
          RUN_DIR="${OUT_ROOT}/${TS}"
          mkdir -p "${RUN_DIR}/inputs" "${RUN_DIR}/logs" "${RUN_DIR}/tables" "${RUN_DIR}/figures"
          echo "${RUN_DIR}" > .oric_run_dir
          cp "${DATA_FILE}" "${RUN_DIR}/inputs/real_data.csv"
          cp "${PREREG_FILE}" "${RUN_DIR}/inputs/PREREG_TEMPLATE.md"

      - name: Run canonical pipeline (T1-T8)
        shell: bash
        run: |
          set -euo pipefail
          RUN_DIR="$(cat .oric_run_dir)"
          if [ -f "04_Code/pipeline/run_all_tests.py" ]; then
            python 04_Code/pipeline/run_all_tests.py \
              --input-csv "${RUN_DIR}/inputs/real_data.csv" \
              --prereg "${RUN_DIR}/inputs/PREREG_TEMPLATE.md" \
              --out-dir "${RUN_DIR}" \
              2>&1 | tee "${RUN_DIR}/logs/run_all_tests.log"
          elif [ -f "run_all_tests.py" ]; then
            python run_all_tests.py \
              --input-csv "${RUN_DIR}/inputs/real_data.csv" \
              --prereg "${RUN_DIR}/inputs/PREREG_TEMPLATE.md" \
              --out-dir "${RUN_DIR}" \
              2>&1 | tee "${RUN_DIR}/logs/run_all_tests.log"
          else
            echo "Canonical runner not found."
            exit 1
          fi

      - name: Compute sha256 manifest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          run_dir = Path(open('.oric_run_dir').read().strip())
          items = []

          def sha256_file(p: Path) -> str:
            h = hashlib.sha256()
            with p.open('rb') as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b''):
                h.update(chunk)
            return h.hexdigest()

          for p in sorted(run_dir.rglob('*')):
            if p.is_file():
              rel = str(p.relative_to(run_dir))
              items.append({'path': rel, 'sha256': sha256_file(p), 'bytes': p.stat().st_size})

          manifest = {'schema': 'oric_manifest_v1', 'run_dir': str(run_dir), 'files': items}
          (run_dir / 'manifest.json').write_text(json.dumps(manifest, indent=2, ensure_ascii=False))
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oric_real_data_nightly
          path: ${{ env.OUT_ROOT }}
          if-no-files-found: error
