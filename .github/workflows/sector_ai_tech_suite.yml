name: Sector AI/Tech Suite

on:
  push:
    paths:
      - '04_Code/sector/ai_tech/**'
      - '04_Code/sector/shared/**'
      - '03_Data/sector_ai_tech/**'
      - '.github/workflows/sector_ai_tech_suite.yml'
  pull_request:
    paths:
      - '04_Code/sector/ai_tech/**'
      - '04_Code/sector/shared/**'
  schedule:
    - cron: '0 8 * * 1'   # weekly Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      pilot_id:
        description: 'Pilot to run (mlperf | llm_scaling | all)'
        required: false
        default: 'all'
      mode:
        description: 'Run mode (smoke_ci | full_statistical)'
        required: false
        default: 'smoke_ci'

jobs:
  ai-tech-sector:
    name: AI/Tech sector — ${{ matrix.pilot }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pilot: [mlperf, llm_scaling]

    steps:
      - uses: actions/checkout@v4
      - name: Ensure _ci_out exists
        run: mkdir -p _ci_out

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r 04_Code/requirements-dev.txt

      - name: Run AI/Tech sector suite — ${{ matrix.pilot }}
        env:
          PYTHONPATH: 04_Code
        run: |
          python 04_Code/sector/ai_tech/run_sector_suite.py \
            --pilot-id ${{ matrix.pilot }} \
            --outdir   _sector_ai_tech_out/${{ matrix.pilot }} \
            --seed     1234 \
            --mode     ${{ github.event.inputs.mode || 'smoke_ci' }}

      - name: Check sector global verdict
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path
          vf = Path("_sector_ai_tech_out/${{ matrix.pilot }}/pilot_${{ matrix.pilot }}/sector_global_verdict.json")
          if not vf.exists():
              print("WARN: sector_global_verdict.json not found")
              sys.exit(0)
          v  = json.loads(vf.read_text())
          gv = v.get("global_verdict", "MISSING")
          mv = v.get("mapping_validity", "MISSING")
          sl = v.get("support_level", "MISSING")
          nb = v.get("ci_smoke_non_blocking", False)
          rm = v.get("run_mode", "smoke_ci")
          print(f"AI/Tech / ${{ matrix.pilot }}")
          print(f"  run_mode             : {rm}")
          print(f"  global_verdict       : {gv}")
          print(f"  mapping_validity     : {mv}")
          print(f"  support_level        : {sl}")
          print(f"  ci_smoke_non_blocking: {nb}")
          if (gv == "REJECT" or mv == "REJECT") and not nb:
              print("REJECT — failing CI (full_statistical mode)")
              sys.exit(1)
          elif gv == "REJECT" or mv == "REJECT":
              print("REJECT recorded — non-blocking in smoke_ci")
          else:
              print("OK")
          EOF

      - name: Upload sector artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sector-ai-tech-${{ matrix.pilot }}-${{ github.run_number }}
          path: _sector_ai_tech_out/${{ matrix.pilot }}/
          if-no-files-found: warn
          retention-days: 14

  ai-tech-sector-summary:
    name: AI/Tech sector — summary
    needs: ai-tech-sector
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
      - name: Ensure _ci_out exists
        run: mkdir -p _ci_out

      - name: Download all AI/Tech artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sector-ai-tech-*-${{ github.run_number }}
          path: _ai_tech_artifacts/

      - name: Print cross-pilot summary
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path
          print("\n" + "="*50)
          print("AI/TECH SECTOR PANEL SUMMARY")
          print("="*50)
          for vf in sorted(Path("_ai_tech_artifacts").rglob("sector_global_verdict.json")):
              try:
                  v = json.loads(vf.read_text())
                  print(f"  {v.get('pilot_id','?'):15s}  "
                        f"global={v.get('global_verdict','?'):15s}  "
                        f"mapping={v.get('mapping_validity','?'):15s}  "
                        f"support={v.get('support_level','?')}")
              except Exception as e:
                  print(f"  {vf}: ERROR {e}")
          EOF
