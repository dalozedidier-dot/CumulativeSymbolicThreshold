name: Real Data Suite (ORI-C) - Max Demo

on:
  workflow_dispatch:
    inputs:
      include_bundles:
        description: Include bundle processed CSVs under 03_Data/real/_bundles
        required: false
        default: "true"
      pre_horizon:
        description: Pre horizon length (steps)
        required: false
        default: "200"
      post_horizon:
        description: Post horizon length (steps)
        required: false
        default: "200"
      n_boot:
        description: Bootstrap replicates
        required: false
        default: "200"
      alpha:
        description: Alpha for causal tests
        required: false
        default: "0.01"

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        sector: ["economie", "energie", "trafic", "meteo"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy>=1.26" "pandas>=2.0" "matplotlib>=3.8" "scipy>=1.11" "statsmodels>=0.14"

      - name: Resolve datasets
        run: |
          set -euo pipefail
          SECTOR="${{ matrix.sector }}"
          INCLUDE="${{ github.event.inputs.include_bundles }}"
          EXTRA=""
          if [ "$INCLUDE" = "true" ]; then
            EXTRA="--include-bundles"
          fi

          python scripts/resolve_real_datasets.py --sector "$SECTOR" $EXTRA > _datasets.json
          echo "Sector: $SECTOR"
          echo "Resolved datasets:"
          cat _datasets.json

          python -c "import json; d=json.load(open('_datasets.json')); assert len(d)>0, 'No datasets found for sector ' + '${{ matrix.sector }}'"
          python -c "import json; d=json.load(open('_datasets.json')); [print(x) for x in d]" > _datasets.txt

      - name: Run suite
        run: |
          set -euo pipefail
          SECTOR="${{ matrix.sector }}"
          PRE="${{ github.event.inputs.pre_horizon }}"
          POST="${{ github.event.inputs.post_horizon }}"
          NBOOT="${{ github.event.inputs.n_boot }}"
          ALPHA="${{ github.event.inputs.alpha }}"

          i=0
          while read -r ds; do
            if [ -z "$ds" ]; then
              continue
            fi

            OUTDIR="_ci_out/real_data_suite/$SECTOR/run_${{ github.run_id }}_ds$(printf "%02d" "$i")"
            mkdir -p "$OUTDIR"
            echo "sector=$SECTOR" > "$OUTDIR/sector.txt"
            echo "dataset=$ds" > "$OUTDIR/dataset.txt"

            python 04_Code/pipeline/run_real_data_demo.py               --input "$ds"               --outdir "$OUTDIR"               --col-time date               --time-mode index               --normalize robust               --control-mode no_symbolic               --k 2.5               --m 3               --baseline-n 50 2>&1 | tee "$OUTDIR/run_real_data_demo.log"

            python 04_Code/pipeline/tests_causaux.py               --run-dir "$OUTDIR"               --alpha "$ALPHA"               --lags 1-10               --pre-horizon "$PRE"               --post-horizon "$POST"               --k 2.5               --m 3               --baseline-n 50               --block 25               --n-boot "$NBOOT"               --seed 123               --n-steps-min 200               --pdf 2>&1 | tee "$OUTDIR/tests_causaux.log"

            i=$((i+1))
          done < _datasets.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real_data_suite_${{ github.run_id }}_${{ matrix.sector }}
          path: _ci_out/real_data_suite/${{ matrix.sector }}
          if-no-files-found: warn
