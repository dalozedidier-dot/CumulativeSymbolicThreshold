name: Real Data Suite (ORI-C) - Max Demo

on:
  workflow_dispatch:
    inputs:
      include_bundles:
        description: "Include bundle processed CSVs (can be many)"
        required: false
        default: "true"

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        sector: ["economie", "energie", "trafic", "meteo"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy>=1.26" "pandas>=2.0" "matplotlib>=3.8" "scipy>=1.11" "pytest>=8.0" "statsmodels>=0.14"

      - name: Run sector matrix
        run: |
          set -euo pipefail
SECTOR="${{ matrix.sector }}"
          INCLUDE="${{ github.event.inputs.include_bundles }}"
          EXTRA=""
          if [ "$INCLUDE" = "true" ]; then EXTRA="--include-bundles"; fi

          python scripts/resolve_real_datasets.py --sector "$SECTOR" $EXTRA > _datasets.json
          python - << 'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("_datasets.json").read_text(encoding="utf-8"))
          print(f"datasets={len(data)}")
          if not data:
              raise SystemExit("No datasets found")
          PY

          i=0
          while read -r ds; do
            OUTDIR="_ci_out/real_data_suite/$SECTOR/run_${{ github.run_id }}_ds$(printf "%02d" "$i")"
            mkdir -p "$OUTDIR"
            echo "sector=$SECTOR" > "$OUTDIR/sector.txt"
            echo "dataset=$ds" > "$OUTDIR/dataset.txt"

            python 04_Code/pipeline/run_real_data_demo.py               --input "$ds"               --outdir "$OUTDIR"               --col-time date               --time-mode index               --normalize robust               --control-mode no_symbolic               --k 2.5               --m 3               --baseline-n 50 2>&1 | tee "$OUTDIR/run_real_data_demo.log"

            python 04_Code/pipeline/tests_causaux.py               --run-dir "$OUTDIR"               --alpha 0.01               --lags 1-10               --pre-horizon 200               --post-horizon 200               --k 2.5               --m 3               --baseline-n 50               --block 25               --n-boot 200               --seed 123               --n-steps-min 200               --pdf 2>&1 | tee "$OUTDIR/tests_causaux.log"

            i=$((i+1))
          done < <(python - << 'PY'
import json
from pathlib import Path
data = json.loads(Path("_datasets.json").read_text(encoding="utf-8"))
for d in data:
    print(d)
PY
          )

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real_data_suite_${{ github.run_id }}_${{ matrix.sector }}
          path: _ci_out/real_data_suite/${{ matrix.sector }}
          if-no-files-found: warn
