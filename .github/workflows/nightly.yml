name: Nightly — Full Canonical Proof (Synthetic + Real Data)

# Authoritative nightly validation — two independent proof dimensions:
#
#   1. SYNTHETIC SIMULATION SUITE (run_all_tests.py, no --fast)
#      run_mode = "full_statistical"  (n=60 per statistical test >= N_min=50)
#      Triplet enforced: p < 0.01 + CI 99% + SESOI + power gate >= 0.70
#      Gate: support_level = "full_statistical_support" ONLY if all triplet gates pass
#
#   2. REAL DATA CANONICAL SUITE (run_real_data_canonical_suite.py, FRED monthly)
#      run_mode = "real_data_canonical"
#      Tests: Granger S→ΔC, VAR S→ΔC, cointegration C-S, bootstrap CI, threshold
#      Gate: support_level = "real_data_canonical_support" ONLY if CORE+SYMBOLIC ACCEPT
#
# Both suites must ACCEPT for the strongest canonical claim.
# Neither is a substitute for the other.
# "full support" / "full empirical support" are NEVER valid report labels.

on:
  schedule:
    - cron: "15 2 * * *"   # 02:15 UTC daily
  workflow_dispatch:

concurrency:
  group: nightly-canonical
  cancel-in-progress: false

jobs:
  # ── JOB 1: Synthetic simulation suite (full_statistical) ────────────────────
  synthetic_full:
    name: "Synthetic — full_statistical (n=60)"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    outputs:
      synthetic_support_level: ${{ steps.synthetic_run.outputs.synthetic_support_level }}
      synthetic_global_verdict: ${{ steps.synthetic_run.outputs.synthetic_global_verdict }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt
          elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi

      - name: Run synthetic canonical suite (full_statistical)
        id: synthetic_run
        run: |
          set -eo pipefail
          mkdir -p _ci_out/synthetic

          # No --fast + --n-runs-min 50: full_statistical with hard enforcement.
          # Aborts immediately if any statistical test would run with n < 50.
          # Triplet enforced: p + CI 99% + SESOI + power gate.
          # Gate: support_level = "full_statistical_support" iff all triplet gates pass.
          PYTHONPATH=src python 04_Code/pipeline/run_all_tests.py \
            --outdir _ci_out/synthetic/canonical_tests \
            --n-runs-min 50 \
            2>&1 | tee _ci_out/synthetic/run_all_tests.log

      - name: Build registered report assets (figures + tables)
        run: |
          set -e
          RUN_DIR=$(ls -1d _ci_out/synthetic/canonical_tests/* | sort | tail -n 1)
          echo "Using RUN_DIR=$RUN_DIR"
          python 04_Code/reporting/build_registered_report_assets.py --run-dir "$RUN_DIR"

          mkdir -p _ci_out/06_Manuscript
          if [ -d 06_Manuscript ]; then cp -R 06_Manuscript _ci_out/06_Manuscript; fi

          # Extract support_level from the nested timestamped run dir
          SYNTHETIC_SUPPORT=$(python -c "
          import json, glob, sys
          p = '_ci_out/synthetic/canonical_tests'
          for f in glob.glob(f'{p}/**/global_verdict.json', recursive=True):
              d = json.loads(open(f).read())
              print(d.get('support_level', 'NOT_FOUND'))
              sys.exit(0)
          print('NOT_FOUND')
          " 2>/dev/null || echo "NOT_FOUND")

          SYNTHETIC_VERDICT=$(python -c "
          import json, glob, sys
          p = '_ci_out/synthetic/canonical_tests'
          for f in glob.glob(f'{p}/**/global_verdict.json', recursive=True):
              d = json.loads(open(f).read())
              print(d.get('global', 'UNKNOWN'))
              sys.exit(0)
          print('UNKNOWN')
          " 2>/dev/null || echo "UNKNOWN")

          echo "synthetic_support_level=${SYNTHETIC_SUPPORT}" >> "$GITHUB_OUTPUT"
          echo "synthetic_global_verdict=${SYNTHETIC_VERDICT}" >> "$GITHUB_OUTPUT"
          echo "Synthetic support_level: ${SYNTHETIC_SUPPORT}   verdict: ${SYNTHETIC_VERDICT}"

      - name: Upload synthetic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly_synthetic_${{ github.run_id }}
          path: _ci_out/synthetic
          retention-days: 30
          if-no-files-found: warn

  # ── JOB 2: Real data canonical suite (FRED monthly) ────────────────────────
  real_data_fred:
    name: "Real Data FRED — real_data_canonical"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      real_support_level: ${{ steps.real_run.outputs.real_support_level }}
      real_global_verdict: ${{ steps.real_run.outputs.real_global_verdict }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt
          elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi

      - name: Verify real data present
        run: |
          set -e
          if [ ! -f "03_Data/real/fred_monthly/real.csv" ]; then
            echo "ERROR: 03_Data/real/fred_monthly/real.csv not found"
            exit 1
          fi
          echo "FRED monthly: $(wc -l < 03_Data/real/fred_monthly/real.csv) rows"
          head -1 03_Data/real/fred_monthly/real.csv

      - name: Run real data canonical suite (FRED monthly)
        id: real_run
        run: |
          set -eo pipefail
          mkdir -p _ci_out/real/fred_monthly

          PYTHONPATH=src python 04_Code/pipeline/run_real_data_canonical_suite.py \
            --input  03_Data/real/fred_monthly/real.csv \
            --outdir _ci_out/real/fred_monthly \
            --col-time date \
            --time-mode index \
            --col-O O --col-R R --col-I I \
            --col-demand demand \
            --col-S S \
            --auto-scale \
            --normalize robust \
            --alpha 0.01 \
            --lags 1-6 \
            --pre-horizon 120 \
            --post-horizon 120 \
            --baseline-n 60 \
            --k 2.5 --m 3 \
            2>&1 | tee _ci_out/real/fred_monthly/suite.log

          VERDICT=$(cat _ci_out/real/fred_monthly/verdict.txt 2>/dev/null || echo "UNKNOWN")
          SUPPORT=$(python -c "
          import json
          d = json.loads(open('_ci_out/real/fred_monthly/tables/global_summary.json').read())
          print(d.get('support_level', 'NOT_FOUND'))
          " 2>/dev/null || echo "NOT_FOUND")

          echo "real_global_verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          echo "real_support_level=${SUPPORT}" >> "$GITHUB_OUTPUT"
          echo "Real data verdict: ${VERDICT}   support_level: ${SUPPORT}"

      - name: Upload real data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly_real_fred_${{ github.run_id }}
          path: _ci_out/real/fred_monthly
          retention-days: 30
          if-no-files-found: warn

  # ── JOB 3: Real data validation protocol (3-dataset × window × subsampling) ──
  real_data_validation_protocol:
    name: "Real Data Validation Protocol — FRED fast"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: real_data_fred   # runs in parallel with real_data_fred dependency only for ordering
    if: always()

    outputs:
      protocol_verdict: ${{ steps.protocol_run.outputs.protocol_verdict }}
      protocol_test_det_rate: ${{ steps.protocol_run.outputs.protocol_test_det_rate }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt
          elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi

      - name: Verify FRED data present
        run: |
          if [ ! -f "03_Data/real/fred_monthly/real.csv" ]; then
            echo "ERROR: FRED data not found — skipping protocol"
            exit 0
          fi
          echo "FRED monthly: $(wc -l < 03_Data/real/fred_monthly/real.csv) rows"

      - name: Run real data validation protocol (fast mode — 3 windows × 10 subsamples)
        id: protocol_run
        run: |
          set -eo pipefail
          mkdir -p _ci_out/real/validation_protocol

          PYTHONPATH=src python 04_Code/pipeline/run_real_data_validation_protocol.py \
            --input 03_Data/real/fred_monthly/real.csv \
            --inputs 03_Data/real/validation_candidates/epidemic_ecdc_BE_daily_oric.csv 03_Data/real/validation_candidates/excess_deaths_OWID_BE_oric.csv 03_Data/real/validation_candidates/ecology_pelt_oric.csv \
            --outdir _ci_out/real/validation_protocol \
            --col-time date --time-mode index \
            --col-O O --col-R R --col-I I \
            --col-demand demand --col-S S \
            --normalize robust \
            --baseline-n 30 \
            --lags 1-3 \
            --seed 42 \
            --fast \
            2>&1 | tee _ci_out/real/validation_protocol/protocol.log

          VERDICT=$(cat _ci_out/real/validation_protocol/verdict.txt 2>/dev/null || echo "UNKNOWN")
          DET_RATE=$(python -c "
          import json
          d = json.loads(open('_ci_out/real/validation_protocol/tables/validation_summary.json').read())
          m = d.get('test_metrics', {})
          print(f\"{m.get('detection_rate', 'NaN'):.3f}\")
          " 2>/dev/null || echo "NaN")

          echo "protocol_verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          echo "protocol_test_det_rate=${DET_RATE}" >> "$GITHUB_OUTPUT"
          echo "Validation protocol verdict: ${VERDICT}  test_det_rate=${DET_RATE}"

      - name: Upload protocol artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly_validation_protocol_${{ github.run_id }}
          path: _ci_out/real/validation_protocol
          retention-days: 30
          if-no-files-found: warn

  # ── JOB 4: Dual proof summary — combined artifact ───────────────────────────
  dual_proof_summary:
    name: "Dual Canonical Proof — Combined Artifact"
    needs: [synthetic_full, real_data_fred, real_data_validation_protocol]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download synthetic artifact
        uses: actions/download-artifact@v4
        with:
          name: nightly_synthetic_${{ github.run_id }}
          path: _combined/synthetic
        continue-on-error: true

      - name: Download real data artifact
        uses: actions/download-artifact@v4
        with:
          name: nightly_real_fred_${{ github.run_id }}
          path: _combined/real_fred
        continue-on-error: true

      - name: Create dual_proof_manifest.json
        env:
          SYNTH_SUPPORT:    ${{ needs.synthetic_full.outputs.synthetic_support_level }}
          SYNTH_VERDICT:    ${{ needs.synthetic_full.outputs.synthetic_global_verdict }}
          REAL_SUPPORT:     ${{ needs.real_data_fred.outputs.real_support_level }}
          REAL_VERDICT:     ${{ needs.real_data_fred.outputs.real_global_verdict }}
          PROTO_VERDICT:    ${{ needs.real_data_validation_protocol.outputs.protocol_verdict }}
          PROTO_DET_RATE:   ${{ needs.real_data_validation_protocol.outputs.protocol_test_det_rate }}
        run: |
          python - <<'PYEOF'
          import json, glob, os
          from datetime import datetime, timezone

          synth_support = os.environ.get("SYNTH_SUPPORT", "NOT_FOUND")
          synth_verdict = os.environ.get("SYNTH_VERDICT", "UNKNOWN")
          real_support  = os.environ.get("REAL_SUPPORT",  "NOT_FOUND")
          real_verdict  = os.environ.get("REAL_VERDICT",  "UNKNOWN")
          proto_verdict = os.environ.get("PROTO_VERDICT", "UNKNOWN")
          proto_det_rate = os.environ.get("PROTO_DET_RATE", "NaN")

          # Pull gate details from the downloaded synthetic artifact
          synth_gate = {}
          for f in glob.glob("_combined/synthetic/**/global_verdict.json", recursive=True):
              try:
                  d = json.loads(open(f).read())
                  synth_gate = d.get("full_validation_gate", {})
              except Exception:
                  pass
              break

          # Pull per-test details from the downloaded real data artifact
          real_tests = {}
          for f in glob.glob("_combined/real_fred/**/global_summary.json", recursive=True):
              try:
                  d = json.loads(open(f).read())
                  real_tests = d.get("test_verdicts", {})
              except Exception:
                  pass
              break

          dual_status = (
              "DUAL_PROOF_COMPLETE"
              if synth_support == "full_statistical_support"
              and real_support == "real_data_canonical_support"
              else "DUAL_PROOF_INCOMPLETE"
          )

          manifest = {
              "run_id": "${{ github.run_id }}",
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "dual_proof_status": dual_status,
              "proof_dimensions": {
                  "synthetic": {
                      "run_mode": "full_statistical",
                      "n_per_statistical_test": 60,
                      "n_runs_min_enforced": 50,
                      "global_verdict": synth_verdict,
                      "support_level": synth_support,
                      "gate_passed": synth_gate.get("gate_passed", None),
                      "n_statistical_passed": synth_gate.get("n_passed", None),
                  },
                  "real_data_fred": {
                      "run_mode": "real_data_canonical",
                      "dataset": "FRED monthly (n=480, 1986-2025)",
                      "global_verdict": real_verdict,
                      "support_level": real_support,
                  },
                  "real_data_validation_protocol": {
                      "run_mode": "validation_protocol_fast",
                      "protocol": "3-dataset (test/stable/placebo) × window_sensitivity × subsample_stability",
                      "verdict": proto_verdict,
                      "test_detection_rate": proto_det_rate,
                      "note": "fast mode: 3 window variants × 10 subsamples",
                  },
              },
              "forbidden_report_labels": [
                  "full support",
                  "full empirical support",
              ],
              "forbidden_note": (
                  "Use only the machine-computed support_level tokens above. "
                  "'full support' and 'full empirical support' are editorial claims "
                  "not produced by this pipeline."
              ),
          }

          os.makedirs("_combined", exist_ok=True)
          with open("_combined/dual_proof_manifest.json", "w") as fh:
              json.dump(manifest, fh, indent=2)
          print(json.dumps(manifest, indent=2))
          PYEOF

      - name: Write GitHub step summary
        env:
          SYNTH_SUPPORT:    ${{ needs.synthetic_full.outputs.synthetic_support_level }}
          SYNTH_VERDICT:    ${{ needs.synthetic_full.outputs.synthetic_global_verdict }}
          REAL_SUPPORT:     ${{ needs.real_data_fred.outputs.real_support_level }}
          REAL_VERDICT:     ${{ needs.real_data_fred.outputs.real_global_verdict }}
          PROTO_VERDICT:    ${{ needs.real_data_validation_protocol.outputs.protocol_verdict }}
          PROTO_DET_RATE:   ${{ needs.real_data_validation_protocol.outputs.protocol_test_det_rate }}
        run: |
          python - <<'PYEOF'
          import os

          synth_support = os.environ.get("SYNTH_SUPPORT", "NOT_FOUND")
          synth_verdict = os.environ.get("SYNTH_VERDICT", "UNKNOWN")
          real_support  = os.environ.get("REAL_SUPPORT",  "NOT_FOUND")
          real_verdict  = os.environ.get("REAL_VERDICT",  "UNKNOWN")
          proto_verdict = os.environ.get("PROTO_VERDICT", "UNKNOWN")
          proto_det_rate = os.environ.get("PROTO_DET_RATE", "NaN")

          def icon(s):
              return "✅" if s in ("full_statistical_support", "real_data_canonical_support") else "❌"

          def icon_v(v):
              return "✅" if v == "ACCEPT" else ("❌" if v == "REJECT" else "⚠️")

          dual_ok = (
              synth_support == "full_statistical_support"
              and real_support == "real_data_canonical_support"
          )

          md = f"""## ORI-C Nightly — Dual Canonical Proof + Validation Protocol

          {"✅ DUAL_PROOF_COMPLETE" if dual_ok else "❌ DUAL_PROOF_INCOMPLETE"}

          | Dimension | run_mode | verdict | support_level | |
          |-----------|----------|---------|---------------|---|
          | Synthetic simulation | `full_statistical` (n=60, min=50 enforced) | `{synth_verdict}` | `{synth_support}` | {icon(synth_support)} |
          | Real data FRED (1986–2025) | `real_data_canonical` | `{real_verdict}` | `{real_support}` | {icon(real_support)} |
          | Validation protocol (FRED fast) | `3-dataset × window × subsample` | `{proto_verdict}` (det_rate={proto_det_rate}) | — | {icon_v(proto_verdict)} |

          **Validation protocol**: 3 datasets (test / stable / placebo) × 3 window variants × 10 subsamples (80%).
          Transition stability, stable specificity, placebo non-detection are evaluated jointly.

          ### Labels FORBIDDEN in any report derived from any run
          - `full support`
          - `full empirical support`

          Use **only** the machine-computed `support_level` tokens from `dual_proof_manifest.json`.
          See artifact `nightly_dual_proof_{os.environ.get("GITHUB_RUN_ID", "")}` for combined manifest.
          """
          md = "\n".join(line.lstrip() for line in md.splitlines())

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if step_summary:
              with open(step_summary, "a") as fh:
                  fh.write(md)
          print(md)
          PYEOF


      - name: Render nightly HTML report
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path

          final_path = Path("_combined/tables/final_status.json")
          dual_path = Path("_combined/dual_proof_manifest.json")

          if not final_path.exists():
              raise SystemExit(f"missing {final_path}")
          if not dual_path.exists():
              raise SystemExit(f"missing {dual_path}")

          final_data = json.loads(final_path.read_text(encoding="utf-8"))
          dual_data = json.loads(dual_path.read_text(encoding="utf-8"))
          dims = dual_data.get("proof_dimensions", {}) or {}
          syn = dims.get("synthetic", {}) or {}
          fred = dims.get("real_data_fred", {}) or {}
          proto = dims.get("real_data_validation_protocol", {}) or {}

          def esc(value):
              s = "" if value is None else str(value)
              return (
                  s.replace("&", "&amp;")
                   .replace("<", "&lt;")
                   .replace(">", "&gt;")
                   .replace('"', "&quot;")
              )

          def verdict_class(value):
              v = str(value or "").upper()
              if v in {"TRUE", "ACCEPT", "DUAL_PROOF_COMPLETE"}:
                  return "ok"
              if v in {"FALSE", "REJECT", "DUAL_PROOF_INCOMPLETE"}:
                  return "bad"
              if v == "INDETERMINATE":
                  return "warn"
              return ""

          reasons = final_data.get("reasons") or []
          reasons_html = "".join(f"<li>{esc(r)}</li>" for r in reasons) if reasons else "<li>Aucune raison bloquante.</li>"

          html = f'''<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ORI-C . Nightly Report</title>
  <style>
    :root {{
      --bg: #0b1220; --panel: #121b2d; --panel2: #17233a; --text: #e8eefc; --muted: #9fb0d1;
      --ok: #2ecc71; --warn: #f1c40f; --bad: #e74c3c; --line: #2a3958;
    }}
    * {{ box-sizing: border-box; }}
    body {{ margin: 0; font-family: Inter, system-ui, Arial, sans-serif; background: linear-gradient(180deg,#0b1220 0%,#0d1628 100%); color: var(--text); }}
    .wrap {{ width:min(1160px, calc(100% - 32px)); margin:0 auto; padding:28px 0 48px; }}
    h1 {{ margin:0 0 8px; font-size:2rem; }}
    .muted {{ color: var(--muted); }}
    .grid {{ display:grid; grid-template-columns: repeat(12,1fr); gap:14px; margin-top:22px; }}
    .card {{ grid-column: span 12; background: rgba(18,27,45,.92); border:1px solid var(--line); border-radius:16px; padding:18px; }}
    .span-3 {{ grid-column: span 3; }} .span-4 {{ grid-column: span 4; }} .span-6 {{ grid-column: span 6; }} .span-8 {{ grid-column: span 8; }} .span-12 {{ grid-column: span 12; }}
    @media (max-width: 960px) {{ .span-3,.span-4,.span-6,.span-8,.span-12 {{ grid-column: span 12; }} }}
    .klabel {{ color: var(--muted); font-size:.78rem; text-transform:uppercase; letter-spacing:.08em; margin-bottom:7px; }}
    .kvalue {{ font-size:1.35rem; font-weight:700; word-break:break-word; }}
    .ok {{ color: var(--ok); }} .warn {{ color: var(--warn); }} .bad {{ color: var(--bad); }}
    dl {{ display:grid; grid-template-columns: 220px 1fr; gap:8px 12px; margin:0; }}
    dt {{ color: var(--muted); }} dd {{ margin:0; overflow-wrap:anywhere; }}
    @media (max-width:720px) {{ dl {{ grid-template-columns:1fr; }} }}
    .mono {{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:.92rem; }}
    .json {{ background:#0d1526; border:1px solid var(--line); border-radius:12px; padding:14px; max-height:360px; overflow:auto; white-space:pre-wrap; }}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ORI-C . Nightly Report</h1>
    <p class="muted">Page générée automatiquement par le workflow nightly. Source de vérité : <span class="mono">final_status.json</span> et <span class="mono">dual_proof_manifest.json</span>.</p>

    <div class="grid">
      <section class="card span-3"><div class="klabel">Final pass</div><div class="kvalue {verdict_class(str(final_data.get("final_pass")).upper())}">{esc(final_data.get("final_pass"))}</div></section>
      <section class="card span-3"><div class="klabel">Dual proof</div><div class="kvalue {verdict_class(dual_data.get("dual_proof_status"))}">{esc(dual_data.get("dual_proof_status"))}</div></section>
      <section class="card span-3"><div class="klabel">Validation verdict</div><div class="kvalue {verdict_class(proto.get("verdict"))}">{esc(proto.get("verdict"))}</div></section>
      <section class="card span-3"><div class="klabel">Best input</div><div class="kvalue">{esc(proto.get("best_input") or proto.get("best_stem") or "—")}</div></section>

      <section class="card span-8">
        <h2>Résumé canonique</h2>
        <dl>
          <dt>Run ID</dt><dd class="mono">{esc(dual_data.get("run_id"))}</dd>
          <dt>Timestamp UTC</dt><dd>{esc(dual_data.get("timestamp_utc") or final_data.get("timestamp_utc"))}</dd>
          <dt>Synthétique</dt><dd>{esc(syn.get("global_verdict"))}</dd>
          <dt>Support synthétique</dt><dd>{esc(syn.get("support_level"))}</dd>
          <dt>Real FRED</dt><dd>{esc(fred.get("global_verdict"))}</dd>
          <dt>Support real FRED</dt><dd>{esc(fred.get("support_level"))}</dd>
          <dt>Validation test detection rate</dt><dd>{esc(proto.get("test_detection_rate") or final_data.get("inputs",{{}}).get("validation_protocol_test_detection_rate"))}</dd>
        </dl>
      </section>

      <section class="card span-4">
        <h2>Raisons</h2>
        <ul>{reasons_html}</ul>
      </section>

      <section class="card span-6">
        <h2>Dimensions de preuve</h2>
        <dl>
          <dt>Synthetic gate passed</dt><dd>{esc(syn.get("gate_passed"))}</dd>
          <dt>n statistical passed</dt><dd>{esc(syn.get("n_statistical_passed"))}</dd>
          <dt>Validation verdict</dt><dd>{esc(proto.get("verdict"))}</dd>
