name: Real Data Smoke (ORI-C) - Custom

on:
  workflow_dispatch:
    inputs:
      dataset_csv:
        description: "Chemin du CSV à exécuter"
        required: true
        default: "03_Data/real/_custom/custom.csv"
      col_time:
        description: "Nom de la colonne temps"
        required: true
        default: "t"
      time_mode:
        description: "index ou date"
        required: true
        default: "index"
      col_O:
        description: "Nom de la colonne proxy O"
        required: true
        default: "O"
      col_R:
        description: "Nom de la colonne proxy R"
        required: true
        default: "R"
      col_I:
        description: "Nom de la colonne proxy I"
        required: true
        default: "I"
      col_demand:
        description: "Nom de la colonne demand"
        required: true
        default: "demand"
      col_S:
        description: "Nom de la colonne S (symbolic stress)"
        required: true
        default: "S"
      normalize:
        description: "none, minmax, zscore"
        required: true
        default: "minmax"
      control_mode:
        description: "same ou no_symbolic"
        required: true
        default: "same"

permissions:
  contents: read

jobs:
  real_data_smoke_custom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run custom real data smoke
        shell: bash
        run: |
          set -u

          RUN_ID="${GITHUB_RUN_ID}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}"
          ROOT="_ci_out/real_data_smoke/custom/run_${RUN_ID}_${RUN_ATTEMPT}"
          mkdir -p "${ROOT}"

          echo "dataset_csv=${{ inputs.dataset_csv }}" > "${ROOT}/inputs.txt"
          echo "col_time=${{ inputs.col_time }}" >> "${ROOT}/inputs.txt"
          echo "time_mode=${{ inputs.time_mode }}" >> "${ROOT}/inputs.txt"
          echo "col_O=${{ inputs.col_O }}" >> "${ROOT}/inputs.txt"
          echo "col_R=${{ inputs.col_R }}" >> "${ROOT}/inputs.txt"
          echo "col_I=${{ inputs.col_I }}" >> "${ROOT}/inputs.txt"
          echo "col_demand=${{ inputs.col_demand }}" >> "${ROOT}/inputs.txt"
          echo "col_S=${{ inputs.col_S }}" >> "${ROOT}/inputs.txt"
          echo "normalize=${{ inputs.normalize }}" >> "${ROOT}/inputs.txt"
          echo "control_mode=${{ inputs.control_mode }}" >> "${ROOT}/inputs.txt"

          RUN_DIR="${ROOT}/run"
          mkdir -p "${RUN_DIR}"

          python 04_Code/pipeline/run_real_data_demo.py             --input "${{ inputs.dataset_csv }}"             --outdir "${RUN_DIR}"             --col-time "${{ inputs.col_time }}"             --time-mode "${{ inputs.time_mode }}"             --col-O "${{ inputs.col_O }}"             --col-R "${{ inputs.col_R }}"             --col-I "${{ inputs.col_I }}"             --col-demand "${{ inputs.col_demand }}"             --col-S "${{ inputs.col_S }}"             --normalize "${{ inputs.normalize }}"             --control-mode "${{ inputs.control_mode }}"             > "${ROOT}/run_real_data_demo.log" 2>&1
          echo $? > "${ROOT}/rc_demo.txt"

          python 04_Code/pipeline/tests_causaux.py             --run-dir "${RUN_DIR}"             --mode real             > "${ROOT}/tests_causaux.log" 2>&1
          echo $? > "${ROOT}/rc_causal.txt"

          if [ -f "04_Code/pipeline/make_sha256_manifest.py" ]; then
            python 04_Code/pipeline/make_sha256_manifest.py               --root "${ROOT}"               --out "${ROOT}/manifest.json"               > "${ROOT}/manifest.log" 2>&1 || true
          fi

          echo "done" > "${ROOT}/status.txt"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_custom_${{ github.run_id }}
          path: _ci_out/real_data_smoke/custom
          if-no-files-found: warn
