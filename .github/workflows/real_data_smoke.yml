name: Real Data Smoke (ORI-C)

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Path to real CSV (must be in the repo)"
        required: true
        default: "03_Data/real/pilot_cpi/real.csv"
      pre_horizon:
        description: "Pre horizon length"
        required: false
        default: "200"
      post_horizon:
        description: "Post horizon length"
        required: false
        default: "200"
      n_boot:
        description: "Bootstrap replicates for CI (smoke)"
        required: false
        default: "200"
  push:
    branches: ["main"]
    paths:
      - "04_Code/pipeline/run_real_data_demo.py"
      - "04_Code/pipeline/tests_causaux.py"
      - "03_Data/real/**"
      - ".github/workflows/real_data_smoke.yml"
  pull_request:
    paths:
      - "04_Code/pipeline/run_real_data_demo.py"
      - "04_Code/pipeline/tests_causaux.py"
      - "03_Data/real/**"
      - ".github/workflows/real_data_smoke.yml"

jobs:
  real_data_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATASET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dataset || '03_Data/real/pilot_cpi/real.csv' }}
      PRE_HORIZON: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pre_horizon || '200' }}
      POST_HORIZON: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.post_horizon || '200' }}
      N_BOOT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.n_boot || '200' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel

          python -m pip install             "numpy>=1.26"             "pandas>=2.0"             "matplotlib>=3.8"             "scipy>=1.11"             "pytest>=8.0"             "statsmodels>=0.14"

          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt;           elif [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi

          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Run real data pipeline (smoke)
        run: |
          set -e
          mkdir -p _ci_out
          python -V | tee _ci_out/python_version.txt
          pip -V | tee _ci_out/pip_version.txt
          pip list | tee _ci_out/pip_list.txt

          OUTDIR="_ci_out/real_data_smoke/run_${{ github.run_id }}"
          mkdir -p "$OUTDIR"

          echo "dataset=$DATASET pre_horizon=$PRE_HORIZON post_horizon=$POST_HORIZON n_boot=$N_BOOT" | tee "$OUTDIR/params.txt"

          python 04_Code/pipeline/run_real_data_demo.py             --input "$DATASET"             --outdir "$OUTDIR"             --col-time date             --normalize robust             --control-mode same             --k 2.5 --m 3 --baseline-n 50             2>&1 | tee "$OUTDIR/run_real_data_demo.log"

          python 04_Code/pipeline/tests_causaux.py             --run-dir "$OUTDIR"             --alpha 0.01             --lags 1-10             --pre-horizon "$PRE_HORIZON"             --post-horizon "$POST_HORIZON"             --k 2.5 --m 3 --baseline-n 50             --block 25             --n-boot "$N_BOOT"             --seed 123             --n-steps-min 200             --pdf             2>&1 | tee "$OUTDIR/tests_causaux.log"

          python - << 'PY'
          import hashlib, json, os, pathlib, time
          outdir = pathlib.Path(os.environ.get("OUTDIR", "_ci_out/real_data_smoke"))
          # OUTDIR is not exported by bash, so compute it from run_id folder pattern
          base = pathlib.Path("_ci_out/real_data_smoke")
          runs = sorted([p for p in base.glob("run_*") if p.is_dir()])
          outdir = runs[-1] if runs else base
          items = []
          for p in sorted(outdir.rglob("*")):
            if p.is_file():
              h = hashlib.sha256(p.read_bytes()).hexdigest()
              items.append({"path": str(p.relative_to(outdir)), "sha256": h, "bytes": p.stat().st_size})
          (outdir / "manifest.json").write_text(json.dumps({"generated_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()), "files": items}, indent=2), encoding="utf-8")
          print(f"manifest written: {outdir/'manifest.json'}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_${{ github.run_id }}
          path: _ci_out/real_data_smoke
          if-no-files-found: warn
