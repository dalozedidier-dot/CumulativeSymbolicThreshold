name: CI - Real Data Smoke

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  real_data_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Prepare output directory
        run: |
          rm -rf _ci_out
          mkdir -p _ci_out/real_data_smoke

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy>=1.26" "pandas>=2.0" "scipy>=1.11" "statsmodels>=0.14" "matplotlib>=3.8"
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Select real dataset (stable CI default)
        id: pickdata
        run: |
          set -e
          DEFAULT="03_Data/real/_bundles/data_real_v2/oric_inputs/oric_inputs_BE.csv"
          if [ -f "$DEFAULT" ]; then
            echo "input=$DEFAULT" >> $GITHUB_OUTPUT
            echo "Using default input: $DEFAULT"
            exit 0
          fi

          # Fallback: pick the first oric_inputs_*.csv found under 03_Data/real
          FOUND="$(ls -1 03_Data/real/**/oric_inputs_*.csv 2>/dev/null | head -n 1 || true)"
          if [ -n "$FOUND" ]; then
            echo "input=$FOUND" >> $GITHUB_OUTPUT
            echo "Using fallback input: $FOUND"
            exit 0
          fi

          echo "ERROR: No real input CSV found."
          echo "Expected: $DEFAULT"
          echo "Also tried: 03_Data/real/**/oric_inputs_*.csv"
          echo "Available CSV samples (first 40):"
          find 03_Data -maxdepth 5 -type f -name "*.csv" | head -n 40 || true
          exit 1

      - name: Run real data demo (pipeline)
        run: |
          set -eo pipefail
          INPUT="${{ steps.pickdata.outputs.input }}"
          echo "INPUT=$INPUT"
          # CI recommendation: time-mode index (no need for a time column).
          PYTHONPATH=src python 04_Code/pipeline/run_real_data_demo.py             --input "$INPUT"             --outdir _ci_out/real_data_smoke             --time-mode index             --normalize robust             --auto-scale             2>&1 | tee _ci_out/real_data_smoke_run.log

      - name: Run causal tests on real outputs (if available)
        run: |
          set -e
          if [ -f 04_Code/pipeline/tests_causaux.py ]; then
            PYTHONPATH=src python 04_Code/pipeline/tests_causaux.py               --run-root _ci_out/real_data_smoke               2>&1 | tee _ci_out/real_data_causal_tests.log
          else
            echo "tests_causaux.py not found, skip."
          fi

      - name: Build real-data CI summary (json + md + Actions summary)
        run: |
          set -e
          python 04_Code/reporting/build_real_data_ci_summary.py --ci-out _ci_out --real-root _ci_out/real_data_smoke

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci_real_data_${{ github.run_id }}
          path: _ci_out
          if-no-files-found: warn
