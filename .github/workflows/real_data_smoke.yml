name: Real data smoke (custom dataset)

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: Path to a CSV file inside the repo
        required: true
        default: "03_Data/real/pilot_cpi/real.csv"
      col_time:
        description: Time column name
        required: true
        default: "date"
      col_O:
        description: O proxy column name
        required: true
        default: "O"
      col_R:
        description: R proxy column name
        required: true
        default: "R"
      col_I:
        description: I proxy column name
        required: true
        default: "I"

permissions:
  contents: read

jobs:
  real_data_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -u
          python -V
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ORI-C + causal tests
        shell: bash
        run: |
          set -u -o pipefail

          INPUT_CSV="${{ inputs.dataset }}"
          COL_TIME="${{ inputs.col_time }}"
          COL_O="${{ inputs.col_O }}"
          COL_R="${{ inputs.col_R }}"
          COL_I="${{ inputs.col_I }}"

          RUN_ID="${{GITHUB_RUN_ID}}"
          ROOT="_ci_out/real_data_smoke/custom/run_${{RUN_ID}}"
          mkdir -p "${{ROOT}}/logs"

          # Fixed parameters
          ALPHA="0.01"
          PRE_H="250"
          POST_H="250"
          LAGS="1-10"
          C_MEAN_POST_MIN="0.1"

          CAP_SCALE="1000.0"
          DEMAND_TO_CAP_RATIO="0.90"
          SIGMA_STAR="0.0"
          TAU="500.0"
          SIGMA_TO_S_ALPHA="0.0008"
          S0="0.20"
          C_BETA="0.40"
          C_GAMMA="0.12"
          K="2.5"
          M="3"
          BASELINE_N="50"
          NORMALIZE="robust"
          TIME_MODE="index"
          CONTROL_MODE="no_symbolic"

          echo "${{INPUT_CSV}}" > "${{ROOT}}/dataset.txt"
          {{
            echo "run_id=${{RUN_ID}}"
            echo "sha=${{GITHUB_SHA}}"
          }} > "${{ROOT}}/run_meta.txt"

          python 04_Code/pipeline/run_real_data_demo.py \
            --input "${{INPUT_CSV}}" \
            --outdir "${{ROOT}}" \
            --col-time "${{COL_TIME}}" \
            --time-mode "${{TIME_MODE}}" \
            --col-O "${{COL_O}}" \
            --col-R "${{COL_R}}" \
            --col-I "${{COL_I}}" \
            --col-demand "demand" \
            --col-S "S" \
            --normalize "${{NORMALIZE}}" \
            --cap-scale "${{CAP_SCALE}}" \
            --demand-to-cap-ratio "${{DEMAND_TO_CAP_RATIO}}" \
            --sigma-star "${{SIGMA_STAR}}" \
            --tau "${{TAU}}" \
            --sigma-to-S-alpha "${{SIGMA_TO_S_ALPHA}}" \
            --S0 "${{S0}}" \
            --C-beta "${{C_BETA}}" \
            --C-gamma "${{C_GAMMA}}" \
            --k "${{K}}" \
            --m "${{M}}" \
            --baseline-n "${{BASELINE_N}}" \
            --control-mode "${{CONTROL_MODE}}" \
            2>&1 | tee "${{ROOT}}/logs/run_real_data_demo.log"

          python 04_Code/pipeline/tests_causaux.py \
            --run-dir "${{ROOT}}" \
            --alpha "${{ALPHA}}" \
            --pre-horizon "${{PRE_H}}" \
            --post-horizon "${{POST_H}}" \
            --lags "${{LAGS}}" \
            --c-mean-post-min "${{C_MEAN_POST_MIN}}" \
            --pdf \
            2>&1 | tee "${{ROOT}}/logs/tests_causaux.log"

          python 04_Code/pipeline/make_sha256_manifest.py \
            --root "${{ROOT}}" \
            --out "${{ROOT}}/manifest_sha256.json"

      - name: Upload artefacts (_ci_out)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_custom_${{ github.run_id }}
          path: _ci_out/real_data_smoke/custom/run_${{ github.run_id }}
          if-no-files-found: error
