name: CI - Real Data Smoke

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  real_data_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Prepare output directory
        run: |
          rm -rf _ci_out
          mkdir -p _ci_out/real_data_smoke

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          # Base scientific stack
          python -m pip install "numpy>=1.26" "pandas>=2.0" "scipy>=1.11" "statsmodels>=0.14" "matplotlib>=3.8"
          # Repo deps
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Run real data demo (pipeline)
        run: |
          set -eo pipefail
          # Convention: the real-data demo script writes a self-contained run directory
          # under the provided outdir, including tables/verdict.json and tables/summary.json.
          PYTHONPATH=src python 04_Code/pipeline/run_real_data_demo.py             --outdir _ci_out/real_data_smoke             2>&1 | tee _ci_out/real_data_smoke_run.log

      - name: Run causal tests on real outputs (if available)
        run: |
          set -e
          # Optional: only if your repo provides the causal tests runner.
          if [ -f 04_Code/pipeline/tests_causaux.py ]; then
            PYTHONPATH=src python 04_Code/pipeline/tests_causaux.py               --run-root _ci_out/real_data_smoke               2>&1 | tee _ci_out/real_data_causal_tests.log
          else
            echo "tests_causaux.py not found, skip."
          fi

      - name: Build real-data CI summary (json + md + Actions summary)
        run: |
          set -e
          python 04_Code/reporting/build_real_data_ci_summary.py --ci-out _ci_out --real-root _ci_out/real_data_smoke

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci_real_data_${{ github.run_id }}
          path: _ci_out
          if-no-files-found: warn
