name: Real Data Smoke (ORI-C)

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Path to CSV file in repo"
        required: true
        default: "03_Data/real/pilot_cpi_monthly.csv"
      col_time:
        description: "Time column name in the CSV"
        required: true
        default: "date"
      col_o:
        description: "Proxy column for O"
        required: true
        default: "O"
      col_r:
        description: "Proxy column for R"
        required: true
        default: "R"
      col_i:
        description: "Proxy column for I"
        required: true
        default: "I"
      time_mode:
        description: "Time handling mode (index|calendar)"
        required: true
        default: "index"
      normalize:
        description: "Normalization (none|zscore|robust)"
        required: true
        default: "robust"
      control_mode:
        description: "Control series mode (no_symbolic|symbolic)"
        required: true
        default: "no_symbolic"

  push:
    paths:
      - ".github/workflows/real_data_smoke.yml"
      - "04_Code/pipeline/**"
      - "03_Data/real/**"

permissions:
  contents: read

jobs:
  real_data_smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run real data smoke (custom)
        shell: bash
        run: |
          set -u -o pipefail
          set +e

          RUN_ID="${GITHUB_RUN_ID}"
          ROOT="_ci_out/real_data_smoke/custom/run_${RUN_ID}"
          RUN_DIR="${ROOT}/runs/custom/run_${RUN_ID}"

          mkdir -p "${RUN_DIR}"

          INPUT_CSV="${{ inputs.dataset }}"
          COL_TIME="${{ inputs.col_time }}"
          COL_O="${{ inputs.col_o }}"
          COL_R="${{ inputs.col_r }}"
          COL_I="${{ inputs.col_i }}"
          TIME_MODE="${{ inputs.time_mode }}"
          NORMALIZE="${{ inputs.normalize }}"
          CONTROL_MODE="${{ inputs.control_mode }}"

          # Fixed parameters aligned with sector smokes
          K="7"
          M="8"
          BASELINE_N="40"
          ALPHA="0.01"
          PRE_HORIZON="250"
          POST_HORIZON="250"
          LAGS="1,2,3,4,5,6"

          {
            echo "run_id=${RUN_ID}"
            echo "sha=${GITHUB_SHA}"
            echo "dataset=${INPUT_CSV}"
            echo "col_time=${COL_TIME}"
            echo "col_o=${COL_O}"
            echo "col_r=${COL_R}"
            echo "col_i=${COL_I}"
            echo "time_mode=${TIME_MODE}"
            echo "normalize=${NORMALIZE}"
            echo "control_mode=${CONTROL_MODE}"
            echo "k=${K}"
            echo "m=${M}"
            echo "baseline_n=${BASELINE_N}"
            echo "alpha=${ALPHA}"
            echo "pre_horizon=${PRE_HORIZON}"
            echo "post_horizon=${POST_HORIZON}"
            echo "lags=${LAGS}"
          } > "${ROOT}/run_meta.txt"

          echo "${INPUT_CSV}" > "${ROOT}/dataset.txt"

          RC_GLOBAL=0

          echo "[1/3] run_real_data_demo.py"
          python 04_Code/pipeline/run_real_data_demo.py                 --input "${INPUT_CSV}"                 --outdir "${RUN_DIR}"                 --col-time "${COL_TIME}"                 --time-mode "${TIME_MODE}"                 --normalize "${NORMALIZE}"                 --control-mode "${CONTROL_MODE}"                 --col-O "${COL_O}"                 --col-R "${COL_R}"                 --col-I "${COL_I}"                 --k "${K}"                 --m "${M}"                 --baseline-n "${BASELINE_N}"                 2>&1 | tee "${RUN_DIR}/run_real_data_demo.log"
          RC_PIPE="${PIPESTATUS[0]}"
          if [ "${RC_PIPE}" -ne 0 ]; then
            RC_GLOBAL="${RC_PIPE}"
          fi

          echo "[2/3] tests_causaux.py"
          python 04_Code/pipeline/tests_causaux.py                 --run-dir "${RUN_DIR}"                 --alpha "${ALPHA}"                 --pre-horizon "${PRE_HORIZON}"                 --post-horizon "${POST_HORIZON}"                 --lags "${LAGS}"                 2>&1 | tee "${RUN_DIR}/tests_causaux.log"
          RC_CAUSAL="${PIPESTATUS[0]}"
          if [ "${RC_CAUSAL}" -ne 0 ] && [ "${RC_GLOBAL}" -eq 0 ]; then
            RC_GLOBAL="${RC_CAUSAL}"
          fi

          echo "[3/3] make_sha256_manifest.py"
          python 04_Code/pipeline/make_sha256_manifest.py                 --root "${ROOT}"                 --out "${ROOT}/manifest.json"                 2>&1 | tee "${ROOT}/make_sha256_manifest.log"
          RC_MANIFEST="${PIPESTATUS[0]}"
          if [ "${RC_MANIFEST}" -ne 0 ] && [ "${RC_GLOBAL}" -eq 0 ]; then
            RC_GLOBAL="${RC_MANIFEST}"
          fi

          exit "${RC_GLOBAL}"

      - name: Upload real data smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_smoke_custom_${{ github.run_id }}
          path: _ci_out/real_data_smoke/custom/run_${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
