name: Real Data Canonical (Nightly/Weekly)

# ─────────────────────────────────────────────────────────────────────────────
# CANON level: heavier, scheduled. 2-3 datasets per sector.
# Reads from data/real_datasets_index.csv (canon_candidate=yes).
# Full stability battery + artifact upload.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "30 3 * * 1,4"  # Monday + Thursday 03:30 UTC
  workflow_dispatch:
    inputs:
      max_per_sector:
        description: "Max datasets per sector (default 3)"
        required: false
        default: "3"

jobs:
  resolve_matrix:
    name: "Resolve canonical datasets from index"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Resolve canon candidates
        id: resolve
        run: |
          python - <<'PYEOF'
          import csv, json, os, sys
          from pathlib import Path

          index_path = Path("data/real_datasets_index.csv")
          if not index_path.exists():
              print("ERROR: data/real_datasets_index.csv not found", file=sys.stderr)
              sys.exit(1)

          max_per_sector = int("${{ inputs.max_per_sector || '3' }}")
          sector_counts = {}
          includes = []

          with open(index_path) as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row.get("canon_candidate", "").strip().lower() != "yes":
                      continue
                  sector = row["sector"].strip()
                  count = sector_counts.get(sector, 0)
                  if count >= max_per_sector:
                      continue
                  sector_counts[sector] = count + 1
                  includes.append({
                      "dataset_id": row["dataset_id"].strip(),
                      "sector": sector,
                      "path": row["path"].strip(),
                      "format": row.get("format", "csv").strip(),
                      "frequency": row.get("frequency", "irregular").strip(),
                  })

          if not includes:
              print("ERROR: no canon candidates found", file=sys.stderr)
              sys.exit(1)

          matrix = {"include": includes}
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          print(f"Canon matrix: {len(includes)} datasets from {len(sector_counts)} sectors")
          for inc in includes:
              print(f"  {inc['sector']}/{inc['dataset_id']}")
          PYEOF

  canon_run:
    name: "Canon ${{ matrix.sector }}/${{ matrix.dataset_id }}"
    runs-on: ubuntu-latest
    needs: resolve_matrix
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.resolve_matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: "Canon run: ${{ matrix.dataset_id }}"
        run: |
          set -euo pipefail
          DATASET_PATH="${{ matrix.path }}"
          OUT_DIR="_ci_out/real_canonical/${{ matrix.sector }}/${{ matrix.dataset_id }}"

          if [ ! -e "$DATASET_PATH" ]; then
            echo "ERROR: dataset not found: $DATASET_PATH"
            exit 1
          fi

          echo "Running canonical analysis for ${{ matrix.dataset_id }} (${{ matrix.sector }})"

          TS=$(date -u +%Y%m%d_%H%M%S)
          RUN_DIR="${OUT_DIR}/runs/${TS}"
          mkdir -p "${RUN_DIR}/tables" "${RUN_DIR}/figures" "${RUN_DIR}/contracts" "${RUN_DIR}/stability"

          # Stage contracts
          cp contracts/POWER_CRITERIA.json "${RUN_DIR}/contracts/"
          cp contracts/STABILITY_CRITERIA.json "${RUN_DIR}/contracts/"

          # Generate input inventory
          python - <<PYEOF
          import csv, hashlib
          from pathlib import Path

          dataset = Path("$DATASET_PATH")
          inventory = []
          targets = [dataset] if dataset.is_file() else sorted(dataset.rglob("*.csv"))
          for f in targets:
              h = hashlib.sha256(f.read_bytes()).hexdigest()
              inventory.append({"file": str(f), "sha256": h, "size_bytes": f.stat().st_size})

          out_path = Path("${RUN_DIR}/contracts/input_inventory.csv")
          with open(out_path, "w", newline="") as fout:
              w = csv.DictWriter(fout, fieldnames=["file", "sha256", "size_bytes"])
              w.writeheader()
              w.writerows(inventory)
          print(f"Input inventory: {len(inventory)} files")
          PYEOF

          # Run power diagnostic (scan)
          python - <<PYEOF
          import json
          from pathlib import Path

          # Sector-specific density expectations
          DENSITY_HINTS = {
              "finance": "high",
              "climate": "high",
              "qcc": "medium",
              "survey": "low_scan_first",
              "social": "medium",
              "ai_tech": "medium",
              "bio": "medium",
              "psych": "medium",
          }

          sector = "${{ matrix.sector }}"
          dataset_id = "${{ matrix.dataset_id }}"
          frequency = "${{ matrix.frequency }}"

          summary = {
              "dataset_id": dataset_id,
              "sector": sector,
              "run_mode": "canonical",
              "dataset_path": "$DATASET_PATH",
              "frequency": frequency,
              "density_hint": DENSITY_HINTS.get(sector, "unknown"),
              "power_diagnostic": {
                  "note": "Full power diagnostic requires sector-specific analysis pipeline"
              },
          }
          Path("${RUN_DIR}/tables/summary.json").write_text(
              json.dumps(summary, indent=2), encoding="utf-8"
          )
          PYEOF

          # Placeholder stability summary
          python - <<PYEOF
          import json
          from pathlib import Path

          stab = {
              "note": "Stability battery placeholder — requires sector-specific pipeline integration",
              "stability_check": {
                  "all_pass": None,
                  "checks": {},
              },
          }
          Path("${RUN_DIR}/stability/stability_summary.json").write_text(
              json.dumps(stab, indent=2), encoding="utf-8"
          )
          PYEOF

          # Placeholder figures
          python - <<PYEOF
          try:
              import matplotlib
              matplotlib.use("Agg")
              import matplotlib.pyplot as plt
              fig, ax = plt.subplots()
              ax.text(0.5, 0.5, "Canon: ${{ matrix.dataset_id }}",
                      ha="center", va="center", fontsize=12)
              ax.set_title("${{ matrix.sector }}")
              fig.savefig("${RUN_DIR}/figures/canon_overview.png", dpi=100)
              plt.close()
          except ImportError:
              from pathlib import Path
              Path("${RUN_DIR}/figures/placeholder.txt").write_text("no matplotlib")
          PYEOF

          # Write manifest (hashes contracts + tables + figures + stability)
          python -m tools.make_manifest \
            --root "${RUN_DIR}" \
            --out "${RUN_DIR}/manifest.json"

          echo "Canon run complete: ${RUN_DIR}"

      - uses: actions/upload-artifact@v4
        with:
          name: canon_${{ matrix.sector }}_${{ matrix.dataset_id }}
          path: _ci_out/real_canonical/${{ matrix.sector }}/${{ matrix.dataset_id }}
          retention-days: 30
