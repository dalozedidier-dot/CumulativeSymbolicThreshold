name: Real data suite (ORI-C) - trafic

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -V
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "pytest>=8.0" || true
          python -m pip list

      - name: Run real data suite (locked params)
        shell: bash
        env:
          OUTBASE: _ci_out/real_data_suite/trafic/run_${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          SECTOR="trafic"
          RUN_ID="${{ github.run_id }}"
          OUTBASE="_ci_out/real_data_suite/${SECTOR}/run_${RUN_ID}"
          mkdir -p "${OUTBASE}"

          echo "sector=${SECTOR}" > "${OUTBASE}/sector.txt"
          echo "run_id=${RUN_ID}" > "${OUTBASE}/run_id.txt"
          echo "policy=locked_params_no_post_observation_tuning" > "${OUTBASE}/policy.txt"

          # Fixed, preregistered parameters (do not tune from n_steps)
          K="2.5"
          M="3"
          BASELINE_N="50"
          ALPHA="0.01"
          PRE_H="500"
          POST_H="500"
          LAGS="1-10"
          MAXLAG="10"
          BLOCK="25"
          N_BOOT="800"
          SEED="123"
          C_MEAN_POST_MIN="0.1"

          cat > "${OUTBASE}/params.txt" << 'EOF'
          k=2.5
          m=3
          baseline_n=50
          alpha=0.01
          pre_horizon=500
          post_horizon=500
          lags=1-10
          maxlag=10
          block=25
          n_boot=800
          seed=123
          c_mean_post_min=0.1
          time_mode=index
          normalize=robust (pilot), none (bundles)
          control_mode=no_symbolic
          EOF

          rc=0

          run_one () {
            local label="$1"
            local csv="$2"
            shift 2
            local extra_args="$@"

            local out="${OUTBASE}/${label}"
            mkdir -p "${out}"

            echo "label=${label}" > "${out}/dataset.txt"
            echo "csv=${csv}" >> "${out}/dataset.txt"

            set +e
            python 04_Code/pipeline/run_real_data_demo.py                   --input "${csv}"                   --outdir "${out}"                   --time-mode index                   --normalize robust                   --control-mode no_symbolic                   --k "${K}" --m "${M}" --baseline-n "${BASELINE_N}"                   ${extra_args}                   2>&1 | tee "${out}/run_real_data_demo.log"
            local rc_demo=${PIPESTATUS[0]}
            echo "${rc_demo}" > "${out}/rc_demo.txt"
            if [ "${rc_demo}" -ne 0 ]; then
              rc=1
              set -e
              return 0
            fi

            python 04_Code/pipeline/tests_causaux.py                   --run-dir "${out}"                   --alpha "${ALPHA}"                   --c-mean-post-min "${C_MEAN_POST_MIN}"                   --lags "${LAGS}"                   --maxlag "${MAXLAG}"                   --pre-horizon "${PRE_H}"                   --post-horizon "${POST_H}"                   --k "${K}" --m "${M}" --baseline-n "${BASELINE_N}"                   --block "${BLOCK}"                   --n-boot "${N_BOOT}"                   --seed "${SEED}"                   --pdf                   2>&1 | tee "${out}/tests_causaux.log"
            local rc_causal=${PIPESTATUS[0]}
            echo "${rc_causal}" > "${out}/rc_causal.txt"
            if [ "${rc_causal}" -ne 0 ]; then
              rc=1
            fi
            set -e
            return 0
          }

          # Dataset 01: pilot raw proxies
          run_one "01_pilot" "03_Data/real/trafic/pilot_trafic/real.csv"                 --col-time year                 --col-O industrial_production_i15                 --col-R berd_pc_gdp                 --col-I ict_spec_pc_ent_ge10

          # Dataset 02: bundles v1 (already canonical ORI-C inputs)
          run_one "02_bundle_v1DE" "03_Data/real/_bundles/data_real_v1/oric_inputs/oric_inputsDE.csv"                 --col-time year                 --col-O O --col-R R --col-I I --col-S S                 --normalize none

          # Dataset 03: bundles v2 (already canonical ORI-C inputs)
          run_one "03_bundle_v2DE" "03_Data/real/_bundles/data_real_v2/oric_inputs/oric_inputsDE.csv"                 --col-time year                 --col-O O --col-R R --col-I I --col-S S                 --normalize none

          python - << 'PY'
          import hashlib, json, os, pathlib, time

          outbase = pathlib.Path(os.environ["OUTBASE"])

          def sha256(p: pathlib.Path) -> str:
            h = hashlib.sha256()
            with p.open("rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                h.update(chunk)
            return h.hexdigest()

          datasets = []
          for d in sorted([p for p in outbase.iterdir() if p.is_dir() and p.name[:2].isdigit()]):
            verdict = d / "tables" / "verdict.json"
            item = {"dataset": d.name}
            if verdict.exists():
              try:
                j = json.loads(verdict.read_text(encoding="utf-8"))
                item.update({
                  "verdict": j.get("verdict"),
                  "binary_detected": j.get("binary_detected"),
                  "threshold_hit_t": j.get("threshold_hit_t"),
                  "reverse_warning": j.get("reverse_warning"),
                  "ok_p_source": (j.get("criteria") or {}).get("ok_p_source"),
                  "series_short": j.get("series_short"),
                })
              except Exception as e:
                item["verdict"] = "read_error"
                item["error"] = str(e)
            else:
              item["verdict"] = "missing"
            datasets.append(item)

          summary = {
            "generated_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
            "sector": (outbase / "sector.txt").read_text(encoding="utf-8").strip().split("=", 1)[-1],
            "datasets": datasets,
          }
          (outbase / "summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          files = []
          for p in sorted(outbase.rglob("*")):
            if p.is_file():
              files.append({
                "path": str(p.relative_to(outbase)),
                "sha256": sha256(p),
                "bytes": p.stat().st_size,
              })
          (outbase / "manifest.json").write_text(
            json.dumps({"generated_utc": summary["generated_utc"], "files": files}, indent=2),
            encoding="utf-8",
          )
          print("summary.json and manifest.json written under", outbase)
          PY

          if [ "${rc}" -ne 0 ]; then
            echo "One or more datasets failed. See rc_*.txt and logs under ${OUTBASE}"
          fi
          exit "${rc}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_suite_trafic_${{ github.run_id }}
          path: _ci_out/real_data_suite/trafic/run_${{ github.run_id }}
          if-no-files-found: warn
