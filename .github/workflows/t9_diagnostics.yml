name: T9 - Cross-domain Diagnostics (blocking)

# T9 est un test "proof_only" de discrimination vivant-like vs contrôles négatifs.
# Ce workflow exécute T9 en mode bloquant : un REJECT arrête le run.
# Lancer manuellement ou via full_statistical.yml (T9 y est automatiquement inclus).

on:
  workflow_dispatch:

jobs:
  t9_diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Prepare output directory
        run: |
          rm -rf _ci_out
          mkdir -p _ci_out/t9_diagnostics

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy>=1.26" "pandas>=2.0" "scipy>=1.11" "statsmodels>=0.14" "matplotlib>=3.8"
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f 04_Code/requirements.txt ]; then python -m pip install -r 04_Code/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e .; fi

      - name: Run T9 cross-domain discrimination test
        run: |
          # set +e : run_T9_cross_domain.py exits 1 when verdict = REJECT (by design).
          # We capture the verdict in verdict.json and let the "Assert T9 verdict" step
          # be the hard gate, so we don't lose the output on a non-zero exit.
          set +e
          PYTHONPATH=src python 04_Code/pipeline/run_T9_cross_domain.py \
            --outdir _ci_out/t9_diagnostics \
            --seed 1242 \
            2>&1 | tee _ci_out/t9_diagnostics/t9_run.log
          echo "T9 python exit code: ${PIPESTATUS[0]}" >> _ci_out/t9_diagnostics/t9_run.log
          exit 0  # gate is handled by the verdict check step below

      - name: Assert T9 verdict (hard gate)
        run: |
          python - <<'PYEOF'
          import json
          import sys
          from pathlib import Path

          verdict_path = Path("_ci_out/t9_diagnostics/tables/verdict.json")
          if not verdict_path.exists():
              print("ERROR: verdict.json introuvable — T9 n'a pas produit de sortie.")
              sys.exit(1)

          v = json.loads(verdict_path.read_text(encoding="utf-8"))
          global_verdict = v.get("global", "UNKNOWN")
          blocks         = v.get("blocks", {})
          values         = v.get("values", {})

          print(f"T9 global       : {global_verdict}")
          print(f"  discrimination: {blocks.get('discrimination', '?')}")
          print(f"  robustness    : {blocks.get('robustness', '?')}")
          print(f"  anti_gaming   : {blocks.get('anti_gaming', '?')}")
          print(f"  balanced_acc  : {values.get('balanced_accuracy', '?')}")
          print(f"  fpr_negatives : {values.get('fpr_negatives', '?')}")
          print(f"  spearman_med  : {values.get('spearman_median', '?')}")
          print(f"  jaccard_med   : {values.get('jaccard_median', '?')}")
          print(f"  flip_rate_med : {values.get('flip_rate_median', '?')}")

          if global_verdict == "REJECT":
              print("\nFAIL: T9 verdict = REJECT — les critères de discrimination cross-domaine ne sont pas satisfaits.")
              sys.exit(1)
          elif global_verdict == "INDETERMINATE":
              print("\nWARN: T9 verdict = INDETERMINATE — résultat non concluant.")
              # INDETERMINATE n'est pas un REJECT ; on ne bloque pas.
          else:
              print(f"\nOK: T9 verdict = {global_verdict}")
          PYEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: t9_diagnostics_${{ github.run_id }}
          path: _ci_out/t9_diagnostics
          if-no-files-found: warn
