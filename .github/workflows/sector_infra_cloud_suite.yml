name: Sector Infra Cloud Suite

on:
  push:
    paths:
      - '04_Code/sector/infra_cloud/**'
      - '04_Code/sector/shared/**'
      - '03_Data/sector_infra_cloud/**'
      - '.github/workflows/sector_infra_cloud_suite.yml'
  pull_request:
    paths:
      - '04_Code/sector/infra_cloud/**'
      - '04_Code/sector/shared/**'
  schedule:
    - cron: '0 6 * * 2'   # weekly Tuesday 06:00 UTC
  workflow_dispatch:
    inputs:
      pilot_id:
        description: 'Pilot to run (ec2_cpu_825cc2 | ec2_cpu_24ae8d | ec2_disk_c0d644 | ec2_net_in_a2eb1cd9 | all)'
        required: false
        default: 'all'
      mode:
        description: 'Run mode (smoke_ci | full_statistical)'
        required: false
        default: 'smoke_ci'

jobs:
  infra-cloud-sector:
    name: Infra Cloud sector · ${{ matrix.pilot }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pilot: [ec2_cpu_825cc2, ec2_cpu_24ae8d, ec2_disk_c0d644, ec2_net_in_a2eb1cd9]

    steps:
      - uses: actions/checkout@v6
      - name: Ensure _ci_out exists
        run: mkdir -p _ci_out

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r 04_Code/requirements-dev.txt

      - name: Run infra_cloud sector suite · ${{ matrix.pilot }}
        env:
          PYTHONPATH: 04_Code
        run: |
          python 04_Code/sector/infra_cloud/run_sector_suite.py \
            --pilot-id ${{ matrix.pilot }} \
            --outdir   _sector_infra_cloud_out/${{ matrix.pilot }} \
            --seed     1234 \
            --mode     ${{ github.event.inputs.mode || 'smoke_ci' }}

      - name: Upload artifacts · ${{ matrix.pilot }}
        uses: actions/upload-artifact@v4
        with:
          name: sector_infra_cloud_${{ matrix.pilot }}_${{ github.run_id }}
          path: |
            _sector_infra_cloud_out/${{ matrix.pilot }}/
          if-no-files-found: error
