name: Real Data MAX - Push All Criteria (T1-T8)

# Generates a fully-covered real-like dataset with explicit episodes for T1-T8,
# then runs the canonical real-data suite and fails hard unless verdict is ACCEPT.
#
# This workflow only adds new files and does not modify existing workflows.

on:
  workflow_dispatch:
    inputs:
      n_rows:
        description: "Length of generated dataset (>= 100 recommended)"
        required: true
        default: "120"
      seed:
        description: "Deterministic seed"
        required: true
        default: "1337"

permissions:
  contents: read

concurrency:
  group: oric-real-data-max-${{ github.ref }}
  cancel-in-progress: false

jobs:
  max_push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate MAX dataset
        shell: bash
        run: |
          set -euo pipefail
          OUT="03_Data/real/_generated/custom_max.csv"
          mkdir -p "03_Data/real/_generated"
          python 04_Code/pipeline/generate_real_data_max_dataset.py             --out "${OUT}"             --n "${{ inputs.n_rows }}"             --seed "${{ inputs.seed }}"
          python - <<'PY'
          import pandas as pd
          df = pd.read_csv("03_Data/real/_generated/custom_max.csv")
          print("generated_rows", len(df))
          print("columns", list(df.columns))
          print(df.head(3).to_string(index=False))
          print(df.tail(3).to_string(index=False))
          PY

      - name: Run canonical real-data suite on MAX dataset
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="${GITHUB_RUN_ID}"
          ROOT="_ci_out/real_data_max_push/run_${RUN_ID}"
          mkdir -p "${ROOT}"

          python 04_Code/pipeline/run_real_data_canonical_suite.py             --input "03_Data/real/_generated/custom_max.csv"             --outdir "${ROOT}"             --col-time "t"             --time-mode index             --col-O "O"             --col-R "R"             --col-I "I"             --col-demand "demand"             --col-S "S"             --normalize none             --alpha 0.01             --lags "1-5"             --pre-horizon 20             --post-horizon 20             --c-mean-post-min 0.1             --k 2.5             --m 3             --baseline-n 20             2>&1 | tee "${ROOT}/suite.log"

          cat "${ROOT}/verdict.txt" || true

      - name: Hard gate on verdict
        shell: bash
        run: |
          set -euo pipefail
          ROOT="_ci_out/real_data_max_push/run_${GITHUB_RUN_ID}"
          VERDICT="$(cat "${ROOT}/verdict.txt" 2>/dev/null || echo "UNKNOWN")"
          echo "VERDICT=${VERDICT}"
          if [ "${VERDICT}" != "ACCEPT" ]; then
            echo "FAIL: expected ACCEPT. See ${ROOT}/tables/summary.csv and ${ROOT}/tables/global_summary.json"
            exit 1
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_max_push_${{ github.run_id }}
          path: _ci_out/real_data_max_push
          if-no-files-found: error
