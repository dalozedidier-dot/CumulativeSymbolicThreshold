name: Real data long (ORI-C) - Custom CSV

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: "Path to a real-data CSV inside the repo (recommended: 03_Data/real/_custom/<file>.csv)"
        required: true
        default: "03_Data/real/pilot_cpi/real.csv"

permissions:
  contents: read

jobs:
  long_custom:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ORI-C real data (long profile) then causals
        shell: bash
        env:
          CSV_PATH: ${{ inputs.csv_path }}
          OUTDIR: _ci_out/real_data_long/custom/run_${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          mkdir -p "${OUTDIR}"

          if [ ! -f "${CSV_PATH}" ]; then
            echo "Missing CSV: ${CSV_PATH}" | tee "${OUTDIR}/missing_input.txt"
            exit 2
          fi

          echo "dataset=custom" > "${OUTDIR}/dataset.txt"
          echo "csv_path=${CSV_PATH}" >> "${OUTDIR}/dataset.txt"
          echo "policy=locked_long_profile" > "${OUTDIR}/policy.txt"

          # Long-series profile (fixed ex ante)
          K="2.5"
          M="3"
          BASELINE_N="50"
          PRE_H="250"
          POST_H="250"
          ALPHA="0.01"
          LAGS="1-10"
          MAXLAG="10"
          BLOCK="25"
          N_BOOT="800"
          SEED="123"
          C_MEAN_POST_MIN="0.1"

          cat > "${OUTDIR}/params.txt" << EOF
          k=${K}
          m=${M}
          baseline_n=${BASELINE_N}
          pre_horizon=${PRE_H}
          post_horizon=${POST_H}
          alpha=${ALPHA}
          lags=${LAGS}
          maxlag=${MAXLAG}
          block=${BLOCK}
          n_boot=${N_BOOT}
          seed=${SEED}
          c_mean_post_min=${C_MEAN_POST_MIN}
          time_mode=index
          normalize=robust
          control_mode=no_symbolic
          EOF

          set +e
          
# Deterministic column mapping (no degrees of freedom)
# Rule:
# 1) If CSV contains O,R,I columns -> use them (time: date if present else year else index)
# 2) Else if CSV contains the canonical raw columns used in pilots -> map:
#    O <- industrial_production_i15
#    R <- berd_pc_gdp
#    I <- env_tax_env_mio_eur
#    time <- year (if present) else index
python - << 'PY' > "${OUTDIR}/colmap.txt"
import pandas as pd
df = pd.read_csv("${CSV_PATH}", nrows=5)
cols = set(df.columns)
def has(*names): return all(n in cols for n in names)
if has("O","R","I"):
    col_o, col_r, col_i = "O","R","I"
    col_s = "S" if "S" in cols else ""
    col_d = "demand" if "demand" in cols else ""
elif has("industrial_production_i15","berd_pc_gdp","env_tax_env_mio_eur"):
    col_o, col_r, col_i = "industrial_production_i15","berd_pc_gdp","env_tax_env_mio_eur"
    col_s, col_d = "", ""
else:
    raise SystemExit("Unsupported CSV schema. Need either O/R/I or the canonical raw columns.")
if "date" in cols:
    col_time="date"
elif "year" in cols:
    col_time="year"
else:
    col_time=""
print(f"col_time={col_time}")
print(f"col_O={col_o}")
print(f"col_R={col_r}")
print(f"col_I={col_i}")
print(f"col_S={col_s}")
print(f"col_demand={col_d}")
PY

COL_TIME="$(grep '^col_time=' "${OUTDIR}/colmap.txt" | cut -d= -f2-)"
COL_O="$(grep '^col_O=' "${OUTDIR}/colmap.txt" | cut -d= -f2-)"
COL_R="$(grep '^col_R=' "${OUTDIR}/colmap.txt" | cut -d= -f2-)"
COL_I="$(grep '^col_I=' "${OUTDIR}/colmap.txt" | cut -d= -f2-)"

COL_S="$(grep '^col_S=' "${OUTDIR}/colmap.txt" | cut -d= -f2-)"
COL_DEMAND="$(grep '^col_demand=' "${OUTDIR}/colmap.txt" | cut -d= -f2-)"

DEMO_ARGS=(--input "${CSV_PATH}" --outdir "${OUTDIR}" --time-mode index --normalize robust --control-mode no_symbolic --k "${K}" --m "${M}" --baseline-n "${BASELINE_N}")
if [ -n "${COL_TIME}" ]; then DEMO_ARGS+=(--col-time "${COL_TIME}"); fi
DEMO_ARGS+=(--col-O "${COL_O}" --col-R "${COL_R}" --col-I "${COL_I}")
if [ -n "${COL_DEMAND}" ]; then DEMO_ARGS+=(--col-demand "${COL_DEMAND}"); fi
if [ -n "${COL_S}" ]; then DEMO_ARGS+=(--col-S "${COL_S}"); fi

set +e
python 04_Code/pipeline/run_real_data_demo.py "${DEMO_ARGS[@]}" 2>&1 | tee "${OUTDIR}/run_real_data_demo.log"

          rc_demo=${PIPESTATUS[0]}
          echo "${rc_demo}" > "${OUTDIR}/rc_demo.txt"
          if [ "${rc_demo}" -ne 0 ]; then
            exit "${rc_demo}"
          fi

          python 04_Code/pipeline/tests_causaux.py                 --run-dir "${OUTDIR}"                 --alpha "${ALPHA}"                 --c-mean-post-min "${C_MEAN_POST_MIN}"                 --lags "${LAGS}"                 --maxlag "${MAXLAG}"                 --pre-horizon "${PRE_H}"                 --post-horizon "${POST_H}"                 --k "${K}" --m "${M}" --baseline-n "${BASELINE_N}"                 --block "${BLOCK}"                 --n-boot "${N_BOOT}"                 --seed "${SEED}"                 --pdf                 2>&1 | tee "${OUTDIR}/tests_causaux.log"
          rc_causal=${PIPESTATUS[0]}
          echo "${rc_causal}" > "${OUTDIR}/rc_causal.txt"
          exit "${rc_causal}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_long_custom_${{ github.run_id }}
          path: _ci_out/real_data_long/custom/run_${{ github.run_id }}
          if-no-files-found: warn
