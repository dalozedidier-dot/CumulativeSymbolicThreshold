name: Real Data Long (ORI-C) - Custom
on:
  workflow_dispatch:
    inputs:
      dataset_csv:
        description: "Chemin du CSV long (>=200 rows) a executer"
        required: true
        default: "03_Data/synthetic/synthetic_long_annual.csv"
      col_time:
        description: "Nom de la colonne temps"
        required: true
        default: "t"
      time_mode:
        description: "index ou value"
        required: true
        default: "index"
      col_O:
        description: "Nom de la colonne proxy O"
        required: true
        default: "O"
      col_R:
        description: "Nom de la colonne proxy R"
        required: true
        default: "R"
      col_I:
        description: "Nom de la colonne proxy I"
        required: true
        default: "I"
      col_demand:
        description: "Nom de la colonne demand"
        required: false
        default: "demand"
      col_S:
        description: "Nom de la colonne S (symbolic stock)"
        required: false
        default: "S"
      normalize:
        description: "none, minmax, robust"
        required: false
        default: "robust"
      control_mode:
        description: "same ou no_symbolic"
        required: false
        default: "no_symbolic"
      baseline_n:
        description: "Taille baseline pour detection seuil (recommande: 50 pour series longues)"
        required: false
        default: "50"
      pre_horizon:
        description: "Steps pre-seuil pour tests causaux"
        required: false
        default: "100"
      post_horizon:
        description: "Steps post-seuil pour tests causaux"
        required: false
        default: "100"
      lags:
        description: "Lags Granger/VAR (ex: 1-5 ou 1-10)"
        required: false
        default: "1-5"
      run_canonical_suite:
        description: "true = run_real_data_canonical_suite.py (T1-T8), false = demo seul"
        required: false
        default: "false"
permissions:
  contents: read
jobs:
  real_data_long_custom:
    runs-on: ubuntu-latest
    timeout-minutes: 60
'on':
  workflow_dispatch:
    inputs:
      dataset_csv:
        description: Path to CSV (repo-relative). Must include the proxy columns below.
        required: false
        default: 03_Data/real/_custom/custom.csv
      tag:
        description: Tag used in output folders and artifacts
        required: false
        default: custom
      time_col:
        description: Time column name (ignored when time_mode=index)
        required: false
        default: t
      time_mode:
        description: How to interpret time. Use "index" for irregular or non-date series.
        required: false
        default: index
        type: choice
        options:
          - index
          - col
      control_mode:
        description: Control segmentation mode
        required: false
        default: fixed
        type: choice
        options:
          - fixed
          - rolling
      baseline_n:
        description: Baseline window length (number of points)
        required: false
        default: "60"
      normalize:
        description: Normalization mode
        required: false
        default: mad
      auto_scale:
        description: Auto scale (0 or 1)
        required: false
        default: "1"
      cap_scale:
        description: Cap scale (0 or 1)
        required: false
        default: "1"
      col_O:
        description: Column name for O proxy
        required: false
        default: O
      col_R:
        description: Column name for R proxy
        required: false
        default: R
      col_I:
        description: Column name for I proxy
        required: false
        default: I
      col_S:
        description: Optional demand column name (empty to disable)
        required: false
        default: ""
      # tests_causaux parameters
      pre_horizon:
        description: Pre window (points)
        required: false
        default: "48"
      post_horizon:
        description: Post window (points)
        required: false
        default: "48"
      maxlag:
        description: Max lag for Granger
        required: false
        default: "6"
      lags:
        description: Lags list (comma-separated, empty uses 1..maxlag)
        required: false
        default: ""
      alpha:
        description: Alpha threshold
        required: false
        default: "0.05"
      c_mean_post_min:
        description: Minimum mean(C) post
        required: false
        default: "0.0"
      k:
        description: k parameter
        required: false
        default: "4"
      m:
        description: m parameter
        required: false
        default: "3"
      block:
        description: Block size for bootstrap
        required: false
        default: "12"
      n_boot:
        description: Bootstrap replications
        required: false
        default: "400"
      seed:
        description: RNG seed
        required: false
        default: "123"
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify dataset exists
        shell: bash
        run: |
          set -euo pipefail
          CSV="${{ inputs.dataset_csv }}"
          if [ ! -f "${CSV}" ]; then
            echo "ERREUR: dataset introuvable: ${CSV}" >&2
            exit 1
          fi
          N=$(python -c "import pandas as pd; df=pd.read_csv('${CSV}'); print(len(df))")
          echo "Dataset: ${CSV} (${N} rows)"
          if [ "${N}" -lt 50 ]; then
            echo "AVERTISSEMENT: serie trop courte (${N} < 50). Utiliser real_data_smoke_custom pour les series courtes." >&2
          fi

      - name: Run long series demo + causal tests
        shell: bash
        run: |
          set -uo pipefail

          RUN_ID="${GITHUB_RUN_ID}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}"
          ROOT="_ci_out/real_data_long/custom/run_${RUN_ID}_${RUN_ATTEMPT}"
          mkdir -p "${ROOT}"

          # Save inputs for audit
          cat > "${ROOT}/inputs.json" <<JSONEOF
          {
            "dataset_csv": "${{ inputs.dataset_csv }}",
            "col_time": "${{ inputs.col_time }}",
            "time_mode": "${{ inputs.time_mode }}",
            "col_O": "${{ inputs.col_O }}",
            "col_R": "${{ inputs.col_R }}",
            "col_I": "${{ inputs.col_I }}",
            "col_demand": "${{ inputs.col_demand }}",
            "col_S": "${{ inputs.col_S }}",
            "normalize": "${{ inputs.normalize }}",
            "control_mode": "${{ inputs.control_mode }}",
            "baseline_n": "${{ inputs.baseline_n }}",
            "pre_horizon": "${{ inputs.pre_horizon }}",
            "post_horizon": "${{ inputs.post_horizon }}",
            "lags": "${{ inputs.lags }}",
            "run_canonical_suite": "${{ inputs.run_canonical_suite }}"
          }
          JSONEOF

          RUN_DIR="${ROOT}/run"
          mkdir -p "${RUN_DIR}"

          # ── Demo + causal ──────────────────────────────────────────────
          if [ "${{ inputs.run_canonical_suite }}" != "true" ]; then
            python 04_Code/pipeline/run_real_data_demo.py \
              --input "${{ inputs.dataset_csv }}" \
              --outdir "${RUN_DIR}" \
              --col-time "${{ inputs.col_time }}" \
              --time-mode "${{ inputs.time_mode }}" \
              --col-O "${{ inputs.col_O }}" \
              --col-R "${{ inputs.col_R }}" \
              --col-I "${{ inputs.col_I }}" \
              --col-demand "${{ inputs.col_demand }}" \
              --col-S "${{ inputs.col_S }}" \
              --normalize "${{ inputs.normalize }}" \
              --control-mode "${{ inputs.control_mode }}" \
              --baseline-n "${{ inputs.baseline_n }}" \
              2>&1 | tee "${ROOT}/run_real_data_demo.log"
            echo ${PIPESTATUS[0]} > "${ROOT}/rc_demo.txt"

            python 04_Code/pipeline/tests_causaux.py \
              --run-dir "${RUN_DIR}" \
              --baseline-n "${{ inputs.baseline_n }}" \
              --pre-horizon "${{ inputs.pre_horizon }}" \
              --post-horizon "${{ inputs.post_horizon }}" \
              --lags "${{ inputs.lags }}" \
              2>&1 | tee "${ROOT}/tests_causaux.log"
            echo ${PIPESTATUS[0]} > "${ROOT}/rc_causal.txt"

          # ── Canonical T1–T8 suite ──────────────────────────────────────
          else
            python 04_Code/pipeline/run_real_data_canonical_suite.py \
              --input "${{ inputs.dataset_csv }}" \
              --outdir "${RUN_DIR}" \
              --col-time "${{ inputs.col_time }}" \
              --time-mode "${{ inputs.time_mode }}" \
              --col-O "${{ inputs.col_O }}" \
              --col-R "${{ inputs.col_R }}" \
              --col-I "${{ inputs.col_I }}" \
              --normalize "${{ inputs.normalize }}" \
              --alpha 0.01 \
              --lags "${{ inputs.lags }}" \
              --pre-horizon "${{ inputs.pre_horizon }}" \
              --post-horizon "${{ inputs.post_horizon }}" \
              --c-mean-post-min 0.1 \
              --k 2.5 \
              --m 3 \
              --baseline-n "${{ inputs.baseline_n }}" \
              2>&1 | tee "${ROOT}/suite.log"
            echo ${PIPESTATUS[0]} > "${ROOT}/rc.txt"

            VERDICT=$(cat "${RUN_DIR}/verdict.txt" 2>/dev/null || echo "UNKNOWN")
            echo "GLOBAL VERDICT: ${VERDICT}"
          fi

          # ── SHA256 manifest ────────────────────────────────────────────
          if [ -f "04_Code/pipeline/make_sha256_manifest.py" ]; then
            python 04_Code/pipeline/make_sha256_manifest.py \
              --root "${ROOT}" \
              --out "${ROOT}/manifest.json" \
              > "${ROOT}/manifest.log" 2>&1 || true
          fi

          echo "done" > "${ROOT}/status.txt"

      - name: Upload artifact
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ORI-C long (custom)
        shell: bash
        run: |
          set -Eeuo pipefail

          RUN_ID="${{ github.run_id }}"
          DATA="${{ inputs.dataset_csv }}"
          TAG="${{ inputs.tag }}"

          TIME_COL="${{ inputs.time_col }}"
          TIME_MODE="${{ inputs.time_mode }}"
          CONTROL_MODE="${{ inputs.control_mode }}"
          BASELINE_N="${{ inputs.baseline_n }}"
          NORMALIZE="${{ inputs.normalize }}"
          AUTO_SCALE="${{ inputs.auto_scale }}"
          CAP_SCALE="${{ inputs.cap_scale }}"

          COL_O="${{ inputs.col_O }}"
          COL_R="${{ inputs.col_R }}"
          COL_I="${{ inputs.col_I }}"
          COL_S="${{ inputs.col_S }}"

          PRE_H="${{ inputs.pre_horizon }}"
          POST_H="${{ inputs.post_horizon }}"
          MAXLAG="${{ inputs.maxlag }}"
          LAGS="${{ inputs.lags }}"
          ALPHA="${{ inputs.alpha }}"
          C_MEAN_POST_MIN="${{ inputs.c_mean_post_min }}"
          K="${{ inputs.k }}"
          M="${{ inputs.m }}"
          BLOCK="${{ inputs.block }}"
          N_BOOT="${{ inputs.n_boot }}"
          SEED="${{ inputs.seed }}"

          OUTDIR="_ci_out/real_data_long/${TAG}/run_${RUN_ID}"
          mkdir -p "${OUTDIR}"

          if [ ! -f "${DATA}" ]; then
            echo "ERROR: dataset not found: ${DATA}"
            exit 2
          fi

          # Validate requested columns exist and write an audit map
          python -c "import csv,sys; path=sys.argv[1]; col_o=sys.argv[2]; col_r=sys.argv[3]; col_i=sys.argv[4]; col_s=sys.argv[5]; out=sys.argv[6]; hdr=next(csv.reader(open(path, newline=''))); cols=set(hdr); req=[('O',col_o),('R',col_r),('I',col_i)]; if col_s.strip(): req.append(('S',col_s)); missing=[(k,v) for k,v in req if v not in cols]; import pathlib; p=pathlib.Path(out); p.write_text('\n'.join([f"{k}={v}" for k,v in req])+'\n'); assert not missing, 'Missing columns: '+', '.join([f"{k}:{v}" for k,v in missing])"             "${DATA}" "${COL_O}" "${COL_R}" "${COL_I}" "${COL_S}" "${OUTDIR}/colmap.txt"

          {
            echo "run_id=${RUN_ID}"
            echo "dataset_csv=${DATA}"
            echo "tag=${TAG}"
            echo "time_mode=${TIME_MODE}"
            echo "time_col=${TIME_COL}"
            echo "control_mode=${CONTROL_MODE}"
            echo "baseline_n=${BASELINE_N}"
            echo "normalize=${NORMALIZE}"
            echo "auto_scale=${AUTO_SCALE}"
            echo "cap_scale=${CAP_SCALE}"
            echo "col_O=${COL_O}"
            echo "col_R=${COL_R}"
            echo "col_I=${COL_I}"
            echo "col_S=${COL_S}"
            echo "pre_horizon=${PRE_H}"
            echo "post_horizon=${POST_H}"
            echo "maxlag=${MAXLAG}"
            echo "lags=${LAGS}"
            echo "alpha=${ALPHA}"
            echo "c_mean_post_min=${C_MEAN_POST_MIN}"
            echo "k=${K}"
            echo "m=${M}"
            echo "block=${BLOCK}"
            echo "n_boot=${N_BOOT}"
            echo "seed=${SEED}"
          } > "${OUTDIR}/params.txt"

          # Main ORI-C real data run
          CMD=(python 04_Code/pipeline/run_real_data_demo.py
            --input "${DATA}"
            --tag "${TAG}"
            --outdir "${OUTDIR}"
            --baseline-n "${BASELINE_N}"
            --time-mode "${TIME_MODE}"
            --control-mode "${CONTROL_MODE}"
            --normalize "${NORMALIZE}"
            --auto-scale "${AUTO_SCALE}"
            --cap-scale "${CAP_SCALE}"
            --col-O "${COL_O}"
            --col-R "${COL_R}"
            --col-I "${COL_I}"
          )

          if [ "${TIME_MODE}" = "col" ]; then
            CMD+=(--time-col "${TIME_COL}")
          fi

          if [ -n "${COL_S}" ]; then
            CMD+=(--col-S "${COL_S}")
          fi

          echo "RUN: ${CMD[*]}"
          "${CMD[@]}" 2>&1 | tee "${OUTDIR}/run_real_data_demo.log"

          # Post-diagnostic causal tests (optional, does not affect 8T)
          python 04_Code/pipeline/tests_causaux.py             --run-dir "${OUTDIR}"             --alpha "${ALPHA}"             --c-mean-post-min "${C_MEAN_POST_MIN}"             --lags "${LAGS}"             --maxlag "${MAXLAG}"             --pre-horizon "${PRE_H}"             --post-horizon "${POST_H}"             --k "${K}" --m "${M}" --baseline-n "${BASELINE_N}"             --block "${BLOCK}"             --n-boot "${N_BOOT}"             --seed "${SEED}"             --pdf             2>&1 | tee "${OUTDIR}/tests_causaux.log"

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real_data_long_custom_${{ github.run_id }}
          path: _ci_out/real_data_long/custom
          if-no-files-found: warn
          path: _ci_out/real_data_long/
