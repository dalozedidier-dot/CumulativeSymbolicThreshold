name: Collect and append metrics

on:
  workflow_run:
    workflows:
      - "QCC Brisbane StateProb — Generate + Cross-conditions + Stability"
      - "QCC StateProb Densify + Stability"
      - "Real Data Matrix (ORI-C)"
      - "Real Data Canonical T1–T8 (ORI-C)"
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  actions: read
  contents: write

jobs:
  collect:
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download artifacts from triggering run (workflow_run)
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          mkdir -p _collected_artifacts
          echo "Downloading artifacts from triggering run: ${{ github.event.workflow_run.id }}"
          gh run download "${{ github.event.workflow_run.id }}" --dir _collected_artifacts/run_${{ github.event.workflow_run.id }}

      - name: Download artifacts from latest successful canonical runs (schedule/manual)
        if: github.event_name != 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _collected_artifacts
          echo "Fetching latest successful runs for canonical workflows (fuzzy patterns)..."
          python -m tools.collector_download_artifacts \
            --out _collected_artifacts \
            --workflows \
              "QCC Brisbane StateProb" \
              "QCC StateProb Densify" \
              "Real Data Matrix" \
              "Real Data Canonical"

      - name: Collect and append metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python -m tools.collect_ci_metrics \
            --in-dir _collected_artifacts \
            --out-dir ci_metrics \
            --append

      - name: Commit metrics (append-only)
        run: |
          set -euo pipefail
          git config user.name "ori-c-bot"
          git config user.email "actions@users.noreply.github.com"
          git add ci_metrics/history.csv ci_metrics/runs_index.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "ci_metrics: append collected runs"
          git push
