name: Collector — Append-only CI Metrics History

# ─────────────────────────────────────────────────────────────────────────────
# Collects run results from CI artifacts and appends to:
#   ci_metrics/history.csv       (append-only run log)
#   ci_metrics/runs_index.csv    (run_id, dataset_id, sector, commit_sha, etc.)
#
# Two modes:
#   - workflow_run : downloads artifacts from the TRIGGERING run (run-id required)
#   - schedule / workflow_dispatch : scans recent successful canonical runs via gh API
#
# Deduplication key: github_actions_run_id (stable, unique per GH Actions run)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows:
      - "QCC Canonical Full — Run + Stability + Checks + Manifest"
      - "Real Data Canonical (Nightly/Weekly)"
    types: [completed]
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC — catch any missed runs
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days of history to scan (schedule/dispatch only)"
        required: false
        default: "3"

permissions:
  contents: write   # needed to commit ci_metrics/ back to main
  actions: read     # needed to read artifacts from other workflow runs

jobs:
  collect:
    name: "Collect and append metrics"
    runs-on: ubuntu-latest
    # For workflow_run: only run if the triggering workflow succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Mode A: download from the TRIGGERING workflow_run ──────────────────
      - name: "[workflow_run] Download artifacts from triggering run"
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: _collected_artifacts/run_${{ github.event.workflow_run.id }}/

      # ── Mode A: write run_meta.json for source workflow tracking ───────────
      - name: "[workflow_run] Write run_meta.json for source run"
        if: github.event_name == 'workflow_run'
        run: |
          mkdir -p _collected_artifacts/run_${{ github.event.workflow_run.id }}
          printf '{"workflowName":"%s","runId":"%s","headSha":"%s","createdAt":"%s"}\n' \
            "${{ github.event.workflow_run.name }}" \
            "${{ github.event.workflow_run.id }}" \
            "${{ github.event.workflow_run.head_sha }}" \
            "${{ github.event.workflow_run.created_at }}" \
            > _collected_artifacts/run_${{ github.event.workflow_run.id }}/run_meta.json

      # ── Mode B: scan recent canonical runs via gh API ──────────────────────
      - name: "[schedule/dispatch] Download artifacts from recent canonical runs"
        if: github.event_name != 'workflow_run'
        run: |
          set -euo pipefail
          mkdir -p _collected_artifacts

          LOOKBACK="${{ inputs.lookback_days || '3' }}"
          SINCE=$(date -u -d "${LOOKBACK} days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                  || date -u -v-${LOOKBACK}d +%Y-%m-%dT%H:%M:%SZ)

          echo "Scanning canonical workflows since $SINCE"

          for workflow_file in qcc_canonical_full.yml real_canonical_schedule.yml; do
            echo "── Workflow: $workflow_file"

            # List recent successful runs — try REST API first, fall back to gh run list
            run_ids=$(gh api \
              "repos/${REPO}/actions/workflows/${workflow_file}/runs?status=success&per_page=20&created=>=${SINCE}" \
              --jq '.workflow_runs[].id' 2>/dev/null || true)

            if [ -z "$run_ids" ]; then
              echo "  REST API returned empty for ${workflow_file} — trying gh run list fallback"
              # Resolve numeric workflow id from filename, then list runs
              wf_id=$(gh api "repos/${REPO}/actions/workflows/${workflow_file}" \
                --jq '.id' 2>/dev/null || true)
              if [ -n "$wf_id" ]; then
                run_ids=$(gh run list \
                  --repo "$REPO" \
                  --workflow "$wf_id" \
                  --status success \
                  --limit 20 \
                  --json databaseId \
                  --jq '.[].databaseId' 2>/dev/null || true)
              fi
            fi

            if [ -z "$run_ids" ]; then
              echo "  No successful runs found for ${workflow_file} (REST + gh run list both empty)"
              continue
            fi

            for run_id in $run_ids; do
              out_dir="_collected_artifacts/run_${run_id}"
              if [ -d "$out_dir" ]; then
                echo "  SKIP (already downloaded): run $run_id"
                continue
              fi
              echo "  Downloading run $run_id → $out_dir"
              mkdir -p "$out_dir"
              if gh run download "$run_id" \
                --repo "$REPO" \
                --dir "$out_dir/" \
                2>/dev/null; then
                echo "  OK: run $run_id"
              else
                echo "  WARNING: no downloadable artifacts for run $run_id"
              fi
              # Capture source workflow metadata for accurate reporting
              run_json=$(gh run view "$run_id" \
                --json workflowName,headSha,createdAt 2>/dev/null || echo '{}')
              wf_name=$(echo "$run_json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('workflowName',''))")
              # Fallback: if gh run view returned empty or 'unknown', use the known workflow filename
              if [ -z "$wf_name" ] || [ "$wf_name" = "unknown" ]; then
                wf_name="$workflow_file"
              fi
              head_sha=$(echo "$run_json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('headSha','unknown'))")
              created_at=$(echo "$run_json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('createdAt',''))")
              printf '{"workflowName":"%s","runId":"%s","headSha":"%s","createdAt":"%s"}\n' \
                "$wf_name" "$run_id" "$head_sha" "$created_at" \
                > "${out_dir}/run_meta.json"
            done
          done

          echo ""
          echo "Downloaded directories:"
          find _collected_artifacts -maxdepth 2 -type d | sort || true

      # ── Verify something was downloaded ────────────────────────────────────
      - name: Check downloaded artifacts
        run: |
          set -euo pipefail
          if [ ! -d _collected_artifacts ] || [ -z "$(ls -A _collected_artifacts)" ]; then
            echo "WARNING: no artifacts were downloaded — nothing to collect"
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "Artifact tree:"
            find _collected_artifacts -name "summary.json" -o -name "manifest.json" | \
              sort | head -30 || true
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      # ── Extract metrics from artifacts ─────────────────────────────────────
      - name: Extract metrics and append to CSV files
        if: env.SKIP != 'true'
        env:
          GITHUB_TRIGGERING_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          GITHUB_TRIGGERING_RUN_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          GITHUB_TRIGGERING_WORKFLOW: ${{ github.event.workflow_run.name || github.workflow }}
        run: |
          python - <<'PYEOF'
          import csv
          import hashlib
          import json
          import os
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          METRICS_DIR = Path("ci_metrics")
          METRICS_DIR.mkdir(exist_ok=True)

          HISTORY_PATH = METRICS_DIR / "history.csv"
          RUNS_INDEX_PATH = METRICS_DIR / "runs_index.csv"

          HISTORY_FIELDS = [
              "timestamp", "github_run_id", "run_dir_name",
              "dataset_id", "sector", "commit_sha",
              "evidence_strength", "all_pass", "stability_criteria_sha256",
              "run_mode", "workflow",
          ]
          RUNS_INDEX_FIELDS = [
              "github_run_id", "run_dir_name", "dataset_id", "sector", "commit_sha",
              "evidence_strength", "all_pass", "run_mode",
              "manifest_sha256", "stability_criteria_sha256", "timestamp",
          ]

          # ── Helpers ──────────────────────────────────────────────────────

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def load_existing_keys() -> set:
              """Return set of (github_run_id, run_dir_name) already recorded."""
              keys = set()
              for path in (HISTORY_PATH, RUNS_INDEX_PATH):
                  if not path.exists():
                      continue
                  with open(path) as f:
                      reader = csv.DictReader(f)
                      for row in reader:
                          gid = row.get("github_run_id", "")
                          rdn = row.get("run_dir_name", "")
                          if gid or rdn:
                              keys.add((gid, rdn))
              return keys

          def find_run_dirs(artifact_dir: Path) -> list:
              """Find all run directories inside downloaded artifacts.

              Searches for directories that contain both:
                manifest.json AND tables/summary.json
              """
              results = []
              for manifest in artifact_dir.rglob("manifest.json"):
                  run_dir = manifest.parent
                  if (run_dir / "tables" / "summary.json").exists():
                      results.append(run_dir)
              return sorted(results)

          def extract_github_run_id(run_dir: Path, collected_root: Path) -> str:
              """Extract github run_id from the directory structure.

              Artifact dirs are structured as:
                _collected_artifacts/run_<GITHUB_RUN_ID>/<artifact_name>/...
              """
              try:
                  rel = run_dir.relative_to(collected_root)
                  parts = rel.parts
                  if parts and parts[0].startswith("run_"):
                      return parts[0][len("run_"):]
              except ValueError:
                  pass
              return os.environ.get("GITHUB_TRIGGERING_RUN_ID", "unknown")

          def read_run_meta(run_dir: Path, collected_root: Path) -> dict:
              """Read run_meta.json from the top-level run_<id> directory."""
              try:
                  rel = run_dir.relative_to(collected_root)
                  run_root = collected_root / rel.parts[0]
                  meta_path = run_root / "run_meta.json"
                  if meta_path.exists():
                      return json.loads(meta_path.read_text(encoding="utf-8"))
              except Exception:
                  pass
              return {}

          # ── Workflow name → sector / run_mode fallback maps ──────────────────
          # Ordered: more specific patterns first
          _WORKFLOW_SECTOR_MAP = [
              ("qcc",         "qcc"),
              ("real data",   "real_data"),
              ("real_data",   "real_data"),
              ("bio",         "bio"),
              ("cosmo",       "cosmo"),
              ("infra_cloud", "infra_cloud"),
              ("infra",       "infra"),
              ("finance",     "finance"),
              ("climate",     "climate"),
              ("ai",          "ai_tech"),
              ("psych",       "psych"),
              ("social",      "social"),
              ("stress",      "stress"),
          ]
          _WORKFLOW_MODE_MAP = [
              ("scan only",  "scan_only"),
              ("scan_only",  "scan_only"),
              ("full",       "full"),
              ("nightly",    "full"),
              ("weekly",     "full"),
              ("smoke",      "smoke_ci"),
          ]

          def _infer_sector(wf_name: str) -> str:
              n = wf_name.lower()
              for kw, val in _WORKFLOW_SECTOR_MAP:
                  if kw in n:
                      return val
              return "unknown"

          def _infer_run_mode(wf_name: str) -> str:
              n = wf_name.lower()
              for kw, val in _WORKFLOW_MODE_MAP:
                  if kw in n:
                      return val
              return ""

          def extract_metrics(run_dir: Path, wf_name: str = "") -> dict:
              """Extract key metrics from a run directory.

              wf_name: source workflow name (from run_meta.json), used as
              deterministic fallback when summary.json omits sector/run_mode.
              """
              summary_path = run_dir / "tables" / "summary.json"
              summary = json.loads(summary_path.read_text(encoding="utf-8"))

              # Normalize field names across different workflow formats
              dataset_id = (
                  summary.get("dataset_id")
                  or summary.get("label")
                  or run_dir.parent.parent.name   # fallback: artifact dir name
              )
              sector = (
                  summary.get("sector")
                  or summary.get("domain")
                  or (summary.get("meta") or {}).get("sector")
                  or (summary.get("dataset") or {}).get("sector")
                  or (wf_name and _infer_sector(wf_name))
                  or "unknown"
              )
              evidence_strength = (
                  summary.get("evidence_strength")
                  or summary.get("power_level")
                  or summary.get("power_diagnostic", {}).get("evidence_strength", "")
              )
              # run_mode = CI pipeline mode (full | scan_only | smoke_ci)
              # pooling_mode is a statistical concept — NOT the same thing; excluded here
              run_mode = (
                  summary.get("run_mode")
                  or summary.get("mode")
                  or (summary.get("meta") or {}).get("run_mode")
                  or (summary.get("meta") or {}).get("mode")
                  or (wf_name and _infer_run_mode(wf_name))
                  or ""
              )

              # Stability
              all_pass = None
              stab_sha = ""
              stab_path = run_dir / "stability" / "stability_summary.json"
              if stab_path.exists():
                  try:
                      stab = json.loads(stab_path.read_text(encoding="utf-8"))
                      all_pass = stab.get("stability_check", {}).get("all_pass")
                  except Exception:
                      pass

              criteria_path = run_dir / "contracts" / "STABILITY_CRITERIA.json"
              if criteria_path.exists():
                  stab_sha = sha256_file(criteria_path)

              manifest_path = run_dir / "manifest.json"
              manifest_sha = sha256_file(manifest_path) if manifest_path.exists() else ""

              return {
                  "run_dir_name": run_dir.name,
                  "dataset_id": str(dataset_id),
                  "sector": str(sector),
                  "evidence_strength": str(evidence_strength),
                  "all_pass": str(all_pass) if all_pass is not None else "",
                  "run_mode": str(run_mode),
                  "manifest_sha256": manifest_sha,
                  "stability_criteria_sha256": stab_sha,
              }

          # ── Main ─────────────────────────────────────────────────────────

          commit_sha = os.environ.get("GITHUB_TRIGGERING_RUN_SHA") or os.environ.get("GITHUB_SHA", "unknown")
          workflow_name = os.environ.get("GITHUB_TRIGGERING_WORKFLOW") or os.environ.get("GITHUB_WORKFLOW", "collector")
          now = datetime.now(timezone.utc).isoformat()

          collected_root = Path("_collected_artifacts")
          existing_keys = load_existing_keys()

          print(f"Already recorded: {len(existing_keys)} entries")

          all_run_dirs = find_run_dirs(collected_root)
          print(f"Run dirs found in artifacts: {len(all_run_dirs)}")

          if not all_run_dirs:
              print("ERROR: no run directories with manifest + summary found")
              print("Searched under:", collected_root)
              for p in sorted(collected_root.rglob("*"))[:20]:
                  print(" ", p)
              sys.exit(1)

          new_history = []
          new_index = []

          for run_dir in all_run_dirs:
              github_run_id = extract_github_run_id(run_dir, collected_root)
              run_meta = read_run_meta(run_dir, collected_root)
              # Discard "unknown" placeholder — fall back to the env-based workflow name
              _meta_wf = (run_meta.get("workflowName") or "").strip()
              per_run_workflow = (_meta_wf if _meta_wf and _meta_wf.lower() != "unknown" else None) or workflow_name
              per_run_sha = run_meta.get("headSha") or commit_sha
              try:
                  metrics = extract_metrics(run_dir, wf_name=per_run_workflow)
              except Exception as e:
                  print(f"WARNING: failed to extract metrics from {run_dir}: {e}")
                  continue

              key = (github_run_id, metrics["run_dir_name"])
              if key in existing_keys:
                  print(f"SKIP (already collected): {key}")
                  continue

              history_row = {
                  "timestamp": now,
                  "github_run_id": github_run_id,
                  "commit_sha": per_run_sha,
                  "workflow": per_run_workflow,
                  **metrics,
              }
              index_row = {
                  "github_run_id": github_run_id,
                  "commit_sha": per_run_sha,
                  "timestamp": now,
                  **metrics,
              }
              new_history.append(history_row)
              new_index.append(index_row)

              print(f"COLLECTED: {github_run_id}/{metrics['run_dir_name']} "
                    f"({metrics['sector']}/{metrics['dataset_id']}) "
                    f"strength={metrics['evidence_strength']} "
                    f"all_pass={metrics['all_pass']}")

          # Append (or create with header)
          def append_csv(path: Path, rows: list, fields: list) -> None:
              write_header = not path.exists() or path.stat().st_size == 0
              with open(path, "a", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields, extrasaction="ignore")
                  if write_header:
                      writer.writeheader()
                  writer.writerows(rows)

          append_csv(HISTORY_PATH, new_history, HISTORY_FIELDS)
          append_csv(RUNS_INDEX_PATH, new_index, RUNS_INDEX_FIELDS)

          print(f"\nNew entries appended: {len(new_history)}")
          print(f"Total recorded:       {len(existing_keys) + len(new_history)}")

          if len(new_history) == 0 and len(all_run_dirs) > 0:
              print("All found run_dirs were already collected — nothing new to commit")
          PYEOF

      # ── Commit metrics back to main ────────────────────────────────────────
      - name: Commit metrics to main (if changed)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ci_metrics/history.csv ci_metrics/runs_index.csv

          if git diff --cached --quiet; then
            echo "No new metrics — nothing to commit"
          else
            LINES_ADDED=$(git diff --cached --stat | grep -oP '\d+(?= insertion)' || echo "?")
            git commit -m "ci(collector): append ${LINES_ADDED} metric row(s) [$(date -u +%Y-%m-%d)]"
            git push origin main
          fi

      # ── Upload snapshot ────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci_metrics_snapshot_${{ github.run_id }}
          path: ci_metrics/
          retention-days: 90
