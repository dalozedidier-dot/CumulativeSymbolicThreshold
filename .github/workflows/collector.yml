name: Collector — Append-only CI Metrics History

# ─────────────────────────────────────────────────────────────────────────────
# Collects run results from CI artifacts and appends to:
#   ci_metrics/history.csv       (append-only run log)
#   ci_metrics/runs_index.csv    (run_id, dataset_id, sector, commit_sha, etc.)
#
# Triggered after canonical workflows complete.
# Also runs on schedule to catch any missed runs.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows:
      - "QCC Canonical Full — Run + Stability + Checks + Manifest"
      - "Real Data Canonical (Nightly/Weekly)"
    types: [completed]
  schedule:
    - cron: "0 6 * * *"  # Daily 06:00 UTC
  workflow_dispatch:

jobs:
  collect:
    name: "Collect and append metrics"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download latest artifacts
        uses: actions/download-artifact@v4
        with:
          path: _collected_artifacts/
        continue-on-error: true

      - name: Collect metrics from artifacts
        run: |
          python - <<'PYEOF'
          import csv
          import hashlib
          import json
          import os
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          METRICS_DIR = Path("ci_metrics")
          METRICS_DIR.mkdir(exist_ok=True)

          HISTORY_PATH = METRICS_DIR / "history.csv"
          RUNS_INDEX_PATH = METRICS_DIR / "runs_index.csv"

          HISTORY_FIELDS = [
              "timestamp", "run_id", "dataset_id", "sector", "commit_sha",
              "evidence_strength", "all_pass", "stability_criteria_sha256",
              "run_mode", "workflow",
          ]

          RUNS_INDEX_FIELDS = [
              "run_id", "dataset_id", "sector", "commit_sha",
              "evidence_strength", "all_pass", "run_mode",
              "manifest_sha256", "stability_criteria_sha256",
              "timestamp",
          ]

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def load_existing_run_ids() -> set:
              if not RUNS_INDEX_PATH.exists():
                  return set()
              ids = set()
              with open(RUNS_INDEX_PATH) as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      ids.add(row.get("run_id", ""))
              return ids

          def find_run_dirs(root: Path) -> list:
              """Find all run directories (contain manifest.json)."""
              results = []
              for manifest in root.rglob("manifest.json"):
                  run_dir = manifest.parent
                  if (run_dir / "tables" / "summary.json").exists():
                      results.append(run_dir)
              return sorted(results)

          def extract_metrics(run_dir: Path) -> dict:
              """Extract key metrics from a run directory."""
              summary_path = run_dir / "tables" / "summary.json"
              summary = json.loads(summary_path.read_text(encoding="utf-8"))

              # Extract fields
              dataset_id = summary.get("dataset_id", run_dir.name)
              sector = summary.get("sector", "unknown")
              evidence_strength = summary.get("evidence_strength", "")
              run_mode = summary.get("run_mode", "")

              # Stability
              all_pass = None
              stab_sha = ""
              stab_path = run_dir / "stability" / "stability_summary.json"
              if stab_path.exists():
                  stab = json.loads(stab_path.read_text(encoding="utf-8"))
                  all_pass = stab.get("stability_check", {}).get("all_pass")

              criteria_path = run_dir / "contracts" / "STABILITY_CRITERIA.json"
              if criteria_path.exists():
                  stab_sha = sha256_file(criteria_path)

              # Manifest hash
              manifest_path = run_dir / "manifest.json"
              manifest_sha = sha256_file(manifest_path) if manifest_path.exists() else ""

              return {
                  "run_id": run_dir.name,
                  "dataset_id": str(dataset_id),
                  "sector": str(sector),
                  "evidence_strength": str(evidence_strength),
                  "all_pass": str(all_pass) if all_pass is not None else "",
                  "run_mode": str(run_mode),
                  "manifest_sha256": manifest_sha,
                  "stability_criteria_sha256": stab_sha,
              }

          # ── Main collection ──────────────────────────────────────────────

          commit_sha = os.environ.get("GITHUB_SHA", "unknown")
          workflow_name = os.environ.get("GITHUB_WORKFLOW", "collector")
          now = datetime.now(timezone.utc).isoformat()

          collected_root = Path("_collected_artifacts")
          if not collected_root.exists():
              print("No artifacts to collect")
              sys.exit(0)

          existing_ids = load_existing_run_ids()
          run_dirs = find_run_dirs(collected_root)

          if not run_dirs:
              print("No run directories found in artifacts")
              sys.exit(0)

          new_history = []
          new_index = []

          for run_dir in run_dirs:
              try:
                  metrics = extract_metrics(run_dir)
              except Exception as e:
                  print(f"WARNING: failed to extract metrics from {run_dir}: {e}")
                  continue

              if metrics["run_id"] in existing_ids:
                  print(f"SKIP (already collected): {metrics['run_id']}")
                  continue

              history_row = {
                  "timestamp": now,
                  "commit_sha": commit_sha,
                  "workflow": workflow_name,
                  **metrics,
              }
              new_history.append(history_row)

              index_row = {
                  "timestamp": now,
                  "commit_sha": commit_sha,
                  **metrics,
              }
              new_index.append(index_row)

              print(f"COLLECTED: {metrics['run_id']} ({metrics['sector']}/{metrics['dataset_id']})")

          # Append to history.csv
          history_exists = HISTORY_PATH.exists()
          with open(HISTORY_PATH, "a", newline="") as f:
              writer = csv.DictWriter(f, fieldnames=HISTORY_FIELDS, extrasaction="ignore")
              if not history_exists:
                  writer.writeheader()
              writer.writerows(new_history)

          # Append to runs_index.csv
          index_exists = RUNS_INDEX_PATH.exists()
          with open(RUNS_INDEX_PATH, "a", newline="") as f:
              writer = csv.DictWriter(f, fieldnames=RUNS_INDEX_FIELDS, extrasaction="ignore")
              if not index_exists:
                  writer.writeheader()
              writer.writerows(new_index)

          print(f"\nCollected {len(new_history)} new runs")
          print(f"Total in history: {len(existing_ids) + len(new_history)}")
          PYEOF

      - name: Commit metrics (if changed)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci_metrics/history.csv ci_metrics/runs_index.csv
          if git diff --cached --quiet; then
            echo "No new metrics to commit"
          else
            git commit -m "ci: append metrics from $(date -u +%Y-%m-%d) [collector]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ci_metrics_snapshot
          path: ci_metrics/
          retention-days: 90
