# .github/workflows/qcc_polaron_real_smoke.yml
name: QCC Polaron Real Smoke

on:
  workflow_dispatch:
    inputs:
      c_min:
        description: "Seuil C_min pour l'événement t* (float)"
        required: true
        default: "0.35"
  pull_request:
    paths:
      - ".github/workflows/qcc_polaron_real_smoke.yml"
      - "tools/qcc_real_data_from_runs_index.py"
      - "tools/qcc_checks.py"
      - "tools/make_manifest.py"
      - "data/qcc/real_polaron/**"
      - "requirements-qcc.txt"

jobs:
  run-polaron-real:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -V
          pip -V
          pip install -r requirements-qcc.txt

      - name: Run QCC from runs index
        run: |
          python tools/qcc_real_data_from_runs_index.py \
            --runs-index data/qcc/real_polaron/qcc_runs_index.csv \
            --mapping data/qcc/real_polaron/mapping.json \
            --data-root data/qcc/real_polaron \
            --c-min "${{ inputs.c_min }}" \
            --out-root "05_Results/qcc_polaron_real_smoke"

      - name: Checks (non interpretatif)
        run: |
          python tools/qcc_checks.py --out-root "05_Results/qcc_polaron_real_smoke"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qcc_polaron_real_smoke_artifact
          path: 05_Results/qcc_polaron_real_smoke
          if-no-files-found: error
