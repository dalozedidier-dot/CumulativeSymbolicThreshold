# setup.cfg — Minimal configuration.
#
# Source of authority: pyproject.toml
# Lint/format: Ruff (configured in pyproject.toml)
# Type checking: mypy (configured in pyproject.toml)
# Testing: pytest (configured in pyproject.toml)
#
# This file is kept for tools that do not yet read pyproject.toml
# (e.g. older flake8 versions). For canonical config, see pyproject.toml.

[flake8]
max-line-length = 100
extend-ignore =
    W503,
    E731,
per-file-ignores =
    src/oric/__init__.py:F401,F403
    04_Code/tests/test_did_sc.py:E402,E501,E131
    04_Code/tests/test_oos_panel.py:E402,E741
    04_Code/tests/test_e2e_pipeline.py:E501
exclude =
    .git,
    __pycache__,
    .tox,
    .eggs,
    *.egg,
    build,
    dist,
    _ci_out,
    _demo_*,
    _tmp_results_*,
    05_Results,
