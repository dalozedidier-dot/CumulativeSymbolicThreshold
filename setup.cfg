[flake8]
max-line-length = 100
extend-ignore =
    # line break before binary operator (Black-compatible)
    W503,
    # allow complex expressions in comprehensions
    E731,
per-file-ignores =
    # allow star imports and unused imports in __init__.py
    src/oric/__init__.py: F401,F403
exclude =
    .git,
    __pycache__,
    .tox,
    .eggs,
    *.egg,
    build,
    dist,
    _ci_out,
    _demo_*,
    _tmp_results_*,
    05_Results,

[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
files = src/oric

[tool:pytest]
testpaths =
    src/oric/tests
    04_Code/tests
addopts = --tb=short -q
