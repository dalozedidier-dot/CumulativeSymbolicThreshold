<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation Holographique Physique Quantique</title>
  <style>
    body { margin: 0; background: black; color: white; font-family: Arial; text-align: center; }
    #container { display: flex; flex-wrap: wrap; justify-content: center; }
    canvas { border: 1px solid white; margin: 5px; }
    button { margin: 10px; padding: 10px; background: #333; color: white; border: 1px solid white; cursor: pointer; }
  </style>
  <script src="https://threejs.org/build/three.js"></script>
  <script src="https://threejs.org/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <h1>Simulation Holographique de Physique Quantique</h1>
  <p>Superposition qubit avec décohérence. Clique "Mode Pyramide" pour 4 vues hologramme DIY.</p>
  <button onclick="togglePyramidMode()">Mode Pyramide (4 vues)</button>
  <div id="container"></div>

  <script>
    let pyramidMode = false;
    const containers = [];
    let scenes = [], cameras = [], renderers = [], controls = [], meshes = [];

    function initScene(index = 0) {
      const container = document.createElement('div');
      container.style.width = '400px';
      container.style.height = '400px';
      document.getElementById('container').appendChild(container);
      containers.push(container);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      scenes.push(scene);

      const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
      camera.position.z = 5;
      cameras.push(camera);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(400, 400);
      container.appendChild(renderer.domElement);
      renderers.push(renderer);

      const geometry = new THREE.SphereGeometry(1, 32, 32);  // Sphère de Bloch simplifiée
      const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
      meshes.push(mesh);

      const control = new THREE.OrbitControls(camera, renderer.domElement);
      controls.push(control);

      animate(index);
    }

    function animate(index) {
      requestAnimationFrame(() => animate(index));
      // Simulation décohérence : rotation + amortissement
      meshes[index].rotation.x += 0.01;
      meshes[index].rotation.y += 0.01;
      meshes[index].scale.multiplyScalar(0.999);  // Décohérence : rétrécissement
      controls[index].update();
      renderers[index].render(scenes[index], cameras[index]);
    }

    function togglePyramidMode() {
      pyramidMode = !pyramidMode;
      if (pyramidMode) {
        document.getElementById('container').innerHTML = '';
        containers.length = 0; scenes.length = 0; cameras.length = 0; renderers.length = 0; controls.length = 0; meshes.length = 0;
        for (let i = 0; i = 4; i++) {
          initScene(i);
          // Ajuster vues pour pyramide (azimuts 0°, 90°, 180°, 270°)
          cameras[i].position.set(5 * Math.cos(i * Math.PI / 2), 1, 5 * Math.sin(i * Math.PI / 2));
          cameras[i].lookAt(0, 0, 0);
        }
      } else {
        document.getElementById('container').innerHTML = '';
        initScene();
      }
    }

    // Initialisation par défaut (1 vue)
    initScene();
  </script>
</body>
</html>
