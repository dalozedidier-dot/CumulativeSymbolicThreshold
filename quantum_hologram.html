<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hologramme Quantique - Qubit + Décohérence</title>
  <style>
    body { margin: 0; background: #000; color: #0f0; font-family: Arial, sans-serif; text-align: center; }
    h1 { margin: 20px; color: #0f0; }
    p { max-width: 800px; margin: 20px auto; line-height: 1.5; }
    #container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
    canvas { border: 1px solid #0f0; background: #111; }
    button { margin: 15px; padding: 12px 24px; background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; font-size: 16px; }
    button:hover { background: #0f0; color: #000; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.167.1/examples/js/controls/OrbitControls.min.js"></script>
</head>
<body>
  <h1>Hologramme Quantique : Qubit + Décohérence</h1>
  <p>État initial |+⟩ (superposition maximale) → rotation cohérente → décohérence → état classique |0⟩.<br>
  Mode Pyramide : fabriquez une pyramide (base 6 cm, sommet 1 cm, hauteur 3,5 cm) et posez-la sur l’écran pour effet 3D flottant.</p>
  
  <button onclick="togglePyramidMode()">Activer Mode Pyramide (4 vues)</button>
  
  <div id="container"></div>

  <script>
    let pyramidMode = false;
    const scenes = [], cameras = [], renderers = [], controls = [], statePoints = [], stateVectors = [];
    const container = document.getElementById('container');

    function createBlochScene(index) {
      const div = document.createElement('div');
      div.style.width = '400px';
      div.style.height = '400px';
      container.appendChild(div);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      scenes.push(scene);

      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
      camera.position.set(0, 0, 5);
      cameras.push(camera);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(400, 400);
      div.appendChild(renderer.domElement);
      renderers.push(renderer);

      // Sphère de Bloch wireframe
      const geometry = new THREE.SphereGeometry(1, 32, 32);
      const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      // Axes x (rouge), y (vert), z (bleu)
      const axes = new THREE.AxesHelper(1.5);
      scene.add(axes);

      // Point état quantique (magenta)
      const stateGeo = new THREE.SphereGeometry(0.08, 16, 16);
      const stateMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
      const statePoint = new THREE.Mesh(stateGeo, stateMat);
      scene.add(statePoint);
      statePoints.push(statePoint);

      // Vecteur d’état (flèche verte du centre au point)
      const vectorGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
      const vectorMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
      const vector = new THREE.Mesh(vectorGeo, vectorMat);
      vector.position.y = 0.5;
      scene.add(vector);
      stateVectors.push(vector);

      const control = new THREE.OrbitControls(camera, renderer.domElement);
      control.enableDamping = true;
      controls.push(control);

      animate(index);
    }

    function animate(index) {
      requestAnimationFrame(() => animate(index));

      const time = performance.now() * 0.001;

      // Hamiltonien sigmax : rotation autour x
      const theta = time * 2.0;

      // Décohérence : rapprochement du pôle nord + perte amplitude
      const decay = Math.exp(-time * 0.3);

      // État sur Bloch : commence à |+> (x=1, y=0, z=0) → rotation + décohérence
      const x = Math.sin(theta) * decay;
      const y = Math.cos(theta) * decay;
      const z = (1 - decay); // rapprochement progressif du pôle nord

      statePoints[index].position.set(x, y, z);

      // Vecteur d’état (flèche du centre au point)
      const length = Math.sqrt(x*x + y*y + z*z) || 0.01; // évite division par 0
      stateVectors[index].scale.y = length;
      stateVectors[index].position.set(x/2, y/2, z/2);
      stateVectors[index].rotation.z = Math.atan2(y, x);
      stateVectors[index].rotation.x = Math.acos(z / length);

      controls[index].update();
      renderers[index].render(scenes[index], cameras[index]);
    }

    function togglePyramidMode() {
      pyramidMode = !pyramidMode;
      container.innerHTML = '';
      scenes.length = cameras.length = renderers.length = controls.length = statePoints.length = stateVectors.length = 0;

      if (pyramidMode) {
        for (let i = 0; i < 4; i++) {
          createBlochScene(i);
          const angle = i * Math.PI / 2;
          cameras[i].position.set(
            5 * Math.cos(angle),
            1,
            5 * Math.sin(angle)
          );
          cameras[i].lookAt(0, 0, 0);
        }
      } else {
        createBlochScene();
      }
    }

    // Démarrage : 1 vue
    createBlochScene();
  </script>
</body>
</html>
