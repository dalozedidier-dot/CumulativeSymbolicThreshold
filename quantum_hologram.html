<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Hologramme quantique. Qubit + décohérence</title>
  <style>
    :root{--bg:#000;--fg:#0f0;--muted:#9f9;--panel:#111;--stroke:rgba(0,255,0,0.45)}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;text-align:center}
    h1{margin:18px 10px 6px;font-size:20px}
    p{max-width:980px;margin:8px auto 12px;line-height:1.45;color:var(--muted);padding:0 12px}
    #bar{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:10px;align-items:center}
    button{padding:10px 16px;background:#141414;color:var(--fg);border:1px solid var(--stroke);cursor:pointer;border-radius:12px;font-size:14px}
    button:hover{background:var(--fg);color:#000}
    .chip{display:inline-flex;gap:10px;align-items:center;border:1px solid rgba(0,255,0,0.35);padding:10px 12px;background:rgba(17,17,17,0.85);border-radius:12px}
    .chip label{font-size:13px;color:var(--muted)}
    .chip input{width:160px}
    .chip span{width:52px;text-align:right;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    #hud{max-width:980px;margin:6px auto 10px;color:var(--muted);padding:0 12px}
    #hud b{color:var(--fg)}
    #container{display:grid;grid-template-columns:1fr;gap:10px;padding:10px;justify-items:center}
    #container.pyr{grid-template-columns:1fr 1fr}
    .view{width:min(92vw,520px);aspect-ratio:1/1;border:1px solid var(--stroke);background:var(--panel);border-radius:12px;overflow:hidden;position:relative}
    .tag{position:absolute;left:10px;top:10px;font-size:12px;color:var(--muted);background:rgba(0,0,0,0.6);padding:6px 8px;border:1px solid rgba(0,255,0,0.25);border-radius:10px;z-index:2}
    canvas{width:100%;height:100%;display:block}
    #err{max-width:980px;margin:6px auto 0;color:#ff8080;font-size:12px;padding:0 12px;display:none}
  </style>
</head>
<body>
  <h1>Hologramme quantique. Qubit, décohérence, sphère de Bloch</h1>
  <p>
    Rotation sous Hamiltonien effectif et décohérence (T1, T2). Mode pyramide 4 vues pour hologramme DIY.
    Cette version ne dépend pas de WebGL.
  </p>

  <div id="bar">
    <button id="btnMode">Activer Mode Pyramide (4 vues)</button>
    <button id="btnKick">Impulsion π/2</button>
    <button id="btnReset">Reset</button>

    <div class="chip">
      <label for="omx">Ωx</label>
      <input id="omx" type="range" min="-250" max="250" value="110" />
      <span id="omxVal">1.10</span>
    </div>
    <div class="chip">
      <label for="omy">Ωy</label>
      <input id="omy" type="range" min="-250" max="250" value="30" />
      <span id="omyVal">0.30</span>
    </div>
    <div class="chip">
      <label for="omz">Ωz</label>
      <input id="omz" type="range" min="-250" max="250" value="60" />
      <span id="omzVal">0.60</span>
    </div>

    <div class="chip">
      <label for="t1">T1</label>
      <input id="t1" type="range" min="5" max="300" value="140" />
      <span id="t1Val">140</span>
    </div>
    <div class="chip">
      <label for="t2">T2</label>
      <input id="t2" type="range" min="5" max="300" value="80" />
      <span id="t2Val">80</span>
    </div>
  </div>

  <div id="hud">
    <b>Etat</b> <span id="stateText">superposition cohérente</span>
    <span> | </span>
    <b>t</b> <span id="tText">0.0</span>
    <span> | </span>
    <b>|r|</b> <span id="rText">1.00</span>
  </div>

  <div id="err"></div>

  <div id="container">
    <div class="view">
      <div class="tag">Vue libre</div>
      <canvas id="c0"></canvas>
    </div>
  </div>

  <script src="./qubit_bloch_2d.js"></script>
</body>
</html>
